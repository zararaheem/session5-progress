<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session 5 Dashboard — Alpha NYC</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1a;--card:#0d1829;--border:#1e3050;--border2:#264070;--text:#e8f0fc;--muted:#4a6080;--muted2:#7090b0;--radius:12px;--surface2:#111f36;
  --ll:#60a5fa;--ll-bg:rgba(59,130,246,.15);
  --l1:#c084fc;--l1-bg:rgba(147,51,234,.15);
  --l2:#34d399;--l2-bg:rgba(15,118,110,.15);
  --ms:#fbbf24;--ms-bg:rgba(180,83,9,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:48px 48px;}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,.1) 0%,transparent 70%);z-index:0;pointer-events:none;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE HERO */
.page-hero{background:rgba(8,14,26,.9);border-bottom:1px solid var(--border);padding:44px 28px 0;text-align:center;position:relative;z-index:1;}
.s5-kicker{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#60a5fa;margin-bottom:14px;display:inline-flex;align-items:center;gap:10px;}
.s5-kicker::before,.s5-kicker::after{content:'';height:1px;width:28px;background:currentColor;opacity:.35;}
.s5-h1{font-family:'Instrument Serif',serif;font-size:clamp(34px,5vw,58px);line-height:1.06;margin-bottom:10px;letter-spacing:-.4px;color:var(--text);}
.s5-h1 em{color:#60a5fa;font-style:italic;}
.s5-sub{font-size:14px;color:var(--muted2);line-height:1.6;max-width:480px;margin:0 auto 20px;}
.s5-week-bar{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.ph-week-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3);padding:4px 12px;border-radius:4px;}
.ph-due-now{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.4);padding:4px 12px;border-radius:4px;}
.ph-due-next{font-family:'DM Mono',monospace;font-size:10px;color:#7dd3fc;padding:4px 10px;border-radius:4px;border:1px solid rgba(125,211,252,.3);background:rgba(125,211,252,.07);}
.ph-due-missing{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.4);padding:4px 12px;border-radius:4px;}.s5-enter-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;background:#1a56db;color:white;border:none;padding:5px 14px;border-radius:6px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:background .15s;}
.s5-enter-btn:hover{background:#1745c0;}
.s5-hist-link{padding:12px 0 18px;text-align:center;}
.s5-hist-link a{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:4px 12px;border-radius:20px;transition:all .15s;}
.s5-hist-link a:hover{color:var(--text);border-color:var(--border2);}
.ph-live{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#f87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:3px 9px;border-radius:20px;margin-bottom:12px;}
.ph-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:pulse 1.5s infinite;}

/* CAMPUS STATS */
.campus-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.cs{display:flex;flex-direction:column;align-items:center;padding:12px 18px;border-radius:10px;min-width:76px;text-align:center;}
.cs-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.cs-label{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
.cs.s-total{background:var(--surface2);border:1px solid var(--border);}
.cs.s-total .cs-num{color:var(--text);}
.cs.s-filled{background:rgba(22,163,74,.12);border:1px solid rgba(134,239,172,.25);}
.cs.s-filled .cs-num{color:#4ade80;}
.cs.s-behind{background:rgba(220,38,38,.1);border:1px solid rgba(252,165,165,.25);}
.cs.s-behind .cs-num{color:#f87171;}
.cs.s-track{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);}
.cs.s-track .cs-num{color:#4ade80;}
.cs.s-ahead{background:rgba(109,40,217,.12);border:1px solid rgba(196,181,253,.25);}
.cs.s-ahead .cs-num{color:#a78bfa;}
.cs.s-blue{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);}
.cs.s-blue .cs-num{color:#60a5fa;}
.cs-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;justify-content:center;max-width:460px;margin-left:auto;margin-right:auto;}
.cs-bar-track{flex:1;max-width:320px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.cs-bar-fill{height:100%;background:#1a56db;border-radius:3px;transition:width .4s;}
.cs-bar-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}

/* WEEK STATS STRIP */
.wss-strip{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
.wss-card{flex:1;min-width:100px;max-width:155px;padding:10px 10px 8px;border-radius:10px;border:1px solid;text-align:center;}
.wss-future{border-color:var(--border);background:transparent;}
.wss-due{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.08);}
.wss-ok{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06);}
.wss-warn{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.06);}
.wss-head{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:2px;flex-wrap:wrap;}
.wss-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:var(--text);}
.wss-future .wss-label{color:var(--muted);}
.wss-due-badge{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;background:rgba(251,191,36,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.4);padding:1px 5px;border-radius:3px;}
.wss-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:5px;}
.wss-future .wss-sub{color:var(--muted);}
.wss-count{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;margin-bottom:4px;color:var(--text);}
.wss-future .wss-count{color:var(--muted);font-weight:400;}
.wss-lvl-sel{font-family:'DM Mono',monospace;font-size:9px;padding:2px 4px;border:1px solid var(--border2);border-radius:4px;background:var(--surface2);color:var(--text);margin-bottom:5px;width:100%;outline:none;}
.wss-stats{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;min-height:18px;}
.wss-stat{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;}
.wss-stat.s-behind{background:rgba(248,113,113,.12);color:#f87171;}
.wss-stat.s-track{background:rgba(74,222,128,.12);color:#4ade80;}
.wss-stat.s-ahead{background:rgba(109,40,217,.12);color:#a78bfa;}
.wss-stat.s-blue{background:rgba(96,165,250,.12);color:#60a5fa;}
.wss-nodata{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);font-style:italic;}

/* WEEK HUB */
.week-hub{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.wh-now{border:1px solid;border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.wh-now-left{display:flex;flex-direction:column;gap:3px;}
.wh-now-title{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.wh-now-fill{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-top:2px;}
.wh-now-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.wh-past-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.wh-past-hdr{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.wh-pp{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all .15s;background:transparent;display:inline-flex;align-items:center;gap:6px;}
.wh-pp-ok{color:#4ade80;border-color:rgba(74,222,128,.3);}
.wh-pp-ok:hover{background:rgba(74,222,128,.08);}
.wh-pp-warn{color:#f87171;border-color:rgba(248,113,113,.3);}
.wh-pp-warn:hover{background:rgba(248,113,113,.08);}
.wh-pp-fill{font-size:9px;opacity:.65;}
.wh-pp-future{color:var(--muted2);border-color:rgba(255,255,255,.1);cursor:default;opacity:.6;pointer-events:none;}
.wh-upcoming{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding:2px;opacity:.7;}
/* WEEK DETAIL POPUP */
.wd-stat-row{font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border-radius:7px;margin-bottom:6px;}
.wd-stat-row.s-behind{background:rgba(248,113,113,.1);}
.wd-stat-row.s-track{background:rgba(74,222,128,.1);}
.wd-stat-row.s-ahead{background:rgba(109,40,217,.1);}
.wd-stat-row.s-blue{background:rgba(96,165,250,.1);}
.wd-stat-label{font-weight:700;display:block;margin-bottom:3px;}
.wd-stat-row.s-behind .wd-stat-label{color:#f87171;}
.wd-stat-row.s-track .wd-stat-label{color:#4ade80;}
.wd-stat-row.s-ahead .wd-stat-label{color:#a78bfa;}
.wd-stat-row.s-blue .wd-stat-label{color:#60a5fa;}
.wd-stat-names{color:var(--muted2);font-size:10px;line-height:1.5;}
.wd-missing-hdr{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#f87171;margin-bottom:5px;}
.wd-missing-list{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);line-height:1.6;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);border-radius:7px;padding:8px 10px;}

/* STORAGE BADGE */
.storage-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.storage-badge.kv{color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);}
.storage-badge.local{color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);cursor:help;}

/* REMINDER BUTTON */
.reminder-btn{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;background:transparent;color:var(--muted2);border:1px solid var(--border2);padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .15s;margin-left:6px;}
.reminder-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2);}

/* REMINDER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;color:var(--muted2);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1;}
.modal-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.modal-preview{font-family:'DM Mono',monospace;font-size:11px;line-height:1.7;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;white-space:pre-wrap;color:var(--text);margin-bottom:14px;max-height:340px;overflow-y:auto;}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.modal-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.modal-btn.copy{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.modal-btn.copy:hover{background:var(--border2);}
.modal-btn.send{background:#1a56db;color:#fff;}
.modal-btn.send:hover{background:#1745c0;}
.modal-btn:disabled{opacity:.4;cursor:not-allowed;}
.modal-status{font-family:'DM Mono',monospace;font-size:11px;margin-top:10px;min-height:18px;}

/* LEVEL SELECTOR */
.level-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding-bottom:2px;}
@media(max-width:860px){.level-selector{grid-template-columns:repeat(3,1fr);}}
@media(max-width:540px){.level-selector{grid-template-columns:repeat(2,1fr);}}
.lvc{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .18s;}
.lvc:hover{box-shadow:0 4px 16px rgba(0,0,0,.4);transform:translateY(-1px);}
.lvc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.lvc-label{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.lvc-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);}
.lvc-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;min-height:18px;}
.lvc-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.lvc-bar-wrap{display:flex;align-items:center;gap:6px;}
.lvc-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.lvc-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.lvc-bar-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);}

/* CONTROLS */
.controls{padding:10px 28px;background:rgba(13,24,41,.95);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:relative;z-index:5;backdrop-filter:blur(8px);}
select,input{padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:7px;background:var(--surface2);color:var(--text);outline:none;}
select option{background:var(--surface2);}
.count-pill{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);background:var(--card);padding:3px 10px;border-radius:20px;border:1px solid var(--border);}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden;}
.vt-btn{font-family:'DM Mono',monospace;font-size:11px;padding:5px 13px;background:transparent;color:var(--muted2);border:none;cursor:pointer;transition:all .15s;}
.vt-btn:hover{color:var(--text);background:var(--surface2);}
.vt-btn.active{background:var(--surface2);color:var(--text);font-weight:600;}

/* BY-STUDENT TABLE */
.stu-table-wrap{overflow-x:auto;}
.stu-table{width:100%;border-collapse:collapse;font-size:12px;}
.stu-table th{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;}
.stu-table th.stu-name-th{text-align:left;min-width:160px;}
.stu-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center;}
.stu-table td.stu-name-td{text-align:left;}
.stu-table tr:hover td{background:rgba(59,130,246,.04);}
.stu-table th.th-due{background:rgba(251,191,36,.06);color:#fbbf24;}
.stu-table th.th-missing{background:rgba(248,113,113,.05);color:#f87171;}
.stu-ws-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
.stu-section-head{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px 18px 6px;color:var(--muted2);}
.stu-ws-bar{display:flex;align-items:center;gap:5px;justify-content:center;}
.stu-ws-bar-track{width:42px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.stu-ws-bar-fill{height:100%;border-radius:2px;background:#34d399;}

/* WORKSHOP BLOCK */
.page{padding:20px 28px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;}
.ws-block{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.ws-block-header{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:background .15s;}
.ws-block-header:hover{background:rgba(59,130,246,.04);}
.ws-block:not(.open) .ws-block-header{border-bottom:none;}
.ws-block.open .ws-block-header{border-bottom:1px solid var(--border);}
.ws-body{display:none;}
.ws-block.open .ws-body{display:block;}
.ws-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-left:auto;}
.ws-block.open .ws-chevron{transform:rotate(180deg);}
.ws-code-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.ws-info{flex:1;min-width:180px;}
.ws-name{font-size:14px;font-weight:600;margin-bottom:1px;}
.ws-guide-row{font-size:11px;color:var(--muted2);}
.ws-skill-pill{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;background:rgba(59,130,246,.08);border:1px solid var(--border2);color:var(--muted2);flex-shrink:0;margin-top:3px;}
.ws-pbar-wrap{display:flex;align-items:center;gap:8px;min-width:120px;}
.ws-pbar{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.ws-pbar-fill{height:100%;border-radius:3px;background:#22c55e;transition:width .4s;}
.ws-pbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);white-space:nowrap;}
.dot-link{text-decoration:none;display:inline-flex;background:transparent;border:none;padding:0;cursor:pointer;color:inherit;}
.dot-link:focus-visible{outline:2px solid #60a5fa;border-radius:50%;}

/* I-CAN STATEMENT */
.ican-row{padding:10px 18px;background:rgba(22,163,74,.06);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);display:flex;align-items:flex-start;gap:8px;}
.ican-tag{font-size:10px;font-weight:700;color:#4ade80;background:rgba(22,163,74,.12);border:1px solid rgba(134,239,172,.25);padding:2px 7px;border-radius:5px;flex-shrink:0;margin-top:1px;}

/* TABLE */
.ws-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);padding:7px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
th.chk-th{text-align:center;min-width:90px;}
th.tc-th{text-align:center;min-width:72px;}
td.tc-td{text-align:center;vertical-align:middle;}
.tc-dot{display:inline-flex;align-items:center;gap:2px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,.04);}
.s-name{font-weight:500;}
.stu-name-btn:hover .s-name{color:#60a5fa;text-decoration:underline;}
.s-note{font-size:10px;color:var(--muted2);font-style:italic;display:block;}
.chk-td{text-align:center;}

/* CHECKPOINT DOTS */
.chk-dot{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;border:1.5px solid;}
.chk-dot.st-pass{background:rgba(22,163,74,.15);border-color:rgba(134,239,172,.4);color:#4ade80;}

// ── Storage shim: tries /api/storage (Vercel KV), falls back to localStorage ─
window.storage = {
  get: async (key) => {
    try {
      const r = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
      const d = await r.json();
      if (r.ok) return { value: d.value };
    } catch (e) {}
    return { value: localStorage.getItem(key) };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    try {
      const r = await fetch('/api/storage', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key, value})
      });
      if (!r.ok) { const d = await r.json().catch(()=>({})); if (!d.fallback) console.warn('storage POST failed:', r.status); }
    } catch (e) { console.warn('storage POST error:', e); }
  }
};

function getCurrentSessionWeek(){
  const start=new Date(2026,3,27);
  const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24));
  if(diff<0)return 0;
  const w=Math.floor(diff/7)+1;
  return w>7?8:w;
}
function getDueForWeek(w){
  if(w===1)return{type:'checkpoint',key:'w1'};
  if(w===2)return{type:'3cs',key:'w2'};
  if(w===3)return{type:'checkpoint',key:'w3'};
  if(w===4)return{type:'3cs',key:'w4'};
  if(w===5)return{type:'checkpoint',key:'w5'};
  if(w===6)return{type:'3cs',key:'w6'};
  if(w===7)return{type:'checkpoint',key:'w7'};
  return null;
}
function getDueThisWeek(){return getDueForWeek(getCurrentSessionWeek());}
function getDueNextWeek(){return getDueForWeek(getCurrentSessionWeek()+1);}

// Returns how many students have data for week w (0 = none, total = all)
function filledCountForWeek(w){
  const d=getDueForWeek(w);
  if(!d)return -1;
  const all=(CFG.students||[]).filter(s=>!s.inactive);
  if(d.type==='checkpoint'){
    return all.filter(s=>(WORKSHOPS[s.l]||[]).some(ws=>getChk(s.n,ws.name,d.key))).length;
  }
  if(d.type==='3cs'){
    return all.filter(s=>{const e=s5data.__3cs__?.[s.n]?.[d.key]||{};return e.lovesSchool||e.learning2x||e.onTrack;}).length;
  }
  return -1;
}

// A week is "filled" only when ≥80% of students have data
function isFilledForWeek(w){
  const all=(CFG.students||[]).filter(s=>!s.inactive);
  const n=filledCountForWeek(w);
  if(n<0)return true;
  return n>=Math.ceil(all.length*0.8);
}

function getMissingWeeks(upToWeek){
  const missing=[];
  for(let w=1;w<upToWeek;w++){
    const d=getDueForWeek(w);
    if(d&&!isFilledForWeek(w))missing.push({week:w,due:d,filled:filledCountForWeek(w)});
  }
  return missing;
}
// ── Module-scope stat helpers ────────────────────────────────────────
function chkStatsFor(students,key){
  const behind=[],track=[],ahead=[];
  students.forEach(s=>{
    const wsList=WORKSHOPS[s.l]||[];
    let hasBehind=false,hasAhead=false,hasData=false;
    wsList.forEach(ws=>{
      const v=getChk(s.n,ws.name,key);
      if(v&&v!=='N/A'&&v!=='Absent')hasData=true;
      if(v==='Behind')hasBehind=true;
      else if(v==='Ahead')hasAhead=true;
    });
    if(!hasData)return;
    if(hasBehind)behind.push(s.n);
    else if(hasAhead)ahead.push(s.n);
    else track.push(s.n);
  });
  return{behind,track,ahead};
}
function threecsStatsFor(students,key){
  const lovesYN=[],l2xN=[],t2pYN=[];
  students.forEach(s=>{
    const d=s5data.__3cs__?.[s.n]?.[key]||{};
    if(d.lovesSchool==='Yes')lovesYN.push(s.n);
    if(d.learning2x==='All at 2x'||d.learning2x==='Some at 2x')l2xN.push(s.n);
    if(d.onTrack==='Yes')t2pYN.push(s.n);
  });
  return{lovesY:lovesYN.length,l2x:l2xN.length,t2pY:t2pYN.length,
         lovesYN,l2xN,t2pYN,total:students.length};
}

function openWeekDetail(key){
  const item=WEEK_DEFS.find(d=>d.key===key);
  if(!item)return;
  const allStu=(CFG.students||[]).filter(s=>!s.inactive);
  const filled=filledCountForWeek(item.w);
  const total=allStu.length;

  let statsHtml='',missingList=[];
  if(item.type==='chk'){
    const st=chkStatsFor(allStu,key);
    const statPill=(arr,cls,label)=>arr.length?`<div class="wd-stat-row ${cls}"><span class="wd-stat-label">${label} (${arr.length})</span><span class="wd-stat-names">${arr.join(', ')}</span></div>`:'';
    statsHtml=statPill(st.behind,'s-behind','Behind')+statPill(st.track,'s-track','On Track')+statPill(st.ahead,'s-ahead','Ahead');
    missingList=allStu.filter(s=>{
      const wsList=WORKSHOPS[s.l]||[];
      return wsList.length>0&&!wsList.some(ws=>getChk(s.n,ws.name,key));
    }).map(s=>s.n);
  }else{
    const st=threecsStatsFor(allStu,key);
    const statPill=(arr,cls,label)=>arr.length?`<div class="wd-stat-row ${cls}"><span class="wd-stat-label">${label} (${arr.length})</span><span class="wd-stat-names">${arr.join(', ')}</span></div>`:'';
    statsHtml=statPill(st.lovesYN,'s-track','Loves School')+statPill(st.l2xN,'s-blue','Learning 2×')+statPill(st.t2pYN,'s-ahead','T2P on track');
    missingList=allStu.filter(s=>{const d=s5data.__3cs__?.[s.n]?.[key]||{};return!d.lovesSchool&&!d.learning2x&&!d.onTrack;}).map(s=>s.n);
  }

  const missingHtml=missingList.length
    ?`<div class="wd-missing-hdr">Missing data (${missingList.length})</div><div class="wd-missing-list">${missingList.join(', ')}</div>`
    :`<div class="wd-missing-hdr" style="color:#4ade80">All data entered ✓</div>`;

  document.getElementById('wd-title').textContent=`${item.label} · ${item.sub}`;
  document.getElementById('wd-fill').textContent=`${filled}/${total} entered`;
  document.getElementById('wd-body').innerHTML=statsHtml+(statsHtml&&missingList.length?'<div style="height:10px"></div>':'')+missingHtml;
  document.getElementById('week-detail-modal').style.display='flex';
}

function _qeColor(val){
  if(val==='Yes'||val==='On Track'||val==='Ahead'||val==='Passed'||val==='All at 2x')return'#4ade80';
  if(val==='No'||val==='Behind'||val==='Not Yet')return'#f87171';
  if(val==='Some at 2x')return'#fbbf24';
  if(val==='None at 2x')return'#f87171';
  return'#9ca3af';
}
function _qeBtns(options, currentVal, onclickTpl){
  return options.map(o=>{
    const active=o===currentVal;
    const col=_qeColor(o);
    const bg=active?`${col}22`:'transparent';
    const border=active?col:'rgba(255,255,255,.12)';
    const color=active?col:'var(--muted2)';
    return`<button style="font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid ${border};background:${bg};color:${color};cursor:pointer;transition:all .12s;" onclick="${onclickTpl.replace('__VAL__',o.replace(/'/g,"\\'"))}">${o}</button>`;
  }).join('');
}

const _TA_STYLE='width:100%;margin-top:6px;padding:6px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:var(--text);font-size:11px;font-family:inherit;resize:vertical;min-height:44px;box-sizing:border-box;';

function _buildSwpBody(name,wkKey,type){
  const stu=(CFG.students||[]).find(s=>s.n===name);
  const lvl=stu?stu.l:'';
  const esc=s=>s.replace(/'/g,"\\'");
  if(type==='checkpoint'){
    const wsList=WORKSHOPS[lvl]||[];
    const opts=wkKey==='w7'?['Passed','Not Yet','Absent']:['Behind','On Track','Ahead','Absent','N/A'];
    return wsList.map(ws=>{
      const cur=getChk(name,ws.name,wkKey)||'';
      const coaching=s5data.__coaching__?.[name]?.[ws.name]?.[wkKey]||'';
      const btns=_qeBtns(opts,cur,`setQuickChk('${esc(name)}','${esc(ws.name)}','${wkKey}','__VAL__')`);
      const coachArea=cur==='Behind'&&wkKey!=='w7'
        ?`<textarea style="${_TA_STYLE}" placeholder="Coaching plan / next steps…" onchange="saveQuickCoach('${esc(name)}','${esc(ws.name)}','${wkKey}',this.value)">${coaching}</textarea>`:'';
      return`<div style="margin-bottom:14px;">
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">${ws.name}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${btns}</div>
        ${coachArea}
      </div>`;
    }).join('');
  }else{
    const d=s5data.__3cs__?.[name]?.[wkKey]||{};
    const row=(label,field,opts,noteField,showNoteVals,ph)=>{
      const cur=d[field]||'';
      const note=d[noteField]||'';
      const showNote=showNoteVals.includes(cur);
      const btns=_qeBtns(opts,cur,`setQuick3C('${esc(name)}','${wkKey}','${field}','__VAL__')`);
      return`<div style="margin-bottom:14px;">
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">${label}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${btns}</div>
        ${showNote?`<textarea style="${_TA_STYLE}" placeholder="${ph}" onchange="saveQuick3CNote('${esc(name)}','${wkKey}','${noteField}',this.value)">${note}</textarea>`:''}
      </div>`;
    };
    return row('Loves School','lovesSchool',['Yes','No','N/A'],'noteSchool',['No'],'What are they loving / not loving about school?')+
      row('Learning 2×','learning2x',['All at 2x','Some at 2x','None at 2x','N/A'],'noteSubjects',['Some at 2x','None at 2x'],'Subjects & daily minimums: which need support?')+
      row('T2P on track','onTrack',['Yes','No','N/A'],'noteT2p',['No'],'On track to pass their life skills workshop?');
  }
}

function openStudentProfile(name){
  const stu=(CFG.students||[]).find(s=>s.n===name);
  if(!stu)return;
  const lvl=stu.l;
  const wsList=WORKSHOPS[lvl]||[];
  const grade=s5data.__studentGrades__?.[name]||'';
  const guides=getStudentGuides(name,lvl);
  const lvlNames={LL:'Learning Lab',L1:'Level 1',L2:'Level 2',MS:'Middle School'};
  const lvlColors={LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
  const esc=s=>s.replace(/'/g,"\\'");

  // Week overview: one pill per week, ✓ if all data filled, clickable ○ if missing
  const weekPills=WEEK_DEFS.map(wk=>{
    let filled=false;
    if(wk.type==='chk'){
      filled=wsList.length>0&&wsList.every(ws=>!!getChk(name,ws.name,wk.key));
    }else{
      const d=s5data.__3cs__?.[name]?.[wk.key]||{};
      filled=!!(d.lovesSchool||d.learning2x||d.onTrack);
    }
    const type=wk.type==='chk'?'checkpoint':'3cs';
    if(filled){
      return`<button onclick="openStudentWeekPopup('${esc(name)}','${wk.key}','${type}')" style="font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25);cursor:pointer;">${wk.label} ✓</button>`;
    }else{
      return`<button onclick="openStudentWeekPopup('${esc(name)}','${wk.key}','${type}')" style="font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.3);cursor:pointer;">${wk.label} ○</button>`;
    }
  }).join('');

  // Workshop cards: just name + final status, no dot grids
  const wsBlocks=wsList.map(ws=>{
    const final=getFinal(name,ws.name);
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;gap:10px;">
      <div>
        <span style="font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:${lvlColors[lvl]}">${ws.code}</span>
        <span style="font-size:12px;font-weight:500;margin-left:6px;">${ws.name}</span>
        <div style="font-size:10px;color:var(--muted2);margin-top:1px;">${ws.day} · ${ws.skill}</div>
      </div>
      <div style="flex-shrink:0;">${finalPill(final)}</div>
    </div>`;
  }).join('');

  // 3Cs notes (only if any notes exist)
  const val3C=v=>{
    if(!v)return`<span style="color:var(--muted2)">—</span>`;
    const c=v==='Yes'||v.includes('All')?'#4ade80':v==='No'||v.includes('None')?'#f87171':v.includes('Some')?'#fbbf24':'#9ca3af';
    return`<span style="font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:${c}">${v}</span>`;
  };
  const tcRows=[{key:'w2',label:'Week 2'},{key:'w4',label:'Week 4'},{key:'w6',label:'Week 6'}].map(tw=>{
    const d=s5data.__3cs__?.[name]?.[tw.key]||{};
    if(!d.lovesSchool&&!d.learning2x&&!d.onTrack)return'';
    const notes=[d.noteSchool,d.noteSubjects,d.noteT2p,d.noteExtra].filter(Boolean);
    return`<div style="padding:6px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:var(--muted2);min-width:50px;">${tw.label}</span>
        <span style="font-size:11px;">School: ${val3C(d.lovesSchool)}</span>
        <span style="font-size:11px;">2×: ${val3C(d.learning2x)}</span>
        <span style="font-size:11px;">T2P: ${val3C(d.onTrack)}</span>
      </div>
      ${notes.length?`<div style="font-size:10px;color:var(--muted2);margin-top:3px;padding-left:64px;font-style:italic;">${notes.join(' · ')}</div>`:''}
    </div>`;
  }).filter(Boolean).join('');

  const coachEntries=Object.entries(s5data.__coaching__?.[name]||{}).flatMap(([ws,wks])=>Object.entries(wks||{}).filter(([,v])=>v).map(([ck,v])=>`<span style="font-weight:600;color:var(--text)">${ws} ${ck}:</span> ${v}`));
  const coachHtml=coachEntries.length?`<div style="margin-top:4px;">${coachEntries.map(e=>`<div style="font-size:11px;color:var(--muted2);margin-bottom:3px;">${e}</div>`).join('')}</div>`:'';

  document.getElementById('sp-name').textContent=name;
  document.getElementById('sp-meta').innerHTML=`<span style="color:${lvlColors[lvl]};font-weight:600;">${lvlNames[lvl]}</span>${grade?` · ${grade}`:''}${stu.note?` · <em style="opacity:.7">${stu.note}</em>`:''} · Guide: ${guides.join(', ')}`;
  document.getElementById('sp-reset-btn').onclick=()=>resetStudentData(name);
  document.getElementById('sp-body').innerHTML=`

    ${wsBlocks}
    ${tcRows?`<div style="font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted2);margin:14px 0 6px;">3Cs CHECK-INS</div>${tcRows}`:''}
    ${coachHtml?`<div style="font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--muted2);margin:14px 0 6px;">COACHING NOTES</div>${coachHtml}`:''}`;
  document.getElementById('student-profile-modal').style.display='flex';
}

function renderStats(){
  const container=document.getElementById('stats-hero');
  if(!container)return;
  const weekNum=getCurrentSessionWeek();
  const due=getDueThisWeek();
  const allStudents=(CFG.students||[]).filter(s=>!s.inactive);
  const allLevels=['LL','L1','L2','MS'];
  const total=allStudents.length;
  const lvlColors={LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
  const lvlBgs={LL:'var(--ll-bg)',L1:'var(--l1-bg)',L2:'var(--l2-bg)',MS:'var(--ms-bg)'};

  function weekDateRange(w){
    const s=new Date(2026,3,27);
    const mon=new Date(s.getTime()+(w-1)*7*24*60*60*1000);
    const sun=new Date(mon.getTime()+6*24*60*60*1000);
    const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
    return`${fmt(mon)}–${fmt(sun)}`;
  }

  // ── Week hub (current week + past pills) ─────────────────────────
  // Current/due week featured card
  const dueItem=WEEK_DEFS.find(d=>due&&d.key===due.key)||WEEK_DEFS[weekNum-1];
  const pastItems=WEEK_DEFS.filter(d=>d.w<weekNum&&(!due||d.key!==due.key));
  const futureItems=WEEK_DEFS.filter(d=>d.w>weekNum);

  let currentCardHtml='';
  if(dueItem&&weekNum>0&&weekNum<=7){
    const filled=filledCountForWeek(dueItem.w);
    const isFilled=isFilledForWeek(dueItem.w);
    const lvlFilter=weekLevelFilters[dueItem.key]||'ALL';
    const filtStudents=lvlFilter==='ALL'?allStudents:allStudents.filter(s=>s.l===lvlFilter);
    let statsHtml='';
    if(dueItem.type==='chk'){
      const st=chkStatsFor(filtStudents,dueItem.key);
      const hasData=st.behind.length+st.track.length+st.ahead.length>0;
      statsHtml=(st.behind.length>0?`<span class="wss-stat s-behind" title="${st.behind.join(', ')}">${st.behind.length} Behind</span>`:'')+
        (st.track.length>0?`<span class="wss-stat s-track" title="${st.track.join(', ')}">${st.track.length} On Track</span>`:'')+
        (st.ahead.length>0?`<span class="wss-stat s-ahead" title="${st.ahead.join(', ')}">${st.ahead.length} Ahead</span>`:'')+
        (!hasData?`<span class="wss-nodata">No data yet</span>`:'');
    }else{
      const st=threecsStatsFor(filtStudents,dueItem.key);
      const hasData=st.lovesY+st.l2x+st.t2pY>0;
      statsHtml=(st.lovesY>0?`<span class="wss-stat s-track" title="${st.lovesYN.join(', ')}">Loves School ${st.lovesY}</span>`:'')+
        (st.l2x>0?`<span class="wss-stat s-blue" title="${st.l2xN.join(', ')}">Learning 2× ${st.l2x}</span>`:'')+
        (st.t2pY>0?`<span class="wss-stat s-ahead" title="${st.t2pYN.join(', ')}">T2P on track ${st.t2pY}</span>`:'')+
        (!hasData?`<span class="wss-nodata">No data yet</span>`:'');
    }
    const borderColor=isFilled?'rgba(74,222,128,.4)':'rgba(251,191,36,.5)';
    const bgColor=isFilled?'rgba(74,222,128,.05)':'rgba(251,191,36,.06)';
    currentCardHtml=`<div class="wh-now" style="border-color:${borderColor};background:${bgColor};cursor:pointer;" onclick="goToDueColumn()">
      <div class="wh-now-left">
        <div class="wss-due-badge" style="margin-bottom:5px;">${isFilled?'✓ COMPLETE':'DUE THIS WEEK'}</div>
        <div class="wh-now-title">${dueItem.label} · ${dueItem.sub}</div>
        <div class="wh-now-fill">${filled}/${total} entered · ${weekDateRange(dueItem.w)}${dueItem.type==='3cs'?` · <a href="https://map-goals-platform.vercel.app/" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:#60a5fa;text-decoration:none;font-weight:700;">map-goals-platform.vercel.app ↗</a>`:''}</div>
      </div>
      <div class="wh-now-right">
        <div class="wss-stats" style="justify-content:flex-end;">${statsHtml}</div>
        <select class="wss-lvl-sel" style="width:auto;" onclick="event.stopPropagation()" onchange="setWeekLevelFilter('${dueItem.key}',this.value)">
          <option value="ALL"${lvlFilter==='ALL'?' selected':''}>All levels</option>
          ${allLevels.map(l=>`<option value="${l}"${lvlFilter===l?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }else if(weekNum>7){
    currentCardHtml=`<div class="wh-now" style="border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05)"><div class="wh-now-left"><div class="wss-due-badge" style="margin-bottom:5px;">SESSION COMPLETE</div><div class="wh-now-title">Session 5 finished</div></div></div>`;
  }

  // Past week pills
  const pastPillsHtml=pastItems.length?`<div class="wh-past-bar">
    <span class="wh-past-hdr">Past:</span>
    ${pastItems.map(item=>{
      const filled=filledCountForWeek(item.w);
      const allGood=filled>=total;
      const cls=allGood?'wh-pp-ok':'wh-pp-warn';
      return`<button class="wh-pp ${cls}" onclick="openWeekDetail('${item.key}')">
        ${item.label} · ${item.sub}
        <span class="wh-pp-fill">${filled}/${total}${allGood?' ✓':' ⚠'}</span>
      </button>`;
    }).join('')}
  </div>`:'';

  // Upcoming pills
  const upcomingNote=futureItems.length&&weekNum>0?`<div class="wh-past-bar" style="margin-top:2px;">
    <span class="wh-past-hdr">Upcoming:</span>
    ${futureItems.map(item=>`<span class="wh-pp wh-pp-future">${item.label} · ${item.sub}</span>`).join('')}
  </div>`:'';

  const weekHubHtml=`<div class="week-hub">${currentCardHtml}${pastPillsHtml}${upcomingNote}</div>`;

  // ── Level cards (show due-week stats) ─────────────────────────────
  function duePills(students){
    if(!due)return'';
    if(due.type==='checkpoint'){
      const st=chkStatsFor(students,due.key);
      return(st.behind.length>0?`<span class="lvc-pill" style="background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);" title="${st.behind.join(', ')}">${st.behind.length} Behind</span>`:'')+
        (st.track.length>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);" title="${st.track.join(', ')}">${st.track.length} On Track</span>`:'')+
        (st.ahead.length>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);" title="${st.ahead.join(', ')}">${st.ahead.length} Ahead</span>`:'');
    }
    const st=threecsStatsFor(students,due.key);
    return(st.lovesY>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);" title="${st.lovesYN.join(', ')}">Loves School ${st.lovesY}</span>`:'')+
      (st.l2x>0?`<span class="lvc-pill" style="background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25);" title="${st.l2xN.join(', ')}">Learning 2× ${st.l2x}</span>`:'')+
      (st.t2pY>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);" title="${st.t2pYN.join(', ')}">T2P on track ${st.t2pY}</span>`:'');
  }
  function duePct(students,lvl){
    if(!due)return 0;
    if(due.type==='checkpoint'){
      const st=chkStatsFor(students,due.key);
      const n=students.filter(s=>(WORKSHOPS[s.l]||[]).length>0).length;
      return n>0?Math.round((st.behind.length+st.track.length+st.ahead.length)/n*100):0;
    }
    const st=threecsStatsFor(students,due.key);
    return st.total>0?Math.round(st.lovesY/st.total*100):0;
  }

  const allActive=currentLevel==='ALL';
  const allPct=duePct(allStudents,'ALL');
  const allCard=`<div class="lvc" onclick="setLevelCard('ALL')" style="${allActive?'background:rgba(148,163,184,.1);border-color:#94a3b8;':''}">
    <div class="lvc-top"><span class="lvc-label" style="color:${allActive?'#cbd5e1':'var(--muted2)'}">All</span><span class="lvc-count">${total}</span></div>
    <div class="lvc-pills">${duePills(allStudents)}</div>
    <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${allPct}%;background:#94a3b8;"></div></div><span class="lvc-bar-label">${allPct}%</span></div>
  </div>`;

  const lvlCardsHtml=allLevels.map(lvl=>{
    const isActive=lvl===currentLevel;
    const ls=allStudents.filter(s=>s.l===lvl);
    const pct=duePct(ls,lvl);
    return`<div class="lvc" onclick="setLevelCard('${lvl}')" style="${isActive?`background:${lvlBgs[lvl]};border-color:${lvlColors[lvl]};`:''}">
      <div class="lvc-top"><span class="lvc-label" style="color:${lvlColors[lvl]}">${lvl}</span><span class="lvc-count">${ls.length} students</span></div>
      <div class="lvc-pills">${duePills(ls)}</div>
      <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${pct}%;background:${lvlColors[lvl]};"></div></div><span class="lvc-bar-label">${pct}%</span></div>
    </div>`;
  }).join('');

  const storageBadge=_storageMode==='kv'
    ?`<div class="storage-badge kv">● Shared KV storage</div>`
    :_storageMode==='local'
      ?`<div class="storage-badge local" title="Data is saved per-browser only. Connect Vercel KV for shared storage.">⚠ Local storage only — data not shared</div>`
      :``;

  container.innerHTML=`<div class="page-hero">
    <div class="ph-live">Live · Session 5</div>
    ${storageBadge}
    <div class="s5-kicker">Alpha NYC · Session 5 · 2026</div>
    <h1 class="s5-h1">Session <em>5</em> Data <em>Tracker</em></h1>
    <p class="s5-sub">Workshop progress, checkpoints &amp; 3Cs</p>
    <div class="s5-week-bar">
      <span class="ph-week-badge">Week ${weekNum>0&&weekNum<=7?weekNum:(weekNum>7?'Session Complete':'Starting')}${weekNum>0&&weekNum<=7?' · '+weekDateRange(weekNum):''}</span>
      <a href="${due&&due.type==='3cs'?'https://map-goals-platform.vercel.app/':'https://session5-progress.vercel.app/editor.html'+(currentLevel!=='ALL'?'?level='+currentLevel:'')}" target="${due&&due.type==='3cs'?'_blank':''}" rel="noopener noreferrer" class="s5-enter-btn">${due&&due.type==='3cs'?'Fill 3Cs form ↗':'Enter data →'}</a>
      <button class="reminder-btn" onclick="openReminderModal()">Send reminder</button>
    </div>
    ${weekHubHtml}
    <div class="level-selector">${allCard}${lvlCardsHtml}</div>
    <div class="s5-hist-link"><a href="https://t2p-dashboard.vercel.app/tracker.html" target="_blank" rel="noopener noreferrer">Previous T2P data ↗</a></div>
  </div>`;
}

function setLevelCard(l){
  currentLevel=l;
  populateWsFilter();
  render();
  document.querySelector('.controls')?.scrollIntoView({behavior:'smooth',block:'start'});

let _storageMode = 'unknown'; // 'kv' | 'local' | 'unknown'

async function loadData(){
  try{
    const resp = await fetch('/api/storage');
    if(resp.status === 503){
      _storageMode = 'local';
    } else if(resp.ok){
      _storageMode = 'kv';
      const d = await resp.json();
      if(d.value) s5data = JSON.parse(d.value);
    } else {
      _storageMode = 'local';
    }
  }catch(e){
    _storageMode = 'local';
  }
  if(_storageMode === 'local'){
    const local = localStorage.getItem('s5data');
    if(local) try{ s5data = JSON.parse(local); }catch(e){}
  }
  applyLevelOverrides();
  populateWsFilter();
  render();
  // Re-render stats so the storage badge updates
  renderStats();
}

function applyLevelOverrides(){
  const ov=s5data.__levelOverrides__||{};
  (CFG.students||[]).forEach(s=>{if(ov[s.n])s.l=ov[s.n];});
}

function populateWsFilter(){
  const sel = document.getElementById('wsFilter');
  sel.innerHTML = '<option value="">All workshops</option>';
  const levels = currentLevel==='ALL' ? ['LL','L1','L2','MS'] : [currentLevel];
  levels.forEach(lvl=>{
    (WORKSHOPS[lvl]||[]).forEach(ws=>{
      const o=document.createElement('option');
      o.value=ws.name;
      o.textContent=currentLevel==='ALL'?`[${lvl}] ${ws.code} — ${ws.name}`:`${ws.code} — ${ws.name}`;
      sel.appendChild(o);
    });
  });
}

function setLevel(l){
  currentLevel=l;
  populateWsFilter();
  render();
}

function getChk(studentName,wsName,chkKey){
  return s5data[studentName]?.[`__chk__${wsName}__${chkKey}`]||null;
}
function getFinal(studentName,wsName){
  return s5data[studentName]?.[wsName]||null;
}

function dotHtml(val){
  if(val==='Passed')return'<span class="chk-dot st-pass">✓</span>';
  if(val==='Not passed'||val==='Not Yet')return'<span class="chk-dot st-fail">✗</span>';
  if(val==='Behind')return'<span class="chk-dot st-behind">✗</span>';
  if(val==='On Track')return'<span class="chk-dot st-track">✓</span>';
  if(val==='Ahead')return'<span class="chk-dot st-ahead">↑</span>';
  if(val==='Absent')return'<span class="chk-dot st-absent">–</span>';
  if(val==='N/A')return'<span class="chk-dot st-absent" style="opacity:.5;font-size:9px;">N/A</span>';
  return'<span class="chk-dot st-empty"></span>';
}

function finalPill(val){
  if(val==='Passed')     return '<span class="st-pill pass">✓ Earned</span>';
  if(val==='Not passed'||val==='Not Yet') return '<span class="st-pill fail">Not yet</span>';
  if(val==='Absent')     return '<span class="st-pill absent">– Absent</span>';
  return '<span class="st-pill pending">— Pending</span>';
}

  viewMode=mode;
  document.getElementById('vt-workshop').classList.toggle('active',mode==='workshop');
  document.getElementById('vt-student').classList.toggle('active',mode==='student');
  document.getElementById('wsFilter').style.display=mode==='workshop'?'':'none';
  render();
}

function renderByStudent(){
  const sort=document.getElementById('sortSel').value;
  const due=getDueThisWeek();
  const wkNum=getCurrentSessionWeek();
  const levelsToRender=currentLevel==='ALL'?['LL','L1','L2','MS']:[currentLevel];
  const lvlNames={LL:'Learning Lab',L1:'Level 1',L2:'Level 2',MS:'Middle School'};
  const lvlColors={LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
  const editorBase='https://session5-progress.vercel.app/editor.html';

  const allCols=[
    {type:'chk',chk:CHECKPOINTS[0],sw:1},
    {type:'3cs',tc:{key:'w2',label:'Week 2'},sw:2},
    {type:'chk',chk:CHECKPOINTS[1],sw:3},
    {type:'3cs',tc:{key:'w4',label:'Week 4'},sw:4},
    {type:'chk',chk:CHECKPOINTS[2],sw:5},
    {type:'3cs',tc:{key:'w6',label:'Week 6'},sw:6},
    {type:'chk',chk:CHECKPOINTS[3],sw:7},
  ];

  function colStatus(col){
    const isDue=col.type==='chk'?(due&&due.type==='checkpoint'&&due.key===col.chk.key):(due&&due.type==='3cs'&&due.key===col.tc.key);
    const isPast=wkNum>col.sw;
    const isFuture=col.sw>wkNum;
    const filled=isPast?filledCountForWeek(col.sw):-1;
    const isMissing=isPast&&filled>=0&&!isFilledForWeek(col.sw);
    return{isDue,isMissing,isFuture,filled};
  }

  function chkDotsForStudent(sName,lvl,chkKey){
    const wsList=WORKSHOPS[lvl]||[];
    return wsList.map(ws=>{
      const val=getChk(sName,ws.name,chkKey);
      return`<a href="${editorBase}?level=${lvl}" class="dot-link" title="${ws.name}: ${val||'—'}">${dotHtml(val)}</a>`;
    }).join('');
  }

  function chkDotsForStudentClickable(sName,lvl,chkKey,isDue,isFuture){
    if(isFuture){return`<span class="chk-dot st-empty" style="cursor:default"></span>`;}
    const wsList=WORKSHOPS[lvl]||[];
    const esc=s=>s.replace(/'/g,"\\'");
    return wsList.map(ws=>{
      const val=getChk(sName,ws.name,chkKey);
      return`<button class="dot-link" onclick="openStudentWeekPopup('${esc(sName)}','${chkKey}','checkpoint')" title="${ws.name}: ${val||'click to enter'}">${dotHtml(val)}</button>`;
    }).join('');
  }

  function tc3cDotsClickable(sName,wkKey,lvl,isDue,isFuture){
    if(isFuture){return`<span class="chk-dot st-empty" style="cursor:default"></span>`;}
    const d=s5data.__3cs__?.[sName]?.[wkKey]||{};
    const esc=s=>s.replace(/'/g,"\\'");
    if(!d.lovesSchool&&!d.learning2x&&!d.onTrack){
      return`<button class="dot-link" onclick="openStudentWeekPopup('${esc(sName)}','${wkKey}','3cs')" title="Enter 3Cs for ${sName}"><span class="chk-dot st-empty"></span></button>`;
    }
    const lC=d.lovesSchool==='Yes'?'#34d399':d.lovesSchool==='No'?'#f87171':'var(--muted2)';
    const lT=d.lovesSchool==='Yes'?'♥':d.lovesSchool==='No'?'✗':'·';
    const lBg=d.lovesSchool==='Yes'?'rgba(52,211,153,.12)':d.lovesSchool==='No'?'rgba(248,113,113,.12)':'transparent';
    const xC=d.learning2x?.includes('All')?'#4ade80':d.learning2x?.includes('Some')?'#fbbf24':d.learning2x?'#f87171':'var(--muted2)';
    const xT=d.learning2x?.includes('All')?'2×':d.learning2x?.includes('Some')?'½×':d.learning2x?'✗':'·';
    const tC=d.onTrack==='Yes'?'#34d399':d.onTrack==='No'?'#f87171':'var(--muted2)';
    const tT=d.onTrack==='Yes'?'T✓':d.onTrack==='No'?'T✗':'·';
    return`<button class="dot-link" onclick="openStudentWeekPopup('${esc(sName)}','${wkKey}','3cs')" style="display:inline-flex;gap:3px;" title="Loves:${d.lovesSchool||'—'} 2×:${d.learning2x||'—'} T2P:${d.onTrack||'—'}">
      <span class="tc-dot" style="color:${lC};background:${lBg}">${lT}</span>
      <span class="tc-dot" style="color:${xC}">${xT}</span>
      <span class="tc-dot" style="color:${tC}">${tT}</span>
    </button>`;
  }

  function tc3cDots(sName,wkKey,lvl){
    const d=s5data.__3cs__?.[sName]?.[wkKey]||{};
    const editorLink=`${editorBase}?level=${lvl}`;
    if(!d.lovesSchool&&!d.learning2x&&!d.onTrack){
      return`<a href="${editorLink}" class="dot-link" title="Enter 3Cs"><span class="chk-dot st-empty"></span></a>`;
    }
    const lC=d.lovesSchool==='Yes'?'#34d399':d.lovesSchool==='No'?'#f87171':'var(--muted2)';
    const lT=d.lovesSchool==='Yes'?'♥':d.lovesSchool==='No'?'✗':'·';
    const lBg=d.lovesSchool==='Yes'?'rgba(52,211,153,.12)':d.lovesSchool==='No'?'rgba(248,113,113,.12)':'transparent';
    const xC=d.learning2x?.includes('All')?'#4ade80':d.learning2x?.includes('Some')?'#fbbf24':d.learning2x?'#f87171':'var(--muted2)';
    const xT=d.learning2x?.includes('All')?'2×':d.learning2x?.includes('Some')?'½×':d.learning2x?'✗':'·';
    const tC=d.onTrack==='Yes'?'#34d399':d.onTrack==='No'?'#f87171':'var(--muted2)';
    const tT=d.onTrack==='Yes'?'T✓':d.onTrack==='No'?'T✗':'·';
    return`<a href="${editorLink}" class="dot-link" style="display:inline-flex;gap:3px;" title="Loves:${d.lovesSchool||'—'} 2×:${d.learning2x||'—'} T2P:${d.onTrack||'—'}">
      <span class="tc-dot" style="color:${lC};background:${lBg}">${lT}</span>
      <span class="tc-dot" style="color:${xC}">${xT}</span>
      <span class="tc-dot" style="color:${tC}">${tT}</span>

  const headerCells=allCols.map(col=>{
    const{isDue,isMissing,isFuture}=colStatus(col);

  let totalStudents=0;
  const sections=levelsToRender.map(lvl=>{
    let students=(CFG.students||[]).filter(s=>s.l===lvl&&!s.inactive);
    if(!students.length)return'';
    if(sort==='progress'){
      students=students.sort((a,b)=>{
        const pa=(WORKSHOPS[lvl]||[]).filter(w=>getFinal(a.n,w.name)==='Passed').length;
        const pb=(WORKSHOPS[lvl]||[]).filter(w=>getFinal(b.n,w.name)==='Passed').length;
        return pb-pa;
      });
    }else{students=students.sort((a,b)=>a.n.localeCompare(b.n));}
    totalStudents+=students.length;
    const wsList=WORKSHOPS[lvl]||[];

    const rows=students.map(s=>{
      const passed=wsList.filter(w=>getFinal(s.n,w.name)==='Passed').length;
      const pct=wsList.length?Math.round(passed/wsList.length*100):0;
      const cells=allCols.map(col=>{
        const{isDue,isFuture}=colStatus(col);
        const futureCls=isFuture?' td-future':'';
        const dueCls=isDue?' due-col':'';
        if(col.type==='chk'){
          const dots=chkDotsForStudentClickable(s.n,lvl,col.chk.key,isDue,isFuture);
          return`<td class="chk-td${dueCls}${futureCls}"><div class="stu-ws-dots">${dots}</div></td>`;
        }
        return`<td class="tc-td${dueCls}${futureCls}">${tc3cDotsClickable(s.n,col.tc.key,lvl,isDue,isFuture)}</td>`;
      }).join('');
      const wsBar=passed===wsList.length&&wsList.length>0
        ?`<div class="stu-ws-bar"><span style="color:#4ade80;font-size:15px;font-weight:600">✓</span><span style="font-family:'DM Mono',monospace;font-size:9px;color:#4ade80;margin-left:3px">All passed</span></div>`
        :`<div class="stu-ws-bar">
          <div class="stu-ws-bar-track"><div class="stu-ws-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2)">${passed}/${wsList.length}</span>
        </div>`;
      const esc2=s=>s.replace(/'/g,"\\'");
      return`<tr>
        <td class="stu-name-td"><button class="dot-link stu-name-btn" onclick="openStudentProfile('${esc2(s.n)}')" title="View ${s.n}'s full profile"><span class="s-name">${s.n}</span></button>${s.note?`<span class="s-note">* ${s.note}</span>`:''}</td>
        ${cells}
        <td>${wsBar}</td>
      </tr>`;
    }).join('');

    const sectionHead=currentLevel==='ALL'?`<tr><td colspan="${allCols.length+2}" class="stu-section-head" style="color:${lvlColors[lvl]}">${lvlNames[lvl]} · ${students.length} students</td></tr>`:'';
    return sectionHead+rows;
  }).join('');

  document.getElementById('count-pill').textContent=`${totalStudents} students`;
  document.getElementById('page').innerHTML=`<div class="stu-table-wrap"><table class="stu-table">
    <thead><tr>
      <th class="stu-name-th">Student</th>
      ${headerCells}
      <th>Workshops</th>
    </tr></thead>
    <tbody>${sections}</tbody>
  </table></div>`;
}

  if(viewMode==='student'){renderByStudent();return;}

  const sort=document.getElementById('sortSel').value;
  const due=getDueThisWeek();
  const levelsToRender=currentLevel==='ALL'?['LL','L1','L2','MS']:[currentLevel];
  const lvlNames={LL:'Learning Lab',L1:'Level 1',L2:'Level 2',MS:'Middle School'};

  const allBlocks=[];
  let totalStudents=0,totalWs=0;

  levelsToRender.forEach(lvl=>{
    let workshops=WORKSHOPS[lvl]||[];
    if(wsFilter) workshops=workshops.filter(w=>w.name===wsFilter);
    let students=(CFG.students||[]).filter(s=>s.l===lvl&&!s.inactive);

      const skipped=s5data.__skip__?.[ws.name];
      const filledCount=students.filter(s=>CHECKPOINTS.some(c=>getChk(s.n,ws.name,c.key))||getFinal(s.n,ws.name)).length;
      const pct=students.length?Math.round(filledCount/students.length*100):0;
      const skipBadge=skipped?`<span style="font-family:'DM Mono',monospace;font-size:9px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:2px 7px;border-radius:4px;margin-left:6px">data not collected</span>`:'';
      // 3Cs — show all three weeks as separate columns
      const tcWeekDefs=[{key:'w2',label:'Week 2'},{key:'w4',label:'Week 4'},{key:'w6',label:'Week 6'}];
      function tc3cCell(sName,wkKey){
        const isDueWk=due&&due.type==='3cs'&&due.key===wkKey;
        const d=s5data.__3cs__?.[sName]?.[wkKey]||{};
        const editorLink=`https://session5-progress.vercel.app/editor.html?level=${lvl}`;
        if(!d.lovesSchool&&!d.learning2x&&!d.onTrack)return`<td class="tc-td${isDueWk?' due-col':''}"><a href="${editorLink}" class="dot-link" title="Enter 3Cs for ${sName}"><span class="chk-dot st-empty"></span></a></td>`;
        const lC=d.lovesSchool==='Yes'?'#34d399':d.lovesSchool==='No'?'#f87171':'var(--muted2)';
        const lT=d.lovesSchool==='Yes'?'♥':d.lovesSchool==='No'?'✗':'·';
        const lBg=d.lovesSchool==='Yes'?'rgba(52,211,153,.12)':d.lovesSchool==='No'?'rgba(248,113,113,.12)':'transparent';
        const xC=d.learning2x?.includes('All')?'#4ade80':d.learning2x?.includes('Some')?'#fbbf24':d.learning2x?'#f87171':'var(--muted2)';
        const xT=d.learning2x?.includes('All')?'2×':d.learning2x?.includes('Some')?'½×':d.learning2x?'✗':'·';
        const tC=d.onTrack==='Yes'?'#34d399':d.onTrack==='No'?'#f87171':'var(--muted2)';
        const tT=d.onTrack==='Yes'?'T✓':d.onTrack==='No'?'T✗':'·';
        return`<td class="tc-td${isDueWk?' due-col':''}" title="Loves School: ${d.lovesSchool||'—'} · 2×: ${d.learning2x||'—'} · T2P: ${d.onTrack||'—'}">

            <span class="tc-dot" style="color:${lC};background:${lBg}">${lT}</span>
            <span class="tc-dot" style="color:${xC}">${xT}</span>
            <span class="tc-dot" style="color:${tC}">${tT}</span>

        </td>`;
      }
      // Interleaved columns: w1, 3Cs·w2, w3, 3Cs·w4, w5, 3Cs·w6, w7, Status
      const wkNum=getCurrentSessionWeek();
      const allCols=[
        {type:'chk',chk:CHECKPOINTS[0],sw:1},
        {type:'3cs',tc:{key:'w2',label:'Week 2'},sw:2},
        {type:'chk',chk:CHECKPOINTS[1],sw:3},
        {type:'3cs',tc:{key:'w4',label:'Week 4'},sw:4},
        {type:'chk',chk:CHECKPOINTS[2],sw:5},
        {type:'3cs',tc:{key:'w6',label:'Week 6'},sw:6},
        {type:'chk',chk:CHECKPOINTS[3],sw:7},
      ];

        if(col.type==='chk'){
          return students.filter(s=>{const v=getChk(s.n,ws.name,col.chk.key);return v&&v!=='N/A';}).length;
        }

      }

        const isDue=col.type==='chk'?(due&&due.type==='checkpoint'&&due.key===col.chk.key):(due&&due.type==='3cs'&&due.key===col.tc.key);
        const isPast=wkNum>col.sw;
        const filled=isPast?wsFilledCount(col):-1;
        const total=students.filter(s=>!(col.type==='chk'&&getChk(s.n,ws.name,col.chk.key)==='N/A')).length;

      const headerRow=`<th style="min-width:160px">Student</th>`+allCols.map(col=>{

        const badge=isDue?`<span class="due-col-badge">Due this Week</span>`:isMissing?`<span class="missing-col-badge">⚠ ${filled}/${total} entered</span>`:'';
        if(col.type==='chk')return`<th class="chk-th${cls}">${col.chk.label}${badge}</th>`;

      const bodyRows=students.map(s=>{
        const cells=allCols.map(col=>{
          const{isDue}=colStatus(col);
          if(col.type==='chk'){

          }
          return tc3cCell(s.n,col.tc.key);
        }).join('');
        return`<tr><td><span class="s-name">${s.n}</span>${s.note?`<span class="s-note">* ${s.note}</span>`:''}</td>${cells}<td>${finalPill(getFinal(s.n,ws.name))}</td></tr>`;
      }).join('');
      allBlocks.push(`<div class="ws-block" id="${wsId}">
        <div class="ws-block-header" onclick="toggleWs('${wsId}')">
          <span class="ws-code-badge" style="background:${bg};color:${color}">${ws.code}</span>
          <div class="ws-info"><div class="ws-name">${ws.name}${skipBadge}</div><div class="ws-guide-row">${ws.day}</div></div>
          <span class="ws-skill-pill">${ws.skill}</span>
          <div class="ws-pbar-wrap"><div class="ws-pbar"><div class="ws-pbar-fill" style="width:${pct}%"></div></div><span class="ws-pbar-label">${filledCount}/${students.length} filled</span></div>
          <span class="ws-chevron">▼</span>

        <div class="ws-body">
          <div class="ican-row"><span class="ican-tag">I can</span><span>${ws.ican}</span></div>
          <div class="ws-table-wrap"><table><thead><tr>${headerRow}</tr></thead><tbody>${bodyRows}</tbody></table></div>
        </div>
      </div>`);
    });
  });

  document.getElementById('count-pill').textContent=`${totalStudents} students · ${totalWs} workshops`;
  document.getElementById('page').innerHTML=allBlocks.join('');
}

// ── Reminder helpers ──────────────────────────────────────────────

function getStudentGuides(sName, level) {
  const ov = s5data.__guides__?.[sName];
  if (ov && ov.length) return ov;
  return (CFG.levelGuides || {})[level] || ['(unassigned)'];
}

function buildReminderData() {
  const due = getDueThisWeek();
  if (!due) return null;
  const weekNum = getCurrentSessionWeek();
  const allStudents = (CFG.students || []).filter(s => !s.inactive);

  // Which students are missing data for this due item
  const missing = allStudents.filter(s => {
    if (due.type === 'checkpoint') {
      return !(WORKSHOPS[s.l] || []).some(ws => getChk(s.n, ws.name, due.key));
    }
    if (due.type === '3cs') {
      const d = s5data.__3cs__?.[s.n]?.[due.key] || {};
      return !d.lovesSchool && !d.learning2x && !d.onTrack;
    }
    return false;
  });

  // Group by guide
  const byGuide = {};
  missing.forEach(s => {
    getStudentGuides(s.n, s.l).forEach(g => {
      if (!byGuide[g]) byGuide[g] = [];
      byGuide[g].push(s);
    });
  });

  const dueLabel = due.type === 'checkpoint'
    ? (CFG.checkpoints || []).find(c => c.key === due.key)?.label || due.key
    : `3Cs (Week ${due.key.slice(1)})`;

  return { due, dueLabel, weekNum, missing, byGuide };
}

function generateReminderText(data) {
  if (!data) return 'No data due this week.';
  if (data.missing.length === 0) return `All data for "${data.dueLabel}" has been entered. `;

  const start = new Date(2026, 3, 27);
  const mon = new Date(start.getTime() + (data.weekNum - 1) * 7 * 24 * 60 * 60 * 1000);
  const fri = new Date(mon.getTime() + 4 * 24 * 60 * 60 * 1000);
  const fmt = d => `${d.getMonth() + 1}/${d.getDate()}`;
  const dateRange = `${fmt(mon)}–${fmt(fri)}`;

  const guideBlocks = Object.entries(data.byGuide)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([guide, students]) => {
      const list = students.map(s => `  • ${s.n} (${s.l})`).join('\n');
      return `${guide}:\n${list}`;
    }).join('\n\n');

  return `Hi team,

Quick reminder — ${data.dueLabel} data is due this week (Week ${data.weekNum}, ${dateRange}).

The following students still need data entered:

${guideBlocks}

Please enter data at:
https://session5-progress.vercel.app/editor.html

Thanks!`;
}

let _reminderText = '';

function openReminderModal() {
  const data = buildReminderData();
  _reminderText = generateReminderText(data);

  const due = getDueThisWeek();
  const dueLabel = data?.dueLabel || 'this week';
  const missingCount = data?.missing?.length || 0;

  document.getElementById('reminder-preview').textContent = _reminderText;
  document.getElementById('reminder-subject').textContent =
    `Subject: Data reminder — ${dueLabel} · ${missingCount} student${missingCount !== 1 ? 's' : ''} missing`;
  document.getElementById('reminder-status').textContent = '';
  document.getElementById('reminder-modal').style.display = 'flex';
}

function closeReminderModal() {
  document.getElementById('reminder-modal').style.display = 'none';
}

function copyReminder() {
  const subjectEl = document.getElementById('reminder-subject');
  const full = subjectEl.textContent + '\n\n' + _reminderText;
  navigator.clipboard.writeText(full).then(() => {
    document.getElementById('reminder-status').textContent = '✓ Copied to clipboard';
    document.getElementById('reminder-status').style.color = '#4ade80';
  }).catch(() => {
    document.getElementById('reminder-status').textContent = 'Copy failed — select text manually';
    document.getElementById('reminder-status').style.color = '#f87171';
  });
}

function sendReminderEmail() {
  const N = CFG.notifications || {};
  if (!N.emailjsServiceId || N.emailjsServiceId === 'YOUR_SERVICE_ID') {
    document.getElementById('reminder-status').textContent = '⚠ EmailJS not configured in config.js';
    document.getElementById('reminder-status').style.color = '#fbbf24';
    return;
  }
  const btn = document.getElementById('send-reminder-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  document.getElementById('reminder-status').textContent = '';

  const due = getDueThisWeek();
  const data = buildReminderData();

  emailjs.init(N.emailjsPublicKey);
  emailjs.send(N.emailjsServiceId, N.emailjsTemplateId, {
    to_name: N.notifyName || 'Team',
    to_email: N.notifyEmail,
    subject: `Data reminder — ${data?.dueLabel || 'this week'}`,
    message: _reminderText,
  }).then(() => {
    document.getElementById('reminder-status').textContent = `✓ Sent to ${N.notifyEmail}`;
    document.getElementById('reminder-status').style.color = '#4ade80';
    btn.disabled = false;
    btn.textContent = 'Send via EmailJS';
  }).catch(err => {
    document.getElementById('reminder-status').textContent = `✗ Send failed: ${err?.text || err}`;
    document.getElementById('reminder-status').style.color = '#f87171';
    btn.disabled = false;
    btn.textContent = 'Send via EmailJS';
  });
}

// Render hero immediately so it shows before storage resolves
renderStats();
populateWsFilter();
loadData();
</script>
