<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T2P — Session 5 Progress</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f2;--card:#fff;--border:#e5e4e0;--text:#1a1a1a;--muted:#999;--radius:12px;
  --ll:#1a56db;--ll-bg:#e8f0fe;--l1:#9333ea;--l1-bg:#fce8ff;
  --l2:#0f766e;--l2-bg:#e8fdf4;--ms:#b45309;--ms-bg:#fff4e8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE HERO */
.page-hero{background:white;border-bottom:1px solid var(--border);padding:32px 28px 0;}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
.ph-live{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#ef4444;background:#fff0f0;border:1px solid #fca5a5;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
.ph-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:pulse 1.5s infinite;}
.ph-title{font-size:clamp(26px,4vw,40px);font-weight:700;color:var(--text);line-height:1.1;margin-bottom:6px;}
.ph-sub{font-size:13px;color:var(--muted);line-height:1.5;}
.ph-week-info{text-align:right;flex-shrink:0;}
.ph-week-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(251,191,36,.1);color:#b45309;border:1px solid rgba(251,191,36,.4);padding:4px 12px;border-radius:4px;display:inline-block;margin-bottom:4px;}
.ph-due-label{font-size:11px;color:var(--muted);display:block;}

/* CAMPUS STATS */
.campus-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.cs{display:flex;flex-direction:column;align-items:center;padding:12px 18px;border-radius:10px;min-width:76px;text-align:center;}
.cs-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.cs-label{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
.cs.s-total{background:#f7f6f2;border:1px solid var(--border);}
.cs.s-total .cs-num{color:var(--text);}
.cs.s-filled{background:#ecfdf5;border:1px solid #86efac;}
.cs.s-filled .cs-num{color:#16a34a;}
.cs.s-behind{background:#fef2f2;border:1px solid #fca5a5;}
.cs.s-behind .cs-num{color:#dc2626;}
.cs.s-track{background:#eff6ff;border:1px solid #93c5fd;}
.cs.s-track .cs-num{color:#1d4ed8;}
.cs.s-ahead{background:#f5f3ff;border:1px solid #c4b5fd;}
.cs.s-ahead .cs-num{color:#6d28d9;}
.cs-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.cs-bar-track{flex:1;max-width:320px;height:6px;background:#f0ede8;border-radius:3px;overflow:hidden;}
.cs-bar-fill{height:100%;background:#1a56db;border-radius:3px;transition:width .4s;}
.cs-bar-label{font-family:'DM Mono',monospace;font-size:11px;color:#666;}

/* LEVEL SELECTOR */
.level-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding-bottom:2px;}
@media(max-width:860px){.level-selector{grid-template-columns:repeat(3,1fr);}}
@media(max-width:540px){.level-selector{grid-template-columns:repeat(2,1fr);}}
.lvc{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .18s;}
.lvc:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px);}
.lvc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.lvc-label{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.lvc-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.lvc-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;min-height:18px;}
.lvc-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.lvc-bar-wrap{display:flex;align-items:center;gap:6px;}
.lvc-bar{flex:1;height:3px;background:#e0dedd;border-radius:2px;overflow:hidden;}
.lvc-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.lvc-bar-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}

/* CONTROLS */
.controls{padding:10px 28px;background:white;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
select,input{padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:7px;background:white;color:var(--text);outline:none;}
.count-pill{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:20px;border:1px solid var(--border);}

/* WORKSHOP BLOCK */
.page{padding:20px 28px;display:flex;flex-direction:column;gap:24px;}
.ws-block{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.ws-block-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.ws-code-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;margin-top:2px;}
.ws-info{flex:1;min-width:180px;}
.ws-name{font-size:15px;font-weight:600;margin-bottom:2px;}
.ws-guide-row{font-size:11px;color:var(--muted);}
.ws-skill-pill{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--muted);flex-shrink:0;margin-top:3px;}
.ws-pbar-wrap{display:flex;align-items:center;gap:8px;min-width:120px;}
.ws-pbar{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;}
.ws-pbar-fill{height:100%;border-radius:3px;background:#16a34a;transition:width .4s;}
.ws-pbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}

/* I-CAN STATEMENT */
.ican-row{padding:10px 18px;background:#fafaf8;border-bottom:1px solid var(--border);font-size:12px;color:#444;display:flex;align-items:flex-start;gap:8px;}
.ican-tag{font-size:10px;font-weight:700;color:#16a34a;background:#ecfdf5;border:1px solid #86efac;padding:2px 7px;border-radius:5px;flex-shrink:0;margin-top:1px;}

/* DELIVERABLES & MEETINGS */
.ws-extras{padding:0 18px 16px;display:flex;flex-direction:column;gap:12px;}
.extras-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:640px){.extras-row{grid-template-columns:1fr;}}
.extras-block{background:#fafaf8;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.extras-title{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);background:#f5f4f0;}
.extras-list{padding:8px 0;}
.extras-empty{padding:8px 12px;font-size:12px;color:#ccc;font-style:italic;}
.deliverable-row{display:flex;align-items:flex-start;gap:8px;padding:5px 12px;}
.del-week{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:50px;flex-shrink:0;margin-top:1px;}
.del-text{font-size:12px;color:var(--text);flex:1;line-height:1.4;}
.meeting-row{display:flex;align-items:flex-start;gap:8px;padding:5px 12px;border-bottom:1px solid var(--border);}
.meeting-row:last-child{border-bottom:none;}
.meeting-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:80px;flex-shrink:0;margin-top:1px;}
.meeting-text{font-size:12px;color:var(--text);flex:1;line-height:1.4;}
.meeting-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.townhall-row{display:flex;align-items:center;gap:10px;padding:6px 12px;border-bottom:1px solid var(--border);}
.townhall-row:last-child{border-bottom:none;}
.townhall-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:80px;flex-shrink:0;}
.townhall-topic{font-size:12px;color:var(--text);flex:1;}
.ws-section-divider{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 18px 4px;}
.ws-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:7px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
th.chk-th{text-align:center;min-width:90px;}
td{padding:9px 12px;border-bottom:1px solid #f4f3ef;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.s-name{font-weight:500;}
.s-note{font-size:10px;color:var(--muted);font-style:italic;display:block;}
.chk-td{text-align:center;}

/* CHECKPOINT STATUS */
.chk-dot{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;border:1.5px solid;}
.chk-dot.st-pass{background:#ecfdf5;border-color:#86efac;color:#16a34a;}
.chk-dot.st-fail{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.chk-dot.st-absent{background:#fffbeb;border-color:#fde68a;color:#d97706;}
.chk-dot.st-empty{background:#f7f6f2;border-color:#e0dedd;color:#ddd;}
.chk-dot.st-behind{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.chk-dot.st-track{background:#eff6ff;border-color:#93c5fd;color:#2563eb;}
.chk-dot.st-ahead{background:#f5f3ff;border-color:#c4b5fd;color:#6d28d9;}

.due-col{background:rgba(251,191,36,.07)!important;}
.chk-th-due{background:rgba(251,191,36,.07)!important;}
.due-col-badge{display:block;font-size:8px;font-weight:700;color:#d97706;margin-top:2px;letter-spacing:.06em;text-align:center;}
.lvl-section-head{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 0 6px;border-bottom:2px solid;margin-bottom:4px;}

/* FINAL STATUS */
.st-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.st-pill.pass{background:#ecfdf5;color:#16a34a;border:1px solid #86efac;}
.st-pill.fail{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;}
.st-pill.absent{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.st-pill.pending{background:var(--bg);color:var(--muted);border:1px solid var(--border);}

.loading{padding:60px;text-align:center;color:var(--muted);}
.empty-msg{padding:40px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;}

@media(max-width:640px){
  .page,.controls,.page-hero{padding-left:14px;padding-right:14px;}
  .ws-name{font-size:13px;}
  .ph-title{font-size:26px;}
  .cs-num{font-size:22px;}
}

/* ── SITE NAV ── */
.site-nav{display:flex;align-items:center;gap:3px;padding:7px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:1000;}
.site-nav.dark{background:#060c18;border-bottom:1px solid #1e3050;}
.site-nav.light{background:rgba(248,247,244,.97);border-bottom:1px solid #e2e0db;backdrop-filter:blur(8px);}
.sn-link{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.04em;text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid transparent;transition:all .15s;white-space:nowrap;}
.site-nav.dark .sn-link{color:#4a6080;}
.site-nav.dark .sn-link:hover{color:#e8f0fc;border-color:#264070;}
.site-nav.dark .sn-link.active{background:#1a56db;color:white;border-color:#1a56db;}
.site-nav.dark .sn-link.home{color:#7090b0;border-color:#1e3050;}
.site-nav.light .sn-link{color:#888;}
.site-nav.light .sn-link:hover{color:#111;border-color:#aaa;}
.site-nav.light .sn-link.active{background:#1a56db;color:white;border-color:#1a56db;}
.site-nav.light .sn-link.home{color:#444;border-color:#e2e0db;}
</style>
</head>

</div>

<div class="page" id="page"><div class="loading">Loading…</div></div>

<script>
// ── Full workshop data with I-Can statements ──────────────────────────────
const WORKSHOPS = {
  LL:[
    {code:"SP-01",name:"Mission Laika — Storytelling",skill:"Collaboration",guide:"TBD",day:"Monday",
     ican:"I can author and illustrate a real printed picture book about an adoptable shelter dog, and read it aloud at Family Field Day.",

     ican:"I can diagnose a failed rocket launch, make a targeted fix, successfully relaunch, and recover usable payload footage from the high-altitude balloon.",

  L1:[

    {code:"OP-03",name:"Stock Simulator",skill:"Financial Literacy",guide:"Nathan Witkin",day:"Tue/Thu",
     ican:"I can outperform the starting portfolio and defend at least three trading decisions using market reasoning.",
     ttp:"Outperform the starting portfolio and defend at least three trading decisions using market reasoning."},
    {code:"OP-04",name:"Recon Expedition",skill:"Grit",guide:"Jesse + Parthvi",day:"Wednesday",
     ican:"I can complete the full recon course and 5K within the mission window.",
     ttp:"Complete the full recon course and 5K within the mission window."},
    {code:"OP-05",name:"Junior Space Camp — Island Standard",skill:"Teamwork",guide:"Parthvi",day:"Friday",
     ican:"I can coordinate and complete team challenges while maintaining responsibility for a defined role.",
     ttp:"Coordinate and complete team challenges while maintaining responsibility for a defined role."},
  ],
  L2:[
    {code:"FC-01",name:"Mission Laika — Product + Sales",skill:"Entrepreneurship",guide:"TBD",day:"Monday",
     ican:"I can ship a branded adopter starter-kit line that sells out at the adoption event and gets retained as a permanent SKU by the partner shelter.",
     ttp:"A branded adopter starter-kit line ships, sells out at the adoption event, and gets retained as a permanent SKU line by the partner shelter for ongoing use."},
    {code:"FC-02",name:"Alpha Emporium Exchange",skill:"Entrepreneurship",guide:"Jenna Petrungaro",day:"Tue/Thu",
     ican:"I can run a live marketplace exchange and hit my profit targets.",

     ican:"I can pass the FAA TRUST exam and complete a full rescue mission with defined roles and successful execution.",
     ttp:"Pass the FAA TRUST exam and complete a full rescue mission with defined roles and successful execution."},

     ican:"I can complete the full Row · Ride · Run event and demonstrate measurable improvement from baseline across all three disciplines.",
     ttp:"Complete the full Row · Ride · Run event and demonstrate measurable improvement from baseline across all three disciplines."},

     ttp:"Formally pitch a sustainable program to shelter leadership; program is accepted, piloted, and permanently adopted by the shelter — with handoff documentation delivered."},

const LEVEL_COLORS = {LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
const LEVEL_BGS   = {LL:'var(--ll-bg)',L1:'var(--l1-bg)',L2:'var(--l2-bg)',MS:'var(--ms-bg)'};

const CFG = (typeof T2P_CONFIG !== 'undefined') ? T2P_CONFIG : {students:[]};
// Default checkpoints if not in config
const CHECKPOINTS = CFG.checkpoints || [
  {key:'w1', label:'Week 1 Baseline'},
  {key:'w3', label:'Week 3: Checkpoint 1'},
  {key:'w5', label:'Week 5: Checkpoint 2'},
  {key:'w7', label:'Week 7: T2P'},
];

let currentLevel = 'ALL';
let s5data = {};

function getCurrentSessionWeek(){
  const start=new Date('2026-04-27');
  const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24));
  if(diff<0)return 0;
  const w=Math.floor(diff/7)+1;
  return w>7?8:w;
}
function getDueThisWeek(){
  const w=getCurrentSessionWeek();
  if(w===1)return{type:'checkpoint',key:'w1'};
  if(w===2)return{type:'3cs',key:'w2'};
  if(w===3)return{type:'checkpoint',key:'w3'};
  if(w===4)return{type:'3cs',key:'w4'};
  if(w===5)return{type:'checkpoint',key:'w5'};
  if(w===6)return{type:'3cs',key:'w6'};
  if(w===7)return{type:'checkpoint',key:'w7'};
  return null;
}
function renderStats(){
  const container=document.getElementById('stats-hero');
  if(!container)return;
  const weekNum=getCurrentSessionWeek();
  const due=getDueThisWeek();
  const allStudents=CFG.students||[];
  const allLevels=['LL','L1','L2','MS'];
  const totalAll=allStudents.length;
  const lvlColors={LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
  const lvlBgs={LL:'var(--ll-bg)',L1:'var(--l1-bg)',L2:'var(--l2-bg)',MS:'var(--ms-bg)'};

  let campusStats={type:'none',total:totalAll,withData:0};
  const levelStats={};
  allLevels.forEach(lvl=>{levelStats[lvl]={type:'none',withData:0,total:allStudents.filter(s=>s.l===lvl).length};});

  if(weekNum>0&&weekNum<=7&&due){
    if(due.type==='checkpoint'){
      const ck=due.key;
      const ckLabel=CHECKPOINTS.find(c=>c.key===ck)?.label||ck;
      function sStatus(s){
        const wss=WORKSHOPS[s.l]||[];
        let behind=false,track=false,ahead=false,hasAny=false;
        wss.forEach(ws=>{
          const v=getChk(s.n,ws.name,ck);
          if(v){hasAny=true;if(v==='Behind')behind=true;else if(v==='On Track')track=true;else if(v==='Ahead')ahead=true;}
        });
        if(!hasAny)return null;
        if(behind)return'Behind';if(track)return'On Track';return'Ahead';
      }
      let cB=0,cT=0,cA=0,cD=0;
      allStudents.forEach(s=>{const st=sStatus(s);if(st){cD++;if(st==='Behind')cB++;else if(st==='On Track')cT++;else cA++;}});
      campusStats={type:'checkpoint',ckLabel,behind:cB,track:cT,ahead:cA,withData:cD,total:totalAll};
      allLevels.forEach(lvl=>{
        const sts=allStudents.filter(s=>s.l===lvl);
        let lB=0,lT=0,lA=0,lD=0;
        sts.forEach(s=>{const st=sStatus(s);if(st){lD++;if(st==='Behind')lB++;else if(st==='On Track')lT++;else lA++;}});
        levelStats[lvl]={type:'checkpoint',behind:lB,track:lT,ahead:lA,withData:lD,total:sts.length};
      });
    } else {
      const wk=due.key;
      let cD=0,cLY=0,cL2=0,cTY=0,cTN=0;
      allStudents.forEach(s=>{
        const d=s5data.__3cs__?.[s.n]?.[wk]||{};
        if(d.lovesSchool||d.learning2x||d.onTrack)cD++;
        if(d.lovesSchool==='Yes')cLY++;
        if(d.learning2x==='All at 2x'||d.learning2x==='Some at 2x')cL2++;
        if(d.onTrack==='Yes')cTY++;else if(d.onTrack==='No')cTN++;
      });
      campusStats={type:'3cs',withData:cD,total:totalAll,lovesY:cLY,l2xGood:cL2,t2pY:cTY,t2pN:cTN};
      allLevels.forEach(lvl=>{
        const sts=allStudents.filter(s=>s.l===lvl);
        let lD=0,lLY=0,lL2=0,lTY=0,lTN=0;
        sts.forEach(s=>{
          const d=s5data.__3cs__?.[s.n]?.[wk]||{};
          if(d.lovesSchool||d.learning2x||d.onTrack)lD++;
          if(d.lovesSchool==='Yes')lLY++;
          if(d.learning2x==='All at 2x'||d.learning2x==='Some at 2x')lL2++;
          if(d.onTrack==='Yes')lTY++;else if(d.onTrack==='No')lTN++;
        });
        levelStats[lvl]={type:'3cs',withData:lD,total:sts.length,lovesY:lLY,l2xGood:lL2,t2pY:lTY,t2pN:lTN};
      });
    }
  }

  // Week info block (top right of hero)
  const weekInfoHtml=(weekNum>0&&weekNum<=7&&due)
    ?`<div class="ph-week-info">
        <span class="ph-week-badge">Week ${weekNum}</span>
        <span class="ph-due-label">Due: ${campusStats.type==='checkpoint'?campusStats.ckLabel:'3 Commitments'}</span>
      </div>`
    :`<div class="ph-week-info"><span class="ph-week-badge">Session ${weekNum>7?'Complete':'Starting'}</span></div>`;

  // Campus stat numbers
  const pctAll=totalAll>0?Math.round(campusStats.withData/totalAll*100):0;
  let campusStatsHtml='';
  if(campusStats.type==='checkpoint'){
    campusStatsHtml=`<div class="campus-stats">
      <div class="cs s-total"><span class="cs-num">${totalAll}</span><span class="cs-label">Students</span></div>
      <div class="cs s-filled"><span class="cs-num">${campusStats.withData}</span><span class="cs-label">Data In</span></div>
      <div class="cs s-behind"><span class="cs-num">${campusStats.behind}</span><span class="cs-label">Behind</span></div>
      <div class="cs s-track"><span class="cs-num">${campusStats.track}</span><span class="cs-label">On Track</span></div>
      <div class="cs s-ahead"><span class="cs-num">${campusStats.ahead}</span><span class="cs-label">Ahead</span></div>
    </div>
    <div class="cs-bar-row">
      <div class="cs-bar-track"><div class="cs-bar-fill" style="width:${pctAll}%"></div></div>
      <span class="cs-bar-label">${campusStats.withData}/${totalAll} students · ${campusStats.ckLabel}</span>
    </div>`;
  } else if(campusStats.type==='3cs'){
    campusStatsHtml=`<div class="campus-stats">
      <div class="cs s-total"><span class="cs-num">${totalAll}</span><span class="cs-label">Students</span></div>
      <div class="cs s-filled"><span class="cs-num">${campusStats.withData}</span><span class="cs-label">3Cs In</span></div>
      <div class="cs s-track"><span class="cs-num">${campusStats.lovesY}</span><span class="cs-label">Love School</span></div>
      <div class="cs s-track"><span class="cs-num">${campusStats.l2xGood}</span><span class="cs-label">Learning 2×</span></div>
      <div class="cs s-${campusStats.t2pN>0?'behind':'track'}"><span class="cs-num">${campusStats.t2pY}</span><span class="cs-label">T2P On Track</span></div>
    </div>
    <div class="cs-bar-row">
      <div class="cs-bar-track"><div class="cs-bar-fill" style="width:${pctAll}%"></div></div>
      <span class="cs-bar-label">${campusStats.withData}/${totalAll} students have 3 Commitments data</span>
    </div>`;
  } else {
    campusStatsHtml=`<div class="campus-stats">
      <div class="cs s-total"><span class="cs-num">${totalAll}</span><span class="cs-label">Students</span></div>
    </div>`;
  }

  // "All" card
  function levelPills(ls){
    if(ls.type==='checkpoint')return(ls.behind>0?`<span class="lvc-pill" style="background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;">${ls.behind} Behind</span>`:'')+
      (ls.track>0?`<span class="lvc-pill" style="background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;">${ls.track} On Track</span>`:'')+
      (ls.ahead>0?`<span class="lvc-pill" style="background:#f5f3ff;color:#6d28d9;border:1px solid #c4b5fd;">${ls.ahead} Ahead</span>`:'')+
      ((ls.total-ls.withData)>0?`<span class="lvc-pill" style="background:#f7f6f2;color:#999;border:1px solid #e2e0db;">${ls.total-ls.withData} no data</span>`:'');
    if(ls.type==='3cs')return`<span class="lvc-pill" style="background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;">${ls.lovesY||0} Love</span>`+
      `<span class="lvc-pill" style="background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;">${ls.l2xGood||0} 2×</span>`+
      `<span class="lvc-pill" style="${(ls.t2pN||0)>0?'background:#fef2f2;color:#dc2626;border:1px solid #fca5a5':'background:#ecfdf5;color:#16a34a;border:1px solid #86efac'}">${ls.t2pY||0} T2P✓</span>`;
    return'';
  }
  const allActive=currentLevel==='ALL';
  const allCard=`<div class="lvc" onclick="setLevelCard('ALL')" style="${allActive?'background:#eff6ff;border-color:var(--ll);':''}">
    <div class="lvc-top"><span class="lvc-label" style="color:${allActive?'var(--ll)':'#555'}">All</span><span class="lvc-count">${totalAll}</span></div>
    <div class="lvc-pills">${campusStats.type==='checkpoint'?levelPills(campusStats):campusStats.type==='3cs'?levelPills(campusStats):''}</div>
    <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${pctAll}%;background:var(--ll);"></div></div><span class="lvc-bar-label">${campusStats.withData}/${totalAll}</span></div>
  </div>`;

  const lvlCardsHtml=allLevels.map(lvl=>{
    const ls=levelStats[lvl];
    const isActive=lvl===currentLevel;
    const lsPct=ls.total>0?Math.round(ls.withData/ls.total*100):0;
    return`<div class="lvc" onclick="setLevelCard('${lvl}')" style="${isActive?`background:${lvlBgs[lvl]};border-color:${lvlColors[lvl]};`:''}">
      <div class="lvc-top"><span class="lvc-label" style="color:${lvlColors[lvl]}">${lvl}</span><span class="lvc-count">${ls.total} students</span></div>
      <div class="lvc-pills">${levelPills(ls)}</div>
      <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${lsPct}%;background:${lvlColors[lvl]};"></div></div><span class="lvc-bar-label">${ls.withData}/${ls.total}</span></div>
    </div>`;
  }).join('');

  container.innerHTML=`<div class="page-hero">
    <div class="ph-top">
      <div>
        <div class="ph-live">Live · Session 5</div>
        <div class="ph-title">Session 5 Data Tracker</div>
        <div class="ph-sub">Workshop progress, checkpoints &amp; 3 Commitments · Alpha NYC</div>
      </div>
      ${weekInfoHtml}
    </div>
    ${campusStatsHtml}
    <div class="level-selector">${allCard}${lvlCardsHtml}</div>
  </div>`;
}

function setLevelCard(l){
  currentLevel=l;
  populateWsFilter();
  render();
  document.querySelector('.controls')?.scrollIntoView({behavior:'smooth',block:'start'});
}

async function loadData(){
  try{
    const r = await window.storage.get('s5data');
    if(r?.value) s5data = JSON.parse(r.value);
  }catch(e){}
  populateWsFilter();
  render();
}

function populateWsFilter(){
  const sel = document.getElementById('wsFilter');
  sel.innerHTML = '<option value="">All workshops</option>';
  const levels = currentLevel==='ALL' ? ['LL','L1','L2','MS'] : [currentLevel];
  levels.forEach(lvl=>{
    (WORKSHOPS[lvl]||[]).forEach(ws=>{
      const o=document.createElement('option');
      o.value=ws.name;
      o.textContent=currentLevel==='ALL'?`[${lvl}] ${ws.code} — ${ws.name}`:`${ws.code} — ${ws.name}`;
      sel.appendChild(o);
    });
  });
}

function setLevel(l){
  currentLevel=l;
  populateWsFilter();
  render();
}

function getChk(studentName,wsName,chkKey){
  return s5data[studentName]?.[`__chk__${wsName}__${chkKey}`]||null;
}
function getFinal(studentName,wsName){
  return s5data[studentName]?.[wsName]||null;
}

function dotHtml(val){
  if(val==='Passed')return'<span class="chk-dot st-pass">✓</span>';
  if(val==='Not passed'||val==='Not Yet')return'<span class="chk-dot st-fail">✗</span>';
  if(val==='Behind')return'<span class="chk-dot st-behind">B</span>';
  if(val==='On Track')return'<span class="chk-dot st-track">T</span>';
  if(val==='Ahead')return'<span class="chk-dot st-ahead">A</span>';
  if(val==='Absent')return'<span class="chk-dot st-absent">–</span>';
  return'<span class="chk-dot st-empty"></span>';
}

function finalPill(val){
  if(val==='Passed')     return '<span class="st-pill pass">✓ Passed</span>';
  if(val==='Not passed') return '<span class="st-pill fail">✗ Not passed</span>';
  if(val==='Absent')     return '<span class="st-pill absent">– Absent</span>';
  return '<span class="st-pill pending">— Pending</span>';
}

function getDeliverables(wsName) {
  return s5data.__deliverables__?.[wsName] || [];
}
function getMeetings(wsName) {
  return s5data.__wsmeetings__?.[wsName] || [];
}
function getTownhalls() {
  return s5data.__townhalls__ || [];
}

function render(){
  renderStats();
  const wsFilter=document.getElementById('wsFilter').value;
  const sort=document.getElementById('sortSel').value;
  const due=getDueThisWeek();
  const levelsToRender=currentLevel==='ALL'?['LL','L1','L2','MS']:[currentLevel];
  const lvlNames={LL:'Launch Level',L1:'Level 1',L2:'Level 2',MS:'Middle School'};

  const townhalls=getTownhalls();
  const thHtml=townhalls.length
    ?townhalls.map(t=>`<div class="townhall-row"><span class="townhall-date">${t.date||''}</span><span class="townhall-topic">${t.topic||''}</span></div>`).join('')
    :'<div class="extras-empty">No town halls recorded yet</div>';
  const allBlocks=[`<div class="ws-block"><div class="ws-block-header" style="padding:12px 18px;"><div class="ws-info"><div class="ws-name" style="font-size:14px;">📢 Weekly Town Halls</div><div class="ws-guide-row">All levels · Full school</div></div></div><div class="extras-list">${thHtml}</div></div>`];

  let totalStudents=0,totalWs=0;

  levelsToRender.forEach(lvl=>{
    let workshops=WORKSHOPS[lvl]||[];
    if(wsFilter) workshops=workshops.filter(w=>w.name===wsFilter);
    let students=(CFG.students||[]).filter(s=>s.l===lvl);
    if(sort==='progress'){
      students=students.sort((a,b)=>{
        const pa=workshops.filter(w=>getFinal(a.n,w.name)==='Passed').length;
        const pb=workshops.filter(w=>getFinal(b.n,w.name)==='Passed').length;
        return pb-pa;
      });
    } else {
      students=students.sort((a,b)=>a.n.localeCompare(b.n));
    }
    if(!students.length||!workshops.length) return;
    totalStudents+=students.length;
    totalWs+=workshops.length;
    const color=LEVEL_COLORS[lvl];
    const bg=LEVEL_BGS[lvl];
    if(currentLevel==='ALL'){
      allBlocks.push(`<div class="lvl-section-head" style="color:${color};border-color:${color};">${lvl} — ${lvlNames[lvl]} · ${students.length} students</div>`);
    }
    workshops.forEach(ws=>{
      const skipped=s5data.__skip__?.[ws.name];
      const passCount=students.filter(s=>getFinal(s.n,ws.name)==='Passed').length;
      const pct=students.length?Math.round(passCount/students.length*100):0;
      const headerRow=`<th style="min-width:160px">Student</th>${CHECKPOINTS.map(c=>{
        const isDue=due&&due.type==='checkpoint'&&due.key===c.key;
        return`<th class="chk-th${isDue?' chk-th-due':''}">${c.label}${isDue?'<span class="due-col-badge">Due this Week</span>':''}</th>`;
      }).join('')}<th>Status</th>`;
      const bodyRows=students.map(s=>{
        const chkCells=CHECKPOINTS.map(c=>{
          const isDue=due&&due.type==='checkpoint'&&due.key===c.key;
          return`<td class="chk-td${isDue?' due-col':''}">${dotHtml(getChk(s.n,ws.name,c.key))}</td>`;
        }).join('');
        return`<tr><td><span class="s-name">${s.n}</span>${s.note?`<span class="s-note">* ${s.note}</span>`:''}</td>${chkCells}<td>${finalPill(getFinal(s.n,ws.name))}</td></tr>`;
      }).join('');
      const deliverables=getDeliverables(ws.name);
      const delHtml=deliverables.length?deliverables.map(d=>`<div class="deliverable-row"><span class="del-week">${d.week||''}</span><span class="del-text">${d.text||''}</span></div>`).join(''):'<div class="extras-empty">No deliverables recorded yet</div>';
      const meetings=getMeetings(ws.name);
      const meetHtml=meetings.length?meetings.map(m=>`<div class="meeting-row"><span class="meeting-date">${m.date||''}</span><div class="meeting-text">${m.notes||''}<div class="meeting-sub">${m.type||''}</div></div></div>`).join(''):'<div class="extras-empty">No meetings recorded yet</div>';
      const skipBadge=skipped?`<span style="font-family:'DM Mono',monospace;font-size:9px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:2px 7px;border-radius:4px;margin-left:8px">data not collected</span>`:'';
      allBlocks.push(`<div class="ws-block">
        <div class="ws-block-header">
          <span class="ws-code-badge" style="background:${bg};color:${color}">${ws.code}</span>
          <div class="ws-info"><div class="ws-name">${ws.name}${skipBadge}</div><div class="ws-guide-row">${ws.guide} · ${ws.day}</div></div>
          <span class="ws-skill-pill">${ws.skill}</span>
          <div class="ws-pbar-wrap"><div class="ws-pbar"><div class="ws-pbar-fill" style="width:${pct}%"></div></div><span class="ws-pbar-label">${passCount}/${students.length} passed</span></div>
        </div>
        <div class="ican-row"><span class="ican-tag">I can</span><span>${ws.ican}</span></div>
        <div class="ws-table-wrap"><table><thead><tr>${headerRow}</tr></thead><tbody>${bodyRows}</tbody></table></div>
        <div class="ws-extras"><div class="extras-row">
          <div class="extras-block"><div class="extras-title">Weekly Deliverables</div><div class="extras-list">${delHtml}</div></div>
          <div class="extras-block"><div class="extras-title">Meetings</div><div class="extras-list">${meetHtml}</div></div>
        </div></div>
      </div>`);
    });
  });

  document.getElementById('count-pill').textContent=`${totalStudents} students · ${totalWs} workshops`;
  document.getElementById('page').innerHTML=allBlocks.join('');
}

// Render hero immediately so it shows before storage resolves
renderStats();
populateWsFilter();
loadData();
</script>
</body>
</html>
