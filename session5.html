<title>Session 5 Dashboard — Alpha NYC</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1a;--card:#0d1829;--border:#1e3050;--border2:#264070;--text:#e8f0fc;--muted:#4a6080;--muted2:#7090b0;--radius:12px;--surface2:#111f36;
  --ll:#60a5fa;--ll-bg:rgba(59,130,246,.15);
  --l1:#c084fc;--l1-bg:rgba(147,51,234,.15);
  --l2:#34d399;--l2-bg:rgba(15,118,110,.15);
  --ms:#fbbf24;--ms-bg:rgba(180,83,9,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:48px 48px;}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,.1) 0%,transparent 70%);z-index:0;pointer-events:none;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE HERO */
.page-hero{background:rgba(8,14,26,.9);border-bottom:1px solid var(--border);padding:44px 28px 0;text-align:center;position:relative;z-index:1;}
.s5-kicker{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#60a5fa;margin-bottom:14px;display:inline-flex;align-items:center;gap:10px;}
.s5-kicker::before,.s5-kicker::after{content:'';height:1px;width:28px;background:currentColor;opacity:.35;}
.s5-h1{font-family:'Instrument Serif',serif;font-size:clamp(34px,5vw,58px);line-height:1.06;margin-bottom:10px;letter-spacing:-.4px;color:var(--text);}
.s5-h1 em{color:#60a5fa;font-style:italic;}
.s5-sub{font-size:14px;color:var(--muted2);line-height:1.6;max-width:480px;margin:0 auto 20px;}
.s5-week-bar{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.ph-week-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3);padding:4px 12px;border-radius:4px;}
.ph-due-now{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.4);padding:4px 12px;border-radius:4px;}
.ph-due-next{font-family:'DM Mono',monospace;font-size:10px;color:#7dd3fc;padding:4px 10px;border-radius:4px;border:1px solid rgba(125,211,252,.3);background:rgba(125,211,252,.07);}
.ph-due-missing{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.4);padding:4px 12px;border-radius:4px;}.s5-enter-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;background:#1a56db;color:white;border:none;padding:5px 14px;border-radius:6px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:background .15s;}
.s5-enter-btn:hover{background:#1745c0;}
.s5-hist-link{padding:12px 0 18px;text-align:center;}
.s5-hist-link a{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:4px 12px;border-radius:20px;transition:all .15s;}
.s5-hist-link a:hover{color:var(--text);border-color:var(--border2);}
.ph-live{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#f87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:3px 9px;border-radius:20px;margin-bottom:12px;}
.ph-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:pulse 1.5s infinite;}

/* CAMPUS STATS */
.campus-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.cs{display:flex;flex-direction:column;align-items:center;padding:12px 18px;border-radius:10px;min-width:76px;text-align:center;}
.cs-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.cs-label{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
.cs.s-total{background:var(--surface2);border:1px solid var(--border);}
.cs.s-total .cs-num{color:var(--text);}
.cs.s-filled{background:rgba(22,163,74,.12);border:1px solid rgba(134,239,172,.25);}
.cs.s-filled .cs-num{color:#4ade80;}
.cs.s-behind{background:rgba(220,38,38,.1);border:1px solid rgba(252,165,165,.25);}
.cs.s-behind .cs-num{color:#f87171;}
.cs.s-track{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);}
.cs.s-track .cs-num{color:#4ade80;}
.cs.s-ahead{background:rgba(109,40,217,.12);border:1px solid rgba(196,181,253,.25);}
.cs.s-ahead .cs-num{color:#a78bfa;}
.cs.s-blue{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);}
.cs.s-blue .cs-num{color:#60a5fa;}
.cs-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;justify-content:center;max-width:460px;margin-left:auto;margin-right:auto;}
.cs-bar-track{flex:1;max-width:320px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.cs-bar-fill{height:100%;background:#1a56db;border-radius:3px;transition:width .4s;}
.cs-bar-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}

/* STAT MODE SELECTOR */
.stat-mode-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.stat-mode-select{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);outline:none;}

/* LEVEL SELECTOR */
.level-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding-bottom:2px;}
@media(max-width:860px){.level-selector{grid-template-columns:repeat(3,1fr);}}
@media(max-width:540px){.level-selector{grid-template-columns:repeat(2,1fr);}}
.lvc{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .18s;}
.lvc:hover{box-shadow:0 4px 16px rgba(0,0,0,.4);transform:translateY(-1px);}
.lvc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.lvc-label{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.lvc-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);}
.lvc-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;min-height:18px;}
.lvc-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.lvc-bar-wrap{display:flex;align-items:center;gap:6px;}
.lvc-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.lvc-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.lvc-bar-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);}

/* CONTROLS */
.controls{padding:10px 28px;background:rgba(13,24,41,.95);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:relative;z-index:5;backdrop-filter:blur(8px);}
select,input{padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:7px;background:var(--surface2);color:var(--text);outline:none;}
select option{background:var(--surface2);}
.count-pill{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);background:var(--card);padding:3px 10px;border-radius:20px;border:1px solid var(--border);}

/* WORKSHOP BLOCK */
.page{padding:20px 28px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;}
.ws-block{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.ws-block-header{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:background .15s;}
.ws-block-header:hover{background:rgba(59,130,246,.04);}
.ws-block:not(.open) .ws-block-header{border-bottom:none;}
.ws-block.open .ws-block-header{border-bottom:1px solid var(--border);}
.ws-body{display:none;}
.ws-block.open .ws-body{display:block;}
.ws-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-left:auto;}
.ws-block.open .ws-chevron{transform:rotate(180deg);}
.ws-code-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.ws-info{flex:1;min-width:180px;}
.ws-name{font-size:14px;font-weight:600;margin-bottom:1px;}
.ws-guide-row{font-size:11px;color:var(--muted2);}
.ws-skill-pill{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;background:rgba(59,130,246,.08);border:1px solid var(--border2);color:var(--muted2);flex-shrink:0;margin-top:3px;}
.ws-pbar-wrap{display:flex;align-items:center;gap:8px;min-width:120px;}
.ws-pbar{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.ws-pbar-fill{height:100%;border-radius:3px;background:#22c55e;transition:width .4s;}
.ws-pbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);white-space:nowrap;}
.dot-link{text-decoration:none;display:inline-flex;}
.dot-link:focus-visible{outline:2px solid #60a5fa;border-radius:50%;}

/* I-CAN STATEMENT */
.ican-row{padding:10px 18px;background:rgba(22,163,74,.06);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);display:flex;align-items:flex-start;gap:8px;}
.ican-tag{font-size:10px;font-weight:700;color:#4ade80;background:rgba(22,163,74,.12);border:1px solid rgba(134,239,172,.25);padding:2px 7px;border-radius:5px;flex-shrink:0;margin-top:1px;}

/* TABLE */
.ws-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);padding:7px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
th.chk-th{text-align:center;min-width:90px;}
th.tc-th{text-align:center;min-width:72px;}
td.tc-td{text-align:center;vertical-align:middle;}
.tc-dot{display:inline-flex;align-items:center;gap:2px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,.04);}
.s-name{font-weight:500;}
.s-note{font-size:10px;color:var(--muted2);font-style:italic;display:block;}
.chk-td{text-align:center;}

/* CHECKPOINT DOTS */
.chk-dot{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;border:1.5px solid;}
.chk-dot.st-pass{background:rgba(22,163,74,.15);border-color:rgba(134,239,172,.4);color:#4ade80;}
.chk-dot.st-fail{background:rgba(220,38,38,.12);border-color:rgba(252,165,165,.35);color:#f87171;}
.chk-dot.st-absent{background:rgba(217,119,6,.12);border-color:rgba(253,230,138,.3);color:#fbbf24;}
.chk-dot.st-empty{background:rgba(59,130,246,.04);border-color:var(--border2);color:var(--border2);}
.chk-dot.st-behind{background:rgba(220,38,38,.12);border-color:rgba(252,165,165,.35);color:#f87171;}
.chk-dot.st-track{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:#4ade80;}
.chk-dot.st-ahead{background:rgba(109,40,217,.12);border-color:rgba(196,181,253,.3);color:#a78bfa;}

.due-col{background:rgba(251,191,36,.05)!important;}
.chk-th-due{background:rgba(251,191,36,.05)!important;}
.due-col-badge{display:block;font-size:8px;font-weight:700;color:#fbbf24;margin-top:2px;letter-spacing:.06em;text-align:center;}
.lvl-section-head{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 0 6px;border-bottom:2px solid;margin-bottom:4px;}

/* FINAL STATUS PILLS */
.st-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.st-pill.pass{background:rgba(22,163,74,.12);color:#4ade80;border:1px solid rgba(134,239,172,.25);}
.st-pill.fail{background:rgba(220,38,38,.1);color:#f87171;border:1px solid rgba(252,165,165,.25);}
.st-pill.absent{background:rgba(217,119,6,.1);color:#fbbf24;border:1px solid rgba(253,230,138,.25);}
.st-pill.pending{background:rgba(59,130,246,.06);color:var(--muted2);border:1px solid var(--border);}

.loading{padding:60px;text-align:center;color:var(--muted2);}
.empty-msg{padding:40px;text-align:center;color:var(--muted2);font-size:13px;font-style:italic;}

@media(max-width:640px){
  .page,.controls{padding-left:14px;padding-right:14px;}
  .page-hero{padding-left:14px;padding-right:14px;}
  .ws-name{font-size:13px;}
  .s5-h1{font-size:30px;}
  .cs-num{font-size:22px;}
}

.sn-link{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.04em;text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid transparent;transition:all .15s;white-space:nowrap;}

.site-nav.dark .sn-link.home{color:#7090b0;border-color:#1e3050;}
</style>

<script>
// ── Storage shim: tries /api/storage (Vercel KV), falls back to localStorage ─
window.storage = {
  get: async (key) => {
    try {
      const r = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
      const d = await r.json();
      if (r.ok) return { value: d.value };
    } catch (e) {}
    return { value: localStorage.getItem(key) };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    try {
      const r = await fetch('/api/storage', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key, value})
      });
      if (!r.ok) { const d = await r.json().catch(()=>({})); if (!d.fallback) console.warn('storage POST failed:', r.status); }
    } catch (e) { console.warn('storage POST error:', e); }
  }
};
</script>

     ttp:"Design, coach, and run the full Governors Island experience for younger students with zero adult intervention."},
  ]
};

const LEVEL_COLORS = {LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
const LEVEL_BGS   = {LL:'var(--ll-bg)',L1:'var(--l1-bg)',L2:'var(--l2-bg)',MS:'var(--ms-bg)'};

const CFG = (typeof T2P_CONFIG !== 'undefined') ? T2P_CONFIG : {students:[]};
// Default checkpoints if not in config
const CHECKPOINTS = CFG.checkpoints || [
  {key:'w1', label:'Week 1 Baseline'},
  {key:'w3', label:'Week 3: Checkpoint 1'},
  {key:'w5', label:'Week 5: Checkpoint 2'},
  {key:'w7', label:'Week 7: T2P'},
];

let currentLevel = 'ALL';
let s5data = {};
let statMode = 'checkpoint';  // 'checkpoint' or '3cs'
let threecsWeekFilter = '';  // 'w2', 'w4', 'w6', or '' for auto

function getCurrentSessionWeek(){
  const start=new Date(2026,3,27);
  const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24));
  if(diff<0)return 0;
  const w=Math.floor(diff/7)+1;
  return w>7?8:w;
}
function getDueForWeek(w){
  if(w===1)return{type:'checkpoint',key:'w1'};
  if(w===2)return{type:'3cs',key:'w2'};
  if(w===3)return{type:'checkpoint',key:'w3'};
  if(w===4)return{type:'3cs',key:'w4'};
  if(w===5)return{type:'checkpoint',key:'w5'};
  if(w===6)return{type:'3cs',key:'w6'};
  if(w===7)return{type:'checkpoint',key:'w7'};
  return null;
}
function getDueThisWeek(){return getDueForWeek(getCurrentSessionWeek());}
function getDueNextWeek(){return getDueForWeek(getCurrentSessionWeek()+1);}
function isFilledForWeek(w){
  const d=getDueForWeek(w);
  if(!d)return true;
  const all=(CFG.students||[]).filter(s=>!s.inactive);
  if(d.type==='checkpoint'){
    return all.some(s=>(WORKSHOPS[s.l]||[]).some(ws=>getChk(s.n,ws.name,d.key)));
  }
  if(d.type==='3cs'){
    return all.some(s=>{const e=s5data.__3cs__?.[s.n]?.[d.key]||{};return e.lovesSchool||e.learning2x||e.onTrack;});
  }
  return true;
}
function getMissingWeeks(upToWeek){
  const missing=[];
  for(let w=1;w<upToWeek;w++){
    const d=getDueForWeek(w);
    if(d&&!isFilledForWeek(w))missing.push({week:w,due:d});
  }
  return missing;
}
function renderStats(){
  const container=document.getElementById('stats-hero');
  if(!container)return;
  const weekNum=getCurrentSessionWeek();
  const due=getDueThisWeek();
  const allStudents=(CFG.students||[]).filter(s=>!s.inactive);
  const allLevels=['LL','L1','L2','MS'];
  const total=allStudents.length;
  const lvlColors={LL:'var(--ll)',L1:'var(--l1)',L2:'var(--l2)',MS:'var(--ms)'};
  const lvlBgs={LL:'var(--ll-bg)',L1:'var(--l1-bg)',L2:'var(--l2-bg)',MS:'var(--ms-bg)'};
  const lvlHex={LL:'#60a5fa',L1:'#f4896a',L2:'#5dd6c6',MS:'#f07ab0'};

  // ── Week bar ──────────────────────────────────────────────────────
  function weekDateRange(w){
    const s=new Date(2026,3,27);
    const mon=new Date(s.getTime()+(w-1)*7*24*60*60*1000);
    const fri=new Date(mon.getTime()+4*24*60*60*1000);
    const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
    return`${fmt(mon)}–${fmt(fri)}`;
  }
  function dueItemLabel(d){
    if(!d)return'';
    if(d.type==='checkpoint'){const ck=(CFG.checkpoints||[]).find(c=>c.key===d.key);return ck?ck.label:d.key;}
    if(d.type==='3cs')return'3Cs';
    return'';
  }
  const dueLabel=dueItemLabel(due);
  const nextWeekDue=getDueNextWeek();
  const nextDueLabel=dueItemLabel(nextWeekDue);
  const missingWeeks=getMissingWeeks(weekNum);
  const missingHtml=missingWeeks.map(m=>{
    const label=dueItemLabel(m.due);
    const prefix=m.week===weekNum-1?'Due last week':'Missing';
    return`<span class="ph-due-missing">⚠ ${prefix}: ${label}</span>`;
  }).join('');
  const weekInfoHtml=(weekNum>0&&weekNum<=7&&due)
    ?`<div class="s5-week-bar">
        <span class="ph-week-badge">Week ${weekNum} · ${weekDateRange(weekNum)}</span>
        ${missingHtml}
        ${dueLabel?`<span class="ph-due-now">Due this week: ${dueLabel}</span>`:''}
        ${nextDueLabel?`<span class="ph-due-next">Due next week: ${nextDueLabel}</span>`:''}
        <a href="https://session5-progress.vercel.app/editor.html${currentLevel!=='ALL'?'?level='+currentLevel:''}" class="s5-enter-btn">Enter data →</a>
      </div>`
    :`<div class="s5-week-bar"><span class="ph-week-badge">Session ${weekNum>7?'Complete':'Starting'}</span></div>`;

  // ── Checkpoint stats ──────────────────────────────────────────────
  function mostRecentChkKey(){
    if(weekNum>=7)return'w7';
    if(weekNum>=5)return'w5';
    if(weekNum>=3)return'w3';
    return'w1';
  }
  const chkKey=mostRecentChkKey();

  function chkStatsFor(students){
    let behind=0,track=0,ahead=0;
    students.forEach(s=>{
      (WORKSHOPS[s.l]||[]).forEach(ws=>{
        const v=getChk(s.n,ws.name,chkKey);
        if(v==='Behind')behind++;
        else if(v==='On Track')track++;
        else if(v==='Ahead')ahead++;
      });
    });
    return{behind,track,ahead};
  }

  // ── 3Cs stats ─────────────────────────────────────────────────────
  const threecsWeeks=[
    {key:'w2',label:'Week 2'},{key:'w4',label:'Week 4'},{key:'w6',label:'Week 6'}
  ];
  function autoThreecs(){
    const past=threecsWeeks.filter(w=>parseInt(w.key.slice(1))<weekNum);
    return past.length?past[past.length-1].key:threecsWeeks[0].key;
  }
  const tcKey=threecsWeekFilter||autoThreecs();

  function threecsStatsFor(students,key){
    let lovesY=0,l2x=0,t2pY=0;
    students.forEach(s=>{
      const d=s5data.__3cs__?.[s.n]?.[key]||{};
      if(d.lovesSchool==='Yes')lovesY++;
      if(d.learning2x==='All at 2x'||d.learning2x==='Some at 2x')l2x++;
      if(d.onTrack==='Yes')t2pY++;
    });
    return{lovesY,l2x,t2pY,total:students.length};
  }

  // ── Compute all & per-level stats ─────────────────────────────────
  const chkAll=chkStatsFor(allStudents);
  const tcAll=threecsStatsFor(allStudents,tcKey);
  const chkLvlStats={},tcLvlStats={};
  allLevels.forEach(lvl=>{
    const ls=allStudents.filter(s=>s.l===lvl);
    chkLvlStats[lvl]=chkStatsFor(ls);
    tcLvlStats[lvl]=threecsStatsFor(ls,tcKey);
  });

  // ── Mode selector ─────────────────────────────────────────────────
  const tcWeekDropdown=statMode==='3cs'
    ?`<select class="stat-mode-select" onchange="threecsWeekFilter=this.value;renderStats()">
        ${threecsWeeks.map(w=>`<option value="${w.key}"${tcKey===w.key?' selected':''}>${w.label}</option>`).join('')}
      </select>`:'';

  const modeSelectorHtml=`<div class="stat-mode-bar">
    <select class="stat-mode-select" onchange="statMode=this.value;renderStats()">
      <option value="checkpoint"${statMode==='checkpoint'?' selected':''}>Checkpoints</option>
      <option value="3cs"${statMode==='3cs'?' selected':''}>3Cs</option>
    </select>
    ${tcWeekDropdown}
  </div>`;

  // ── Stat cards ────────────────────────────────────────────────────
  let statsHtml;
  if(statMode==='checkpoint'){
    statsHtml=`<div class="campus-stats">
      <div class="cs s-total"><span class="cs-num">${total}</span><span class="cs-label">Students</span></div>
      <div class="cs s-behind"><span class="cs-num">${chkAll.behind}</span><span class="cs-label">Behind</span></div>
      <div class="cs s-track"><span class="cs-num">${chkAll.track}</span><span class="cs-label">On Track</span></div>
      <div class="cs s-ahead"><span class="cs-num">${chkAll.ahead}</span><span class="cs-label">Ahead</span></div>
    </div>`;
  }else{
    statsHtml=`<div class="campus-stats">
      <div class="cs s-total"><span class="cs-num">${total}</span><span class="cs-label">Students</span></div>
      <div class="cs s-track"><span class="cs-num">${tcAll.lovesY}</span><span class="cs-label">Love School</span></div>
      <div class="cs s-blue"><span class="cs-num">${tcAll.l2x}</span><span class="cs-label">At 2×</span></div>
      <div class="cs s-ahead"><span class="cs-num">${tcAll.t2pY}</span><span class="cs-label">T2P On Track</span></div>
    </div>`;
  }

  // ── Level cards ───────────────────────────────────────────────────
  function levelPills(lvl){
    if(statMode==='checkpoint'){
      const ls=chkLvlStats[lvl];
      return(ls.behind>0?`<span class="lvc-pill" style="background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);">${ls.behind} Behind</span>`:'')+
        (ls.track>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);">${ls.track} On Track</span>`:'')+
        (ls.ahead>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);">${ls.ahead} Ahead</span>`:'');
    }else{
      const ls=tcLvlStats[lvl];
      return(ls.lovesY>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);">♥ ${ls.lovesY}</span>`:'')+
        (ls.l2x>0?`<span class="lvc-pill" style="background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25);">2× ${ls.l2x}</span>`:'')+
        (ls.t2pY>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);">T2P ${ls.t2pY}</span>`:'');
    }
  }
  function allLevelPills(){
    if(statMode==='checkpoint'){
      return(chkAll.behind>0?`<span class="lvc-pill" style="background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);">${chkAll.behind} Behind</span>`:'')+
        (chkAll.track>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);">${chkAll.track} On Track</span>`:'')+
        (chkAll.ahead>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);">${chkAll.ahead} Ahead</span>`:'');
    }else{
      return(tcAll.lovesY>0?`<span class="lvc-pill" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);">♥ ${tcAll.lovesY}</span>`:'')+
        (tcAll.l2x>0?`<span class="lvc-pill" style="background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25);">2× ${tcAll.l2x}</span>`:'')+
        (tcAll.t2pY>0?`<span class="lvc-pill" style="background:rgba(109,40,217,.12);color:#a78bfa;border:1px solid rgba(196,181,253,.25);">T2P ${tcAll.t2pY}</span>`:'');
    }
  }

  function levelBarPct(lvl){
    if(statMode==='checkpoint'){
      const ls=chkLvlStats[lvl];
      const filled=ls.behind+ls.track+ls.ahead;
      const slots=(WORKSHOPS[lvl]||[]).length*allStudents.filter(s=>s.l===lvl).length;
      return slots>0?Math.round(filled/slots*100):0;
    }else{
      const ls=tcLvlStats[lvl];
      return ls.total>0?Math.round(ls.lovesY/ls.total*100):0;
    }
  }

  const pctAll=statMode==='checkpoint'
    ?(()=>{const slots=allStudents.reduce((a,s)=>a+(WORKSHOPS[s.l]||[]).length,0);return slots>0?Math.round((chkAll.behind+chkAll.track+chkAll.ahead)/slots*100):0;})()
    :(total>0?Math.round(tcAll.lovesY/total*100):0);

  const allActive=currentLevel==='ALL';
  const allCard=`<div class="lvc" onclick="setLevelCard('ALL')" style="${allActive?'background:rgba(148,163,184,.1);border-color:#94a3b8;':''}">
    <div class="lvc-top"><span class="lvc-label" style="color:${allActive?'#cbd5e1':'var(--muted2)'}">All</span><span class="lvc-count">${total}</span></div>
    <div class="lvc-pills">${allLevelPills()}</div>
    <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${pctAll}%;background:#94a3b8;"></div></div><span class="lvc-bar-label">${pctAll}%</span></div>
  </div>`;

  const lvlCardsHtml=allLevels.map(lvl=>{
    const isActive=lvl===currentLevel;
    const cnt=allStudents.filter(s=>s.l===lvl).length;
    const pct=levelBarPct(lvl);
    return`<div class="lvc" onclick="setLevelCard('${lvl}')" style="${isActive?`background:${lvlBgs[lvl]};border-color:${lvlColors[lvl]};`:''}">
      <div class="lvc-top"><span class="lvc-label" style="color:${lvlColors[lvl]}">${lvl}</span><span class="lvc-count">${cnt} students</span></div>
      <div class="lvc-pills">${levelPills(lvl)}</div>
      <div class="lvc-bar-wrap"><div class="lvc-bar"><div class="lvc-bar-fill" style="width:${pct}%;background:${lvlColors[lvl]};"></div></div><span class="lvc-bar-label">${pct}%</span></div>
    </div>`;
  }).join('');

  container.innerHTML=`<div class="page-hero">
    <div class="ph-live">Live · Session 5</div>
    <div class="s5-kicker">Alpha NYC · Session 5 · 2026</div>
    <h1 class="s5-h1">Session <em>5</em> Data <em>Tracker</em></h1>
    <p class="s5-sub">Workshop progress, checkpoints &amp; 3Cs</p>
    ${weekInfoHtml}
    ${modeSelectorHtml}
    ${statsHtml}
    <div class="level-selector">${allCard}${lvlCardsHtml}</div>
    <div class="s5-hist-link"><a href="https://t2p-dashboard.vercel.app/tracker.html" target="_blank" rel="noopener noreferrer">Previous T2P data ↗</a></div>
  </div>`;
}

function setLevelCard(l){
  currentLevel=l;
  populateWsFilter();
  render();
  document.querySelector('.controls')?.scrollIntoView({behavior:'smooth',block:'start'});
}

async function loadData(){
  try{
    const r = await window.storage.get('s5data');
    if(r?.value) s5data = JSON.parse(r.value);
  }catch(e){}
  populateWsFilter();
  render();
}

function populateWsFilter(){
  const sel = document.getElementById('wsFilter');
  sel.innerHTML = '<option value="">All workshops</option>';
  const levels = currentLevel==='ALL' ? ['LL','L1','L2','MS'] : [currentLevel];
  levels.forEach(lvl=>{
    (WORKSHOPS[lvl]||[]).forEach(ws=>{
      const o=document.createElement('option');
      o.value=ws.name;
      o.textContent=currentLevel==='ALL'?`[${lvl}] ${ws.code} — ${ws.name}`:`${ws.code} — ${ws.name}`;
      sel.appendChild(o);
    });
  });
}

function setLevel(l){
  currentLevel=l;
  populateWsFilter();
  render();
}

function getChk(studentName,wsName,chkKey){
  return s5data[studentName]?.[`__chk__${wsName}__${chkKey}`]||null;
}
function getFinal(studentName,wsName){
  return s5data[studentName]?.[wsName]||null;
}

function dotHtml(val){
  if(val==='Passed')return'<span class="chk-dot st-pass">✓</span>';
  if(val==='Not passed'||val==='Not Yet')return'<span class="chk-dot st-fail">✗</span>';
  if(val==='Behind')return'<span class="chk-dot st-behind">B</span>';
  if(val==='On Track')return'<span class="chk-dot st-track">T</span>';
  if(val==='Ahead')return'<span class="chk-dot st-ahead">A</span>';
  if(val==='Absent')return'<span class="chk-dot st-absent">–</span>';
  return'<span class="chk-dot st-empty"></span>';
}

function finalPill(val){
  if(val==='Passed')     return '<span class="st-pill pass">✓ Earned</span>';
  if(val==='Not passed'||val==='Not Yet') return '<span class="st-pill fail">Not yet</span>';
  if(val==='Absent')     return '<span class="st-pill absent">– Absent</span>';
  return '<span class="st-pill pending">— Pending</span>';
}

function getDeliverables(wsName) {
  return s5data.__deliverables__?.[wsName] || [];
}
function getMeetings(wsName) {
  return s5data.__wsmeetings__?.[wsName] || [];
}
function getTownhalls() {
  return s5data.__townhalls__ || [];
}

function toggleWs(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function render(){
  renderStats();
  const wsFilter=document.getElementById('wsFilter').value;
  const sort=document.getElementById('sortSel').value;
  const due=getDueThisWeek();
  const levelsToRender=currentLevel==='ALL'?['LL','L1','L2','MS']:[currentLevel];
  const lvlNames={LL:'Learning Lab',L1:'Level 1',L2:'Level 2',MS:'Middle School'};

  const allBlocks=[];
  let totalStudents=0,totalWs=0;

  levelsToRender.forEach(lvl=>{
    let workshops=WORKSHOPS[lvl]||[];
    if(wsFilter) workshops=workshops.filter(w=>w.name===wsFilter);
    let students=(CFG.students||[]).filter(s=>s.l===lvl&&!s.inactive);
    if(sort==='progress'){
      students=students.sort((a,b)=>{
        const pa=workshops.filter(w=>getFinal(a.n,w.name)==='Passed').length;
        const pb=workshops.filter(w=>getFinal(b.n,w.name)==='Passed').length;
        return pb-pa;
      });
    } else {
      students=students.sort((a,b)=>a.n.localeCompare(b.n));
    }
    if(!students.length||!workshops.length) return;
    totalStudents+=students.length;
    totalWs+=workshops.length;
    const color=LEVEL_COLORS[lvl];
    const bg=LEVEL_BGS[lvl];
    if(currentLevel==='ALL'){
      allBlocks.push(`<div class="lvl-section-head" style="color:${color};border-color:${color};">${lvlNames[lvl]} · ${students.length} students</div>`);
    }
    workshops.forEach((ws,wsIdx)=>{
      const wsId=`ws-${lvl}-${wsIdx}`;
      const skipped=s5data.__skip__?.[ws.name];
      const filledCount=students.filter(s=>CHECKPOINTS.some(c=>getChk(s.n,ws.name,c.key))||getFinal(s.n,ws.name)).length;
      const pct=students.length?Math.round(filledCount/students.length*100):0;
      const skipBadge=skipped?`<span style="font-family:'DM Mono',monospace;font-size:9px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:2px 7px;border-radius:4px;margin-left:6px">data not collected</span>`:'';
      // Which 3Cs week to show (due week, else most recent past, else w2)
      const tcWeeks=['w2','w4','w6'];
      const tcWkNum=w=>parseInt(w.slice(1));
      const wkNum=getCurrentSessionWeek();
      const tcKey=(due&&due.type==='3cs')?due.key:(tcWeeks.filter(w=>tcWkNum(w)<wkNum).pop()||'w2');
      const tcLabel={w2:'Wk 2',w4:'Wk 4',w6:'Wk 6'}[tcKey];
      const tc3cDue=due&&due.type==='3cs'&&due.key===tcKey;
      function tc3cCell(sName){
        const d=s5data.__3cs__?.[sName]?.[tcKey]||{};
        if(!d.lovesSchool&&!d.learning2x&&!d.onTrack)return`<td class="tc-td"><span style="color:var(--border2);font-size:16px">○</span></td>`;
        const lC=d.lovesSchool==='Yes'?'#34d399':d.lovesSchool==='No'?'#f87171':'var(--muted2)';
        const lT=d.lovesSchool==='Yes'?'♥':d.lovesSchool==='No'?'✗':'·';
        const lBg=d.lovesSchool==='Yes'?'rgba(52,211,153,.12)':d.lovesSchool==='No'?'rgba(248,113,113,.12)':'transparent';
        const xC=d.learning2x?.includes('All')?'#4ade80':d.learning2x?.includes('Some')?'#fbbf24':d.learning2x?'#f87171':'var(--muted2)';
        const xT=d.learning2x?.includes('All')?'2×':d.learning2x?.includes('Some')?'½×':d.learning2x?'✗':'·';
        const tC=d.onTrack==='Yes'?'#34d399':d.onTrack==='No'?'#f87171':'var(--muted2)';
        const tT=d.onTrack==='Yes'?'T✓':d.onTrack==='No'?'T✗':'·';
        return`<td class="tc-td" title="Loves School: ${d.lovesSchool||'—'} · 2×: ${d.learning2x||'—'} · T2P: ${d.onTrack||'—'}">
          <span class="tc-dot" style="color:${lC};background:${lBg}">${lT}</span>
          <span class="tc-dot" style="color:${xC}">${xT}</span>
          <span class="tc-dot" style="color:${tC}">${tT}</span>
        </td>`;
      }
      const headerRow=`<th style="min-width:160px">Student</th>${CHECKPOINTS.map(c=>{
        const isDue=due&&due.type==='checkpoint'&&due.key===c.key;
        return`<th class="chk-th${isDue?' chk-th-due':''}">${c.label}${isDue?'<span class="due-col-badge">Due this Week</span>':''}</th>`;
      }).join('')}<th>Status</th><th class="tc-th${tc3cDue?' chk-th-due':''}">3Cs · ${tcLabel}${tc3cDue?'<span class="due-col-badge">Due this Week</span>':''}</th>`;
      const bodyRows=students.map(s=>{
        const chkCells=CHECKPOINTS.map(c=>{
          const isDue=due&&due.type==='checkpoint'&&due.key===c.key;
          const val=getChk(s.n,ws.name,c.key);
          return`<td class="chk-td${isDue?' due-col':''}"><a href="https://session5-progress.vercel.app/editor.html?level=${lvl}" class="dot-link" title="Enter ${c.label} for ${s.n}">${dotHtml(val)}</a></td>`;
        }).join('');
        return`<tr><td><span class="s-name">${s.n}</span>${s.note?`<span class="s-note">* ${s.note}</span>`:''}</td>${chkCells}<td>${finalPill(getFinal(s.n,ws.name))}</td>${tc3cCell(s.n)}</tr>`;
      }).join('');
      allBlocks.push(`<div class="ws-block" id="${wsId}">
        <div class="ws-block-header" onclick="toggleWs('${wsId}')">
          <span class="ws-code-badge" style="background:${bg};color:${color}">${ws.code}</span>
          <div class="ws-info"><div class="ws-name">${ws.name}${skipBadge}</div><div class="ws-guide-row">${ws.day}</div></div>
          <span class="ws-skill-pill">${ws.skill}</span>
          <div class="ws-pbar-wrap"><div class="ws-pbar"><div class="ws-pbar-fill" style="width:${pct}%"></div></div><span class="ws-pbar-label">${filledCount}/${students.length} filled</span></div>
          <span class="ws-chevron">▼</span>
        </div>
        <div class="ws-body">
          <div class="ican-row"><span class="ican-tag">I can</span><span>${ws.ican}</span></div>
          <div class="ws-table-wrap"><table><thead><tr>${headerRow}</tr></thead><tbody>${bodyRows}</tbody></table></div>
        </div>
      </div>`);
    });
  });

  document.getElementById('count-pill').textContent=`${totalStudents} students · ${totalWs} workshops`;
  document.getElementById('page').innerHTML=allBlocks.join('');
}

// Render hero immediately so it shows before storage resolves
renderStats();
populateWsFilter();
loadData();
</script>
</body>
</html>
