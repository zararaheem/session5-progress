<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha NYC — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080e1a;--surface:#0d1829;--surface2:#111f36;--surface3:#162440;
  --border:#1e3050;--border2:#264070;
  --text:#e8f0fc;--muted:#4a6080;--muted2:#7090b0;
  --accent:#3b82f6;--accent2:#60a5fa;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:48px 48px;}

/* HEADER */
header{position:sticky;top:0;z-index:50;padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,14,26,.95);backdrop-filter:blur(10px);}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent2);display:flex;align-items:center;padding:16px 20px 16px 0;border-right:1px solid var(--border);margin-right:16px;}
.header-title{font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);padding:4px 10px;border-radius:20px;}
.live-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);text-decoration:none;padding:6px 13px;border:1px solid var(--border);border-radius:6px;transition:all .15s;background:transparent;cursor:pointer;}
.hdr-btn:hover{color:var(--accent2);border-color:var(--accent);}
.hdr-btn.unlock{color:var(--accent2);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.06);}

/* SESSION TABS — top level */
.session-rail{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none;}
.session-rail::-webkit-scrollbar{display:none;}
.srail-btn{font-family:'DM Mono',monospace;font-size:11px;padding:14px 22px;color:var(--muted2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
.srail-btn:hover{color:var(--accent2);}
.srail-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}
.s5-live-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;flex-shrink:0;}

/* INNER TABS — photos / video / notes */
.inner-tabs{display:flex;gap:6px;padding:16px 28px 0;flex-wrap:wrap;}
.itab{font-family:'DM Mono',monospace;font-size:10px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted2);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.07em;}
.itab:hover{border-color:var(--accent);color:var(--accent2);}
.itab.active{background:rgba(59,130,246,.12);border-color:var(--accent);color:var(--accent2);}

/* PAGE */
.page{position:relative;z-index:1;padding:20px 28px 60px;}

/* ADMIN BAR */
.pw-row{display:flex;align-items:center;gap:8px;padding:12px 0;flex-wrap:wrap;}
.pw-inp{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:6px;outline:none;width:140px;}
.pw-inp:focus{border-color:var(--accent);}
.pw-submit{font-family:'DM Mono',monospace;font-size:11px;background:var(--accent);color:white;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-weight:600;}
.pw-err{font-family:'DM Mono',monospace;font-size:11px;color:#f87171;}

.admin-panel{background:var(--surface2);border:1px dashed var(--border2);border-radius:10px;padding:16px 18px;margin-bottom:20px;}
.admin-panel-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.admin-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.adm-inp{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:6px;outline:none;flex:1;min-width:160px;}
.adm-inp:focus{border-color:var(--accent);}
.adm-textarea{font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:6px;outline:none;width:100%;resize:vertical;min-height:70px;margin-bottom:8px;line-height:1.5;}
.adm-textarea:focus{border-color:var(--accent);}
.adm-btn{font-family:'DM Mono',monospace;font-size:11px;background:var(--accent);color:white;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-weight:600;white-space:nowrap;transition:all .15s;}
.adm-btn:hover{background:var(--accent2);}
.adm-btn.sec{background:var(--surface);color:var(--accent2);border:1px solid var(--border2);}
.adm-btn.sec:hover{border-color:var(--accent);}

/* VIDEO PLAYER */
.video-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.video-wrap iframe,.video-wrap video{width:100%;display:block;border:none;}
.video-empty{padding:48px 24px;text-align:center;color:var(--muted2);font-size:13px;}
.video-empty-icon{font-size:36px;margin-bottom:12px;opacity:.3;}
.video-meta{padding:8px 14px 14px;display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.video-meta a{color:var(--muted2);text-decoration:none;}
.video-meta a:hover{color:var(--accent2);}

/* PHOTO GRID */
.photo-grid{columns:3 260px;column-gap:10px;margin-bottom:20px;}
.photo-item{break-inside:avoid;margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;position:relative;}
.photo-item:hover{transform:scale(1.01);border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.photo-item img{width:100%;display:block;}
.photo-caption{padding:7px 11px;font-size:11px;color:var(--muted2);border-top:1px solid var(--border);}
.photo-del{position:absolute;top:7px;right:7px;background:rgba(8,14,26,.85);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;display:none;transition:all .15s;}
.photo-item:hover .photo-del{display:block;}

/* NOTES */
.notes-list{display:flex;flex-direction:column;gap:10px;}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;}
.note-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text);padding-right:28px;}
.note-body{font-size:13px;color:var(--muted2);line-height:1.65;white-space:pre-wrap;}
.note-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px;}
.note-del{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s;}
.note-del:hover{color:#f87171;}

/* EMPTY */
.empty-state{padding:60px 20px;text-align:center;color:var(--muted2);}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.25;display:block;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lb-img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;}
.lb-close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;width:34px;height:34px;border-radius:7px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.lb-close:hover{background:rgba(255,255,255,.2);}
.lb-caption{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.6);text-align:center;font-family:'DM Mono',monospace;max-width:400px;}

footer{position:relative;z-index:1;padding:20px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
footer a{color:var(--muted2);text-decoration:none;}

@media(max-width:640px){
  .page,.inner-tabs{padding-left:16px;padding-right:16px;}
  header{padding:0 16px;}
  .photo-grid{columns:2 160px;}
  footer{padding:16px;}
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <span class="logo">Alpha · NYC</span>
    <span class="header-title">Gallery</span>
  </div>
  <div class="hdr-right">
    <span class="live-badge">S5 Live</span>
    <a href="index.html" class="hdr-btn">← Home</a>
    <button class="hdr-btn unlock" id="admin-toggle" onclick="toggleAdminMode()">+ Manage</button>
  </div>
</header>

<!-- Session rail -->
<div class="session-rail" id="session-rail">
  <button class="srail-btn active" data-sess="S5" onclick="switchSession('S5',this)"><span class="s5-live-dot"></span>Session 5</button>
  <button class="srail-btn" data-sess="S4" onclick="switchSession('S4',this)">Session 4</button>
  <button class="srail-btn" data-sess="S3" onclick="switchSession('S3',this)">Session 3</button>
  <button class="srail-btn" data-sess="S2" onclick="switchSession('S2',this)">Session 2</button>
  <button class="srail-btn" data-sess="S1" onclick="switchSession('S1',this)">Session 1</button>
</div>

<!-- Password prompt (hidden until needed) -->
<div id="pw-bar" style="display:none;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);">
  <div class="pw-row">
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);">Access code:</span>
    <input class="pw-inp" id="pw-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
    <button class="pw-submit" onclick="unlock()">Unlock →</button>
    <span class="pw-err" id="pw-err"></span>
  </div>
</div>

<!-- Inner tabs -->
<div class="inner-tabs" id="inner-tabs">
  <button class="itab active" data-tab="photos" onclick="switchTab('photos',this)">Photos</button>
  <button class="itab" data-tab="video" onclick="switchTab('video',this)">Video</button>
  <button class="itab" data-tab="notes" onclick="switchTab('notes',this)">Notes</button>
</div>

<div class="page" id="page-content"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<footer>
  <span>Alpha Space Agency · NYC · Session 05</span>
  <a href="index.html">← Home</a>
</footer>

<script>
const PW = 'nyc2025';
let adminUnlocked = false;
let activeSess = 'S5';
let activeTab  = 'photos';

// data shape: { S1:{photos:[],video:'',notes:[]}, S2:{...}, ... }
let gdata = { S1:{photos:[],video:'',notes:[]}, S2:{photos:[],video:'',notes:[]},
              S3:{photos:[],video:'',notes:[]}, S4:{photos:[],video:'',notes:[]},
              S5:{photos:[],video:'',notes:[]} };

// S4 has a default Frame.io embed
const S4_FRAMEIO = 'https://next.frame.io/project/32598040-dc78-4dca-9199-71a429d89ca7';
const S4_FRAMEIO_SHORT = 'https://f.io/ep4qPU7H';

// ── Storage ────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await window.storage.get('gallery_v2');
    if (r?.value) {
      const saved = JSON.parse(r.value);
      // Merge saved into defaults (in case new sessions added)
      Object.keys(gdata).forEach(s => {
        if (saved[s]) gdata[s] = { photos:[], video:'', notes:[], ...saved[s] };
      });
    }
  } catch(e) {}
  render();
}

async function save() {
  try { await window.storage.set('gallery_v2', JSON.stringify(gdata)); }
  catch(e) { alert('Save failed — storage limit may be reached'); }
}

// ── Navigation ─────────────────────────────────────────────────────
function switchSession(sess, btn) {
  activeSess = sess;
  activeTab  = 'photos';
  document.querySelectorAll('.srail-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.itab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === 'photos');
  });
  render();
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.itab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Admin ──────────────────────────────────────────────────────────
function toggleAdminMode() {
  if (adminUnlocked) {
    adminUnlocked = false;
    document.getElementById('admin-toggle').textContent = '+ Manage';
    document.getElementById('pw-bar').style.display = 'none';
    render(); return;
  }
  const bar = document.getElementById('pw-bar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
}

function unlock() {
  const val = document.getElementById('pw-input').value;
  if (val === PW) {
    adminUnlocked = true;
    document.getElementById('pw-bar').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('admin-toggle').textContent = '✕ Exit manage';
    render();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect.';
    setTimeout(() => document.getElementById('pw-err').textContent = '', 2000);
  }
}

// ── Photos ─────────────────────────────────────────────────────────
function addPhotoUrl() {
  const url  = document.getElementById('p-url').value.trim();
  const cap  = document.getElementById('p-cap').value.trim();
  if (!url) return;
  gdata[activeSess].photos.unshift({ url, cap, ts: Date.now() });
  document.getElementById('p-url').value = '';
  document.getElementById('p-cap').value = '';
  save(); render();
}

function uploadPhotos(input) {
  const cap = document.getElementById('p-cap')?.value.trim() || '';
  Array.from(input.files).forEach(file => {
    if (file.size > 2.5 * 1024 * 1024) { alert(`${file.name} too large (max 2.5MB)`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      gdata[activeSess].photos.unshift({ url: e.target.result, cap, ts: Date.now() });
      save(); render();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function deletePhoto(idx) {
  if (!confirm('Remove this photo?')) return;
  gdata[activeSess].photos.splice(idx, 1);
  save(); render();
}

function openLightbox(url, cap) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-caption').textContent = cap || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Video ──────────────────────────────────────────────────────────
async function saveSheetUrl() {
  const url = document.getElementById(`sheet-url-${activeSess}`)?.value.trim();
  gdata[activeSess].sheetUrl = url || '';
  await save();
  if (url) pullFromSheet();
  else render();
}

async function pullFromSheet() {
  const url = gdata[activeSess].sheetUrl;
  if (!url) return;
  const statusEl = document.getElementById('sheet-status');
  if (statusEl) statusEl.textContent = 'Pulling…';
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('Fetch failed');
    const csv = await r.text();
    const lines = csv.split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    const headers = lines[0].map(h => h.toLowerCase());
    const urlIdx = headers.indexOf('url');
    const capIdx = headers.indexOf('caption');
    if (urlIdx === -1) { if (statusEl) statusEl.textContent = '⚠ No "url" column found in sheet'; return; }
    const existing = new Set(gdata[activeSess].photos.map(p => p.url));
    let added = 0;
    for (let i = 1; i < lines.length; i++) {
      const row = lines[i];
      const imgUrl = row[urlIdx]?.trim();
      if (!imgUrl || existing.has(imgUrl)) continue;
      const cap = capIdx >= 0 ? (row[capIdx]||'').trim() : '';
      gdata[activeSess].photos.unshift({ url: imgUrl, cap, ts: Date.now(), fromSheet: true });
      added++;
    }
    await save();
    if (statusEl) statusEl.textContent = added > 0 ? `✓ Added ${added} photo${added>1?'s':''} from sheet` : '✓ Up to date — no new photos';
    render();
  } catch(e) {
    if (statusEl) statusEl.textContent = '⚠ Could not fetch — ensure sheet is published publicly as CSV';
  }
}

function saveVideo() {
  const url = document.getElementById('v-url')?.value.trim();
  if (!url) return;
  gdata[activeSess].video = url;
  save(); render();
}

function clearVideo() {
  if (!confirm('Remove video?')) return;
  gdata[activeSess].video = '';
  save(); render();
}

function videoEmbed(url, height) {
  if (!url) return null;
  height = height || 480;
  if (url.match(/youtube\.com|youtu\.be/)) {
    const id = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?/]+)/)?.[1];
    if (id) return `<iframe src="https://www.youtube.com/embed/${id}?rel=0" height="${height}" allow="fullscreen" allowfullscreen></iframe>`;
  }
  if (url.match(/vimeo\.com/)) {
    const id = url.match(/vimeo\.com\/(\d+)/)?.[1];
    if (id) return `<iframe src="https://player.vimeo.com/video/${id}" height="${height}" allow="fullscreen" allowfullscreen></iframe>`;
  }
  if (url.match(/drive\.google\.com/)) {
    const id = url.match(/\/d\/([^/]+)/)?.[1];
    if (id) return `<iframe src="https://drive.google.com/file/d/${id}/preview" height="${height}" allow="fullscreen"></iframe>`;
  }
  if (url.match(/frame\.io|f\.io/)) {
    return `<iframe src="${url.replace('f.io','app.frame.io/reviews')}" height="${height}" allow="fullscreen"></iframe>`;
  }
  if (url.match(/\.(mp4|webm|mov)(\?|$)/i)) {
    return `<video controls style="height:${height}px;background:#000;"><source src="${url}">Your browser does not support video.</video>`;
  }
  return `<iframe src="${url}" height="${height}" allow="fullscreen"></iframe>`;
}

// ── Notes ──────────────────────────────────────────────────────────
function addNote() {
  const title = document.getElementById('n-title')?.value.trim();
  const body  = document.getElementById('n-body')?.value.trim();
  if (!body) return;
  gdata[activeSess].notes.unshift({ title, body, ts: Date.now() });
  document.getElementById('n-title').value = '';
  document.getElementById('n-body').value = '';
  save(); render();
}

function deleteNote(idx) {
  if (!confirm('Delete this note?')) return;
  gdata[activeSess].notes.splice(idx, 1);
  save(); render();
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const sess   = gdata[activeSess];
  const isS5   = activeSess === 'S5';
  const isS4   = activeSess === 'S4';
  let html = '';

  if (activeTab === 'photos') {
    // Admin panel
    if (adminUnlocked) {
      html += `<div class="admin-panel">
        <div class="admin-panel-title">Add photos — ${activeSess}</div>
        <div class="admin-row">
          <input class="adm-inp" id="p-url" placeholder="Image URL (https://…)" onkeydown="if(event.key==='Enter')addPhotoUrl()">
          <input class="adm-inp" id="p-cap" placeholder="Caption (optional)" style="max-width:240px">
          <button class="adm-btn" onclick="addPhotoUrl()">+ Add URL</button>
          <button class="adm-btn sec" onclick="document.getElementById('p-file').click()">↑ Upload file</button>
          <input type="file" id="p-file" accept="image/*" multiple style="display:none" onchange="uploadPhotos(this)">
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;">📋 Pull from Google Sheet (Slack → Zapier → Sheet)</div>
          <div class="admin-row" style="margin-bottom:0">
            <input class="adm-inp" id="sheet-url-${activeSess}" placeholder="Published Google Sheet CSV URL" value="${sess.sheetUrl||''}">
            <button class="adm-btn" onclick="saveSheetUrl()">Save feed</button>
            ${sess.sheetUrl?`<button class="adm-btn sec" onclick="pullFromSheet()">↓ Pull now</button>`:''}
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;">Sheet must have columns: <strong style="color:var(--muted2)">url</strong> and optionally <strong style="color:var(--muted2)">caption</strong> · File → Share → Publish to web → CSV</div>
          ${sess.sheetUrl?`<div id="sheet-status" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);margin-top:4px;"></div>`:''}
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px;">Max 2.5MB per uploaded file · For large collections use image URLs or a Google Sheet feed</div>
      </div>`;
    }

    // S4 Frame.io gallery + local photos
    if (isS4) {
      html += `<div class="video-wrap" style="margin-bottom:20px;">
        <iframe src="${S4_FRAMEIO}" width="75%" title="S4 Frame.io Gallery"></iframe>
        <div class="video-meta"><span>Session 4 · Google Drive</span><a href="${S4_FRAMEIO_SHORT}" target="_blank">Open in Drive ↗</a></div>
      </div>`;
    }

    if (!sess.photos.length && !isS4) {
      html += `<div class="empty-state"><span class="empty-icon">📷</span><div>No photos yet for ${activeSess}.</div>${adminUnlocked?'<div style="margin-top:8px;font-size:12px;color:var(--muted)">Use the panel above to add photos.</div>':''}</div>`;
    } else if (sess.photos.length) {
      html += `<div class="photo-grid">${sess.photos.map((p,i) => `
        <div class="photo-item" onclick="openLightbox('${p.url.replace(/'/g,"\\'")}','${(p.cap||'').replace(/'/g,"\\'")}')">
          <img src="${p.url}" alt="${p.cap||''}" loading="lazy" onerror="this.parentElement.style.display='none'">
          ${p.cap ? `<div class="photo-caption">${p.cap}</div>` : ''}
          ${adminUnlocked ? `<button class="photo-del" onclick="event.stopPropagation();deletePhoto(${i})">✕ Remove</button>` : ''}
        </div>`).join('')}</div>`;
    }
  }

  else if (activeTab === 'video') {
    if (adminUnlocked) {
      html += `<div class="admin-panel">
        <div class="admin-panel-title">Video — ${activeSess}</div>
        <div class="admin-row">
          <input class="adm-inp" id="v-url" placeholder="YouTube, Vimeo, Google Drive, Frame.io, or direct .mp4 URL" value="${sess.video||''}">
          <button class="adm-btn" onclick="saveVideo()">Save video</button>
          ${sess.video ? `<button class="adm-btn sec" onclick="clearVideo()">✕ Remove</button>` : ''}
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;">Supports: YouTube · Vimeo · Google Drive · Frame.io · Direct .mp4 link</div>
        ${isS4 ? `<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);margin-top:8px;">S4 already has Frame.io embedded below. Paste a URL above to add a highlight reel on top.</div>` : ''}
      </div>`;
    }

    // Custom video first
    const embed = videoEmbed(sess.video, 520);
    if (embed) {
      html += `<div class="video-wrap">${embed}
        <div class="video-meta"><span>${activeSess} Highlights</span></div>
      </div>`;
    }

    // S4 always also shows Frame.io
    if (isS4) {
      html += `<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:${embed?'20px':'0'}">Session 4 · Frame.io Review</div>
        <div class="video-wrap">
          <iframe src="${S4_FRAMEIO}" height="540" allow="fullscreen" title="S4 Frame.io"></iframe>
          <div class="video-meta"><span>Frame.io · Session 4</span><a href="${S4_FRAMEIO_SHORT}" target="_blank">Open in Frame.io ↗</a></div>
        </div>`;
    }

    if (!embed && !isS4) {
      html += `<div class="empty-state"><span class="empty-icon">🎬</span>
        <div>No video yet for ${activeSess}.</div>
        ${adminUnlocked ? '<div style="margin-top:8px;font-size:12px;color:var(--muted)">Paste a video URL in the panel above.</div>' : '<div style="margin-top:8px;font-size:12px;color:var(--muted)">Video will appear here once added.</div>'}
      </div>`;
    }
  }

  else if (activeTab === 'notes') {
    if (adminUnlocked) {
      html += `<div class="admin-panel">
        <div class="admin-panel-title">Add note — ${activeSess}</div>
        <input class="adm-inp" id="n-title" placeholder="Title (optional)" style="width:100%;margin-bottom:8px">
        <textarea class="adm-textarea" id="n-body" placeholder="Write a note, reflection, weekly recap, or field trip description…"></textarea>
        <button class="adm-btn" onclick="addNote()">+ Add note</button>
      </div>`;
    }

    if (!sess.notes.length) {
      html += `<div class="empty-state"><span class="empty-icon">📝</span><div>No notes yet for ${activeSess}.</div></div>`;
    } else {
      html += `<div class="notes-list">${sess.notes.map((n,i) => `
        <div class="note-card">
          ${adminUnlocked ? `<button class="note-del" onclick="deleteNote(${i})">✕</button>` : ''}
          ${n.title ? `<div class="note-title">${n.title}</div>` : ''}
          <div class="note-body">${n.body}</div>
          <div class="note-date">${new Date(n.ts).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        </div>`).join('')}
      </div>`;
    }
  }

  document.getElementById('page-content').innerHTML = html;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
load();
</script>
</body>
</html>
