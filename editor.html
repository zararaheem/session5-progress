<style>
:root{
  --bg:#080e1a;--surface:#0d1829;--surface2:#111f36;--surface3:#162440;
  --border:#1e3050;--border2:#264070;
  --text:#e8f0fc;--muted:#4a6080;--muted2:#7090b0;
  --accent:#3b82f6;--accent2:#60a5fa;--glow:rgba(59,130,246,0.15);
  --pass:#34d399;--fail:#f87171;--absent:#fbbf24;--track:#60a5fa;--ahead:#a78bfa;--admin:#818cf8;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:40px 40px;}

/* WHO PICKER */
.who-wrap{position:relative;}
.who-btn{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.07);color:#f87171;cursor:pointer;outline:none;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px;}
.who-btn.set{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--accent2);}
.who-btn.set-admin{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.3);color:#818cf8;}
.who-dropdown{position:absolute;top:calc(100% + 6px);right:0;width:190px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;max-height:240px;overflow-y:auto;z-index:300;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.who-dropdown.open{display:block;}
.who-opt{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s;}
.who-opt:hover{background:rgba(59,130,246,.1);color:var(--accent2);}
.who-opt-admin{color:#818cf8;font-weight:600;border-bottom:1px solid var(--border);padding-bottom:10px;}
.who-opt-admin:hover{background:rgba(129,140,248,.1);color:#a5b4fc;}

/* GUIDE BANNER */
.guide-banner{padding:10px 28px;background:rgba(59,130,246,.05);border-bottom:1px solid rgba(59,130,246,.12);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.guide-chips{display:flex;flex-wrap:wrap;gap:6px;}
.guide-chip{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);color:var(--muted2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:0;letter-spacing:.02em;}
.guide-chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(59,130,246,.1);}
.guide-chip.selected{border-color:var(--accent);background:rgba(59,130,246,.18);color:var(--accent2);box-shadow:0 0 0 2px rgba(59,130,246,.2);}
.guide-chip.dimmed{opacity:0.28;}
.guide-chip.admin-chip{width:auto;padding:0 12px;border-radius:20px;border-color:rgba(129,140,248,.35);color:#818cf8;font-size:12px;}
.guide-chip.admin-chip:hover{background:rgba(129,140,248,.12);color:#a5b4fc;}
.guide-chip.admin-chip.selected{border-color:#818cf8;background:rgba(129,140,248,.18);color:#a5b4fc;box-shadow:0 0 0 2px rgba(129,140,248,.2);}
.by-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;margin-left:4px;}

/* ADMIN PASSWORD MODAL */
.admin-pass-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.admin-pass-overlay.open{display:flex;}
.admin-pass-box{background:var(--surface);border:1px solid rgba(129,140,248,.35);border-radius:16px;padding:36px 32px;width:100%;max-width:320px;text-align:center;box-shadow:0 0 0 1px rgba(129,140,248,.1),0 20px 50px rgba(0,0,0,.6);}
.admin-pass-title{font-size:20px;font-weight:600;color:#a5b4fc;margin-bottom:4px;}
.admin-pass-sub{font-size:12px;color:var(--muted2);margin-bottom:22px;}
.admin-pass-box input[type=password]{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;letter-spacing:.2em;text-align:center;outline:none;margin-bottom:6px;transition:border-color .2s;}
.admin-pass-box input[type=password]:focus{border-color:rgba(129,140,248,.5);}
.admin-pass-err{color:var(--fail);font-size:12px;min-height:18px;margin-bottom:12px;font-family:'DM Mono',monospace;}
.admin-pass-actions{display:flex;gap:8px;justify-content:center;}
.admin-pass-actions button{padding:8px 20px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.admin-pass-actions button.primary{background:#818cf8;border-color:#818cf8;color:white;font-weight:600;}
.admin-pass-actions button.primary:hover{background:#a5b4fc;}

/* ACTIVITY TAB */
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;background:#ef4444;color:white;border-radius:8px;font-size:9px;font-weight:700;padding:0 4px;margin-left:4px;line-height:1;}
.act-header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 8px;max-width:900px;margin:0 auto;}
.act-new-badge{font-family:'DM Mono',monospace;font-size:11px;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:3px 10px;border-radius:20px;}
.act-list{padding:0 28px 28px;display:flex;flex-direction:column;gap:6px;max-width:900px;margin:0 auto;}
.act-entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.act-entry.act-new{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.04);}
.act-who{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--accent2);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:70px;text-align:center;}
.act-detail{flex:1;min-width:0;}
.act-student{font-size:13px;font-weight:500;color:var(--text);}
.act-info{font-size:11px;color:var(--muted2);margin-top:1px;}
.act-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.act-val{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--muted2);white-space:nowrap;margin-left:4px;}
.act-empty{padding:60px;text-align:center;color:var(--muted2);font-style:italic;font-size:13px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}

/* APP */
#app{display:block;position:relative;z-index:1;}
header{top:37px;background:rgba(13,24,41,.95);border-bottom:1px solid var(--border2);padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);}
.header-left{display:flex;align-items:center;}
.header-wordmark{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent2);padding:18px 20px 18px 0;border-right:1px solid var(--border);margin-right:16px;}
.header-title{font-size:14px;font-weight:500;color:var(--text);}
.s5-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:2px 7px;border-radius:4px;letter-spacing:.08em;margin-left:10px;}
.header-right{display:flex;align-items:center;gap:8px;}
.user-pill{font-family:'DM Mono',monospace;font-size:11px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--accent2);padding:5px 12px;border-radius:6px;}
.superadmin-pill{font-family:'DM Mono',monospace;font-size:10px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.3);color:var(--admin);padding:3px 8px;border-radius:4px;}
.hdr-btn{font-family:'DM Mono',monospace;font-size:11px;padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.hdr-btn:hover{color:var(--accent2);border-color:var(--accent);}
.hdr-btn.primary{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 2px 8px rgba(59,130,246,.3);}
.hdr-btn.primary:hover{background:var(--accent2);}
.hdr-btn.saving{opacity:.5;pointer-events:none;}
.hdr-btn.audit{color:var(--admin);border-color:rgba(129,140,248,.3);background:rgba(129,140,248,.08);}
.hdr-btn.audit:hover{background:rgba(129,140,248,.15);}

/* TAB BAR */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px;}
.tab-btn{font-family:'DM Mono',monospace;font-size:11px;padding:12px 16px;color:var(--muted2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;}
.tab-btn:hover{color:var(--accent2);}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}

/* TOOLBAR */
.toolbar{padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.tlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.toolbar select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;outline:none;cursor:pointer;}
.toolbar select:focus{border-color:var(--accent);}
.tdiv{width:1px;height:22px;background:var(--border2);margin:0 2px;}
.count-pill{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;margin-left:auto;}

/* STUDENT LIST */
.students-list{padding:14px 28px;display:flex;flex-direction:column;gap:6px;}
.student-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s;}
.student-row.mine{border-color:rgba(59,130,246,.35);}
.student-row:hover{border-color:var(--border2);}
.row-top{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.student-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border2);overflow:hidden;}
.student-avatar img{width:100%;height:100%;object-fit:cover;}
.student-avatar-initials{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--accent2);flex-shrink:0;}
.row-info{flex:1;min-width:0;}
.row-name{font-weight:600;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.row-level{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;flex-shrink:0;}
.lv-LL{background:rgba(232,160,32,.15);color:#f5c55a;border:1px solid rgba(232,160,32,.3);}
.lv-L1{background:rgba(232,82,42,.15);color:#f4896a;border:1px solid rgba(232,82,42,.3);}
.lv-L2{background:rgba(42,181,160,.15);color:#5dd6c6;border:1px solid rgba(42,181,160,.3);}
.lv-MS{background:rgba(224,61,124,.15);color:#f07ab0;border:1px solid rgba(224,61,124,.3);}
.row-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.guide-tag{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--accent2);padding:1px 6px;border-radius:3px;}
.row-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.row-btn:hover{border-color:var(--accent);color:var(--accent2);}
.patch-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px;transition:all .15s;}
.patch-link:hover{color:var(--accent2);border-color:var(--accent);}
.row-body{display:none;}
.row-body.open{display:block;}

/* PROFILE SECTION */
.profile-section{padding:12px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:100px 1fr 1fr;gap:12px;}
.profile-col{display:flex;flex-direction:column;gap:8px;}
.field-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.field-textarea{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;resize:vertical;min-height:70px;outline:none;transition:border-color .2s;}
.field-textarea:focus{border-color:var(--accent);}
.photo-area{border:1px dashed var(--border2);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);width:80px;height:80px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.photo-area:hover{border-color:var(--accent);}
.photo-area.has-photo{padding:0;border-style:solid;}
.photo-preview{width:80px;height:80px;object-fit:cover;border-radius:7px;display:block;}
.photo-hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);line-height:1.4;}
.photo-clear{font-family:'DM Mono',monospace;font-size:9px;color:var(--fail);background:transparent;border:none;cursor:pointer;margin-top:3px;display:block;}

/* SCORES */
.scores-section{padding:8px 14px 10px;}
.score-line{display:flex;align-items:center;gap:10px;}
.score-ws-name{font-size:12px;color:var(--muted2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-btns{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden;flex-shrink:0;}
.score-btn{padding:5px 10px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;border:none;background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .12s;border-left:1px solid var(--border);}
.score-btn:first-child{border-left:none;}
.score-btn:hover{background:var(--surface3);}
.score-btn.active-pass{background:rgba(52,211,153,.15);color:var(--pass);}
.score-btn.active-fail{background:rgba(248,113,113,.15);color:var(--fail);}
.score-btn.active-absent{background:rgba(251,191,36,.15);color:var(--absent);}
.score-btn.active-track{background:rgba(96,165,250,.15);color:var(--track);}
.score-btn.active-ahead{background:rgba(167,139,250,.15);color:var(--ahead);}

/* ── DASHBOARD TAB ── */
.dash-stats-card{margin:14px 28px 0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px 18px;}
.dash-stats-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dash-stats-week{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);padding:2px 8px;border-radius:4px;letter-spacing:.07em;}
.dash-stats-due{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.04em;}
.dash-stats-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dash-stats-bar-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);white-space:nowrap;min-width:160px;}
.dash-stats-bar{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.dash-stats-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}
.stat-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.stat-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 9px;border-radius:5px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.sp-n{font-size:13px;font-weight:700;}
.sp-behind{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);}
.sp-track{background:rgba(96,165,250,.12);color:var(--accent2);border:1px solid rgba(96,165,250,.25);}
.sp-ahead{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25);}
.sp-empty{background:rgba(74,96,128,.08);color:var(--muted2);border:1px solid rgba(74,96,128,.2);}
.sp-yes{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25);}
.sp-no{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);}
.sp-head{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 4px;}
.sp-sep{color:var(--border2);font-size:16px;font-weight:200;line-height:1;}
/* CAMPUS OVERVIEW GRID */
.cov-section{padding:10px 28px 4px;}
.cov-hdr{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.cov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:700px){.cov-grid{grid-template-columns:repeat(2,1fr);}}
.cov-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;border-left:3px solid;}
.cov-lvl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.cov-lvl{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.cov-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);}
.cov-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:6px;}
.cov-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.cov-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.cov-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.cov-bar-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);white-space:nowrap;}
.cov-pills{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.cov-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;}
.dash-grid{padding:16px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;}
.dash-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.dash-card-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.dash-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid var(--border2);}
.dash-avatar img{width:100%;height:100%;object-fit:cover;}
.dash-avatar-ini{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--accent2);flex-shrink:0;}
.dash-info{flex:1;}
.dash-name{font-weight:600;font-size:13px;color:var(--text);}
.dash-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:2px;}
.dash-s5-bar{padding:10px 14px;display:flex;flex-direction:column;gap:4px;}
.dash-s5-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;}
.dash-progress{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.dash-ws-dot{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'DM Mono',monospace;}
.dot-pass{background:rgba(52,211,153,.2);color:var(--pass);border:1px solid rgba(52,211,153,.4);}
.dot-ahead{background:rgba(167,139,250,.2);color:var(--ahead);border:1px solid rgba(167,139,250,.4);}
.dot-track{background:rgba(96,165,250,.2);color:var(--track);border:1px solid rgba(96,165,250,.4);}
.dot-behind{background:rgba(248,113,113,.2);color:var(--fail);border:1px solid rgba(248,113,113,.4);}
.dot-absent{background:rgba(251,191,36,.2);color:var(--absent);border:1px solid rgba(251,191,36,.4);}
.dot-empty{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.dash-notes-preview{padding:8px 14px 12px;font-size:11px;color:var(--muted2);font-style:italic;border-top:1px solid var(--border);line-height:1.5;}
.dash-week-row{padding:6px 14px 8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.card-wk-pill{font-family:'DM Mono',monospace;font-size:8px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.pill-beh{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);}
.pill-ot{background:rgba(96,165,250,.15);color:var(--accent2);border:1px solid rgba(96,165,250,.3);}
.pill-ah{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3);}
.pill-pass{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
.pill-mt{background:rgba(74,96,128,.1);color:var(--muted2);border:1px solid rgba(74,96,128,.2);}

/* ── STUDENT DETAIL MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,10,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.detail-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(59,130,246,.1),0 24px 60px rgba(0,0,0,.6);}
.dm-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dm-photo{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid var(--border2);flex-shrink:0;}
.dm-photo img{width:100%;height:100%;object-fit:cover;}
.dm-photo-ini{width:48px;height:48px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:600;color:var(--accent2);flex-shrink:0;}
.dm-name{font-size:17px;font-weight:600;}
.dm-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.dm-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted2);margin-left:auto;transition:all .15s;flex-shrink:0;}
.dm-close:hover{background:var(--border);color:var(--text);}
.dm-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;}
.dm-tab{font-family:'DM Mono',monospace;font-size:10px;padding:10px 12px;color:var(--muted2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;}
.dm-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.dm-body{flex:1;overflow-y:auto;padding:16px 20px;}

/* DATA STRUCTURES */
.ds-section{margin-bottom:20px;}
.ds-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ds-title::after{content:'';flex:1;height:1px;background:var(--border);}
.ds-field{margin-bottom:10px;}
.ds-field label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);display:block;margin-bottom:5px;}
.ds-textarea{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;resize:vertical;min-height:64px;outline:none;transition:border-color .2s;line-height:1.5;}
.ds-textarea:focus{border-color:var(--accent);}
.ds-input{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.ds-input:focus{border-color:var(--accent);}
.ds-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.meeting-entry{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;position:relative;}
.meeting-del{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s;}
.meeting-del:hover{color:var(--fail);}
.add-meeting-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);background:transparent;border:1px dashed var(--border2);border-radius:6px;padding:7px 14px;cursor:pointer;width:100%;transition:all .15s;margin-top:6px;}
.add-meeting-btn:hover{border-color:var(--accent);background:rgba(59,130,246,.05);}
.save-detail-btn{width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;transition:all .15s;box-shadow:0 2px 8px rgba(59,130,246,.3);}
.save-detail-btn:hover{background:var(--accent2);}

/* WORKSHOP PROGRESS in modal */
.ws-progress-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:3px;transition:background .1s;}
.ws-progress-row:hover{background:var(--surface2);}
.ws-code-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(59,130,246,.15);color:var(--accent2);flex-shrink:0;}
.ws-prog-name{font-size:12px;font-weight:500;flex:1;color:var(--text);}
.chk-pills{display:flex;gap:3px;flex-shrink:0;}
.chk-mini{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;border:1px solid var(--border);}
.chk-p{background:rgba(52,211,153,.12);color:var(--pass);border-color:rgba(52,211,153,.3);}
.chk-t{background:rgba(96,165,250,.12);color:var(--track);border-color:rgba(96,165,250,.3);}
.chk-a-h{background:rgba(167,139,250,.12);color:var(--ahead);border-color:rgba(167,139,250,.3);}
.chk-b{background:rgba(248,113,113,.12);color:var(--fail);border-color:rgba(248,113,113,.3);}
.chk-ab{background:rgba(251,191,36,.12);color:var(--absent);border-color:rgba(251,191,36,.3);}
.chk-e{background:var(--surface2);color:var(--muted);border-color:var(--border);}

/* WORKSHOP DATA TAB (Zara only) */
.ws-data-table{width:100%;border-collapse:collapse;font-size:12px;}
.ws-data-table th{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;}
.ws-data-table td{padding:7px 10px;border-bottom:1px solid rgba(30,48,80,.5);vertical-align:top;}
.ws-data-table tr:hover td{background:var(--surface2);}
.ws-edit-input{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 7px;width:100%;outline:none;}
.ws-edit-input:focus{border-color:var(--accent);}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;}

/* ASSIGN MODAL */
.assign-overlay{position:fixed;inset:0;background:rgba(0,0,10,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
.assign-overlay.open{opacity:1;pointer-events:all;}
.assign-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;max-width:340px;width:100%;transform:translateY(12px);transition:transform .2s;box-shadow:0 0 0 1px rgba(59,130,246,.1),0 24px 48px rgba(0,0,0,.5);}
.assign-overlay.open .assign-box{transform:translateY(0);}
.assign-box h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.assign-box p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:14px;}
.staff-grid{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;}
.staff-opt{padding:9px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.staff-opt:hover{border-color:var(--accent);background:rgba(59,130,246,.06);}
.staff-opt.selected{background:rgba(59,130,246,.1);border-color:var(--accent);color:var(--accent2);}
.staff-check{opacity:0;font-size:13px;}
.staff-opt.selected .staff-check{opacity:1;}
.assign-cancel{margin-top:8px;width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.assign-cancel:hover{border-color:var(--muted2);color:var(--text);}

/* AUDIT */
.audit-overlay{position:fixed;inset:0;background:rgba(0,0,10,.8);z-index:400;display:flex;align-items:flex-end;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
.audit-overlay.open{opacity:1;pointer-events:all;}
.audit-panel{background:var(--surface);border-left:1px solid var(--border2);height:100%;width:100%;max-width:440px;display:flex;flex-direction:column;transform:translateX(40px);transition:transform .25s;overflow:hidden;}
.audit-overlay.open .audit-panel{transform:translateX(0);}
.audit-hdr{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);flex-shrink:0;}
.audit-hdr h2{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:.06em;}
.audit-close{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted2);transition:all .15s;}
.audit-close:hover{background:var(--border);color:var(--text);}
.audit-body{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:4px;}
.audit-entry{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;display:flex;gap:10px;}
.audit-entry.ep{border-left:2px solid var(--pass);}
.audit-entry.ef{border-left:2px solid var(--fail);}
.audit-entry.ea{border-left:2px solid var(--absent);}
.audit-entry.eg{border-left:2px solid var(--admin);}
.audit-who{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--accent2);min-width:54px;flex-shrink:0;}
.audit-detail{flex:1;}
.audit-action{font-size:11px;color:var(--muted2);line-height:1.4;}
.audit-action strong{color:var(--text);}
.audit-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.audit-st{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;flex-shrink:0;align-self:flex-start;}
.as-p{background:rgba(52,211,153,.12);color:var(--pass);}
.as-f{background:rgba(248,113,113,.12);color:var(--fail);}
.as-a{background:rgba(251,191,36,.12);color:var(--absent);}
.as-g{background:rgba(129,140,248,.12);color:var(--admin);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:white;padding:10px 18px;border-radius:7px;font-family:'DM Mono',monospace;font-weight:600;font-size:12px;letter-spacing:.04em;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(59,130,246,.4);}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:640px){
  .students-list,.dash-grid,header,.toolbar,.tab-bar{padding-left:14px;padding-right:14px;}
  .audit-panel{max-width:100%;}
  .profile-section{grid-template-columns:1fr;}
  .ds-row{grid-template-columns:1fr;}
}

/* ── SITE NAV ── */
.site-nav{display:flex;align-items:center;gap:4px;background:#060c18;border-bottom:1px solid #1e3050;padding:8px 20px;flex-wrap:wrap;}
.sn-link{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.04em;color:#4a6080;text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid transparent;transition:all .15s;white-space:nowrap;}
.sn-link:hover{color:#e8f0fc;border-color:#264070;}
.sn-link.active{background:#1a56db;color:white;border-color:#1a56db;}
.sn-link.home{color:#7090b0;}

/* ── SITE NAV ── */
.site-nav{display:flex;align-items:center;gap:3px;padding:7px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:1000;}
.site-nav.dark{background:#060c18;border-bottom:1px solid #1e3050;}
.site-nav.light{background:rgba(248,247,244,.97);border-bottom:1px solid #e2e0db;backdrop-filter:blur(8px);}

.site-nav.dark .sn-link{color:#4a6080;}
.site-nav.dark .sn-link:hover{color:#e8f0fc;border-color:#264070;}
.site-nav.dark .sn-link.active{background:#1a56db;color:white;border-color:#1a56db;}

</head>
<body>
<div class="site-nav dark">
  <a href="https://session5-progress.vercel.app/" class="sn-link home">Home</a>
  <a href="https://session5-progress.vercel.app/session5.html" class="sn-link">Data Tracker</a>
  <a href="https://session5-progress.vercel.app/editor.html" class="sn-link active">Guide Console</a>
</div>
<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-wordmark">Alpha · NYC</span>
      <span class="header-title">Workshop Data Tracker</span>
      <span class="s5-badge">S5</span>
    </div>
    <div class="header-right">
      <a href="home.html" class="hdr-btn">← Home</a>
      <a target="_blank" href="https://session5-progress.vercel.app/tracker.html" class="hdr-btn" style="color:#fbbf24;border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06);">T2P Tracker ↗</a>
      <div class="who-wrap" id="who-wrap">
        <button class="who-btn" id="who-btn" onclick="toggleWhoDrop()" onblur="hideWhoDrop()">
          <span id="who-label">Who are you?</span><span style="opacity:.6">▾</span>
        </button>
        <div id="who-dropdown" class="who-dropdown"></div>
      </div>
      <span class="superadmin-pill" id="superadmin-pill" style="display:none">★ Admin</span>
      <button class="hdr-btn audit" id="audit-btn" style="display:none" onclick="openAudit()">Audit log</button>
      <button class="hdr-btn primary" id="save-btn" onclick="saveAll()">↑ Save</button>
    </div>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tracker',this)">Tracker</button>
    <button class="tab-btn" onclick="switchTab('dashboard',this)">Dashboard</button>
    <button class="tab-btn" id="ws-data-tab" style="display:none" onclick="switchTab('wsdata',this)">Workshop Data</button>
    <button class="tab-btn" id="activity-tab" style="display:none" onclick="switchTab('activity',this)">Activity<span class="tab-badge" id="activity-badge" style="display:none">0</span></button>

  <!-- GUIDE BANNER -->
  <div class="guide-banner" id="guide-banner">

      <option value="">All</option>

      <option value="L1">L1</option>

        <option value="MS">MS</option>
      </select>

      <span class="tlbl">Level</span>
      <select id="wd-level" onchange="renderWsData()">

        <option value="L1">L1</option>

      <span class="tlbl" style="margin-left:8px">Workshop</span>
      <select id="wd-workshop" onchange="renderWsData()"></select>
      <button class="hdr-btn primary" style="margin-left:auto;font-size:11px" onclick="saveWsData()">↑ Save workshop data</button>
    </div>
    <div style="padding:14px 28px" id="wd-content"></div>
  </div>
</div>

<!-- STUDENT DETAIL MODAL -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal">

// ── Helpers ──────────────────────────────────────────────────────
function slug(n){return n.replace(/[^a-zA-Z0-9]/g,'_');}
function initials(n){return n.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();}
function getGuides(s){
  const ov=s5data.__guides__?.[s.n];
  if(ov&&ov.length)return ov;
  return CFG.levelGuides?.[s.l]||[];
}
function isMine(s){return getGuides(s).includes(currentUser);}
function chkKey(ws,ck){return`__chk__${ws}__${ck}`;}
function getChkOptions(ck){
  if(ck==='w7')return[{val:'Passed',label:'Passed',cls:'active-pass'},{val:'Not Yet',label:'Not Yet',cls:'active-fail'},{val:'Absent',label:'Absent',cls:'active-absent'}];
  return[{val:'Behind',label:'Behind',cls:'active-fail'},{val:'On Track',label:'On Track',cls:'active-track'},{val:'Ahead',label:'Ahead',cls:'active-ahead'},{val:'Absent',label:'Absent',cls:'active-absent'}];
}
function dotClass(val){
  if(val==='Passed')return'dot-pass';if(val==='Ahead')return'dot-ahead';
  if(val==='On Track')return'dot-track';if(val==='Behind')return'dot-behind';
  if(val==='Absent'||val==='Not Yet')return'dot-absent';return'dot-empty';
}
function dotLabel(val){
  if(val==='Passed')return'P';if(val==='Ahead')return'A';if(val==='On Track')return'T';
  if(val==='Behind')return'B';if(val==='Absent'||val==='Not Yet')return'–';return'·';
}
function chkMiniClass(val){
  if(!val)return'chk-e';if(val==='Passed')return'chk-p';if(val==='On Track')return'chk-t';
  if(val==='Ahead')return'chk-a-h';if(val==='Behind')return'chk-b';return'chk-ab';
}
function getCurrentSessionWeek(){
  const start=new Date('2026-04-27');
  const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24));
  if(diff<0)return 0;
  const w=Math.floor(diff/7)+1;
  return w>7?8:w;
}
function getDueThisWeek(){
  const w=getCurrentSessionWeek();
  if(w===1)return{type:'checkpoint',key:'w1'};
  if(w===2)return{type:'3cs',key:'w2'};
  if(w===3)return{type:'checkpoint',key:'w3'};
  if(w===4)return{type:'3cs',key:'w4'};
  if(w===5)return{type:'checkpoint',key:'w5'};
  if(w===6)return{type:'3cs',key:'w6'};
  if(w===7)return{type:'checkpoint',key:'w7'};
  return null;
}
function saveCoaching(sSlug,wsSlug,ck,val){
  const sName=nameFromSlug(sSlug);
  const s=STUDENTS.find(s=>slug(s.n)===sSlug);
  const ws=(S5_WORKSHOPS[s?.l]||[]).find(w=>slug(w.name)===wsSlug);
  const wsKey=ws?ws.name:wsSlug;
  if(!s5data.__coaching__)s5data.__coaching__={};
  if(!s5data.__coaching__[sName])s5data.__coaching__[sName]={};
  if(!s5data.__coaching__[sName][wsKey])s5data.__coaching__[sName][wsKey]={};
  s5data.__coaching__[sName][wsKey][ck]=val;
  saveAll();
}
function toggleSkipWs(wsSlug,checked){
  const allWs=[...S5_WORKSHOPS.LL||[],...S5_WORKSHOPS.L1||[],...S5_WORKSHOPS.L2||[],...S5_WORKSHOPS.MS||[]];
  const ws=allWs.find(w=>slug(w.name)===wsSlug);
  const wsKey=ws?ws.name:wsSlug;
  if(!s5data.__skip__)s5data.__skip__={};
  if(checked)s5data.__skip__[wsKey]=true;else delete s5data.__skip__[wsKey];
  saveAll();
}

// ── Who picker ───────────────────────────────────────────────────
function buildWhoDrop(){
  const dd=document.getElementById('who-dropdown');
  dd.innerHTML=`<div class="who-opt who-opt-admin" onmousedown="selectWho('Admin')">★ Admin</div>`
    +STAFF_SORTED.map(s=>`<div class="who-opt" onmousedown="selectWho('${s.replace(/'/g,"\\'")}')"> ${s}</div>`).join('');
}
function toggleWhoDrop(){
  const dd=document.getElementById('who-dropdown');
  if(!dd.classList.contains('open')){buildWhoDrop();dd.classList.add('open');}
  else dd.classList.remove('open');
}
function hideWhoDrop(){setTimeout(()=>document.getElementById('who-dropdown').classList.remove('open'),150);}

function initials(name){
  const parts=name.trim().split(/[\s.]+/).filter(Boolean);
  if(parts.length>=2)return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
function buildGuideBanner(){
  document.getElementById('guide-chips').innerHTML=
    `<button class="guide-chip admin-chip" data-who="Admin" onclick="selectWho('Admin')">★</button>`
    +STAFF_SORTED.map(s=>`<button class="guide-chip" data-who="${s.replace(/"/g,'&quot;')}" onclick="selectWho('${s.replace(/'/g,"\\'")}')"> ${initials(s)}</button>`).join('');
}
function updateGuideBanner(){
  document.getElementById('guide-banner').style.display=currentUser?'none':'flex';
}
function updateChipStates(){
  document.querySelectorAll('.guide-chip').forEach(chip=>{
    if(!currentUser){chip.classList.remove('selected','dimmed');return;}
    if(chip.dataset.who===currentUser){chip.classList.add('selected');chip.classList.remove('dimmed');}
    else{chip.classList.add('dimmed');chip.classList.remove('selected');}
  });
}

function selectWho(name){
  document.getElementById('who-dropdown').classList.remove('open');
  if(name==='Admin'){
    document.getElementById('admin-pass-input').value='';
    document.getElementById('admin-pass-err').textContent='';
    document.getElementById('admin-pass-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('admin-pass-input').focus(),60);
    return;
  }
  completeSelectWho(name);
}
function checkAdminPass(){
  if(document.getElementById('admin-pass-input').value!=='nyc2025'){
    document.getElementById('admin-pass-err').textContent='Incorrect password.';
    return;
  }
  document.getElementById('admin-pass-overlay').classList.remove('open');

}
function closeAdminPass(){document.getElementById('admin-pass-overlay').classList.remove('open');}

function completeSelectWho(name){
  currentUser=name;
  isSuperAdmin=CFG.superadmins.includes(name);
  const btn=document.getElementById('who-btn');
  document.getElementById('who-label').textContent=name==='Admin'?'★ Admin':'👤 '+name;

function requireUser(){
  if(currentUser)return true;
  const banner=document.getElementById('guide-banner');
  banner.style.animation='shake .35s';setTimeout(()=>banner.style.animation='',400);
  showToast('Select your name first →');

// ── Activity tab ──────────────────────────────────────────────────
function renderActivity(){
  const entries=s5data.__audit__||[];
  const lastSeen=localStorage.getItem('alphaAdminLastSeen')||'1970-01-01';
  const newCount=entries.filter(e=>e.ts>lastSeen).length;
  document.getElementById('act-header').innerHTML=
    `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2)">${entries.length} entries</span>`
    +(newCount>0?`<span class="act-new-badge">${newCount} new since last visit</span>`:'');
  document.getElementById('act-list').innerHTML=entries.length
    ?entries.map(e=>{
        const isNew=e.ts>lastSeen;
        const d=new Date(e.ts);
        const time=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        return`<div class="act-entry${isNew?' act-new':''}"><span class="act-who">${e.who||'?'}</span><div class="act-detail"><div class="act-student">${e.student}</div><div class="act-info">${e.detail}</div></div><span class="act-time">${time}</span>${e.value?`<span class="act-val">${e.value}</span>`:''}</div>`;
      }).join('')
    :'<div class="act-empty">No activity yet.</div>';
  localStorage.setItem('alphaAdminLastSeen',new Date().toISOString());
  document.getElementById('activity-badge').style.display='none';
}
function updateActivityBadge(){
  if(!isSuperAdmin)return;
  const entries=s5data.__audit__||[];
  const lastSeen=localStorage.getItem('alphaAdminLastSeen')||'1970-01-01';
  const n=entries.filter(e=>e.ts>lastSeen).length;
  const badge=document.getElementById('activity-badge');
  badge.textContent=n>99?'99+':String(n);
  badge.style.display=n>0?'inline-flex':'none';
}
let _pollTimer=null;
function startActivityPoll(){
  if(_pollTimer)return;
  _pollTimer=setInterval(async()=>{
    if(!isSuperAdmin)return;
    try{
      const r=await window.storage.get('s5data');
      if(r?.value){const fresh=JSON.parse(r.value);s5data.__audit__=fresh.__audit__||s5data.__audit__;updateActivityBadge();}
    }catch(e){}
  },30000);
}

// ── Storage ──────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await window.storage.get('s5data');
    if(r?.value){
      s5data=JSON.parse(r.value);
      if(!s5data.__guides__)s5data.__guides__={};
      if(!s5data.__profiles__)s5data.__profiles__={};
      if(!s5data.__photos__)s5data.__photos__={};
      if(!s5data.__audit__)s5data.__audit__=[];
      if(!s5data.__meetings__)s5data.__meetings__={};
      if(!s5data.__3cs__)s5data.__3cs__={};
      if(!s5data.__wsdata__)s5data.__wsdata__={};
      if(!s5data.__deliverables__)s5data.__deliverables__={};
      if(!s5data.__wsmeetings__)s5data.__wsmeetings__={};
      if(!s5data.__townhalls__)s5data.__townhalls__=[];
      if(!s5data.__coaching__)s5data.__coaching__={};
    }
  }catch(e){}
  // Apply ?level= URL param from session5.html "Enter data" link
  const urlLevel=new URLSearchParams(window.location.search).get('level');
  if(urlLevel&&['LL','L1','L2','MS'].includes(urlLevel)){
    document.getElementById('levelFilter').value=urlLevel;
  }
  buildGuideBanner();
  updateGuideBanner();
  renderList();
  renderDashboard();

loadData();

  if(!requireUser())return;
  const btn=document.getElementById('save-btn');
  btn.classList.add('saving');btn.textContent='Saving…';
  try{await window.storage.set('s5data',JSON.stringify(s5data));showToast('✓ Saved');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function logAudit(type,studentName,detail,value){
  if(!s5data.__audit__)s5data.__audit__=[];
  s5data.__audit__.unshift({who:currentUser,type,student:studentName,detail,value,ts:new Date().toISOString()});
  if(s5data.__audit__.length>500)s5data.__audit__=s5data.__audit__.slice(0,500);

// ── Tab switching ─────────────────────────────────────────────────
let currentTab='tracker';
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tracker','dashboard','wsdata','activity'].forEach(t=>{

    if(el)el.style.display=t===tab?'block':'none';

  document.getElementById('tracker-toolbar').style.display=tab==='tracker'?'flex':'none';
  if(tab==='wsdata')renderWsData();
  if(tab==='dashboard')renderDashboard();

// ── Score ─────────────────────────────────────────────────────────
function setScore(sName,ws,val,btn){
  if(!s5data[sName])s5data[sName]={};
  if(s5data[sName][ws]===val){delete s5data[sName][ws];if(s5data.__who__?.[sName])delete s5data.__who__[sName][ws];logAudit('score',sName,ws,null);btn.closest('.score-btns').querySelectorAll('.score-btn').forEach(b=>b.className='score-btn');return;}
  s5data[sName][ws]=val;if(!s5data.__who__)s5data.__who__={};if(!s5data.__who__[sName])s5data.__who__[sName]={};s5data.__who__[sName][ws]=currentUser;logAudit('score',sName,ws,val);
  btn.closest('.score-btns').querySelectorAll('.score-btn').forEach(b=>{b.className='score-btn';if(b.dataset.val===val)b.classList.add(val==='Passed'?'active-pass':val==='Not Yet'?'active-fail':val==='Absent'?'active-absent':'active-pass');});
}
function setCheckpoint(sName,ws,ck,val,btn){
  if(!s5data[sName])s5data[sName]={};
  const key=chkKey(ws,ck);const prev=s5data[sName][key];
  if(prev===val){delete s5data[sName][key];if(s5data.__who__?.[sName])delete s5data.__who__[sName][key];btn.closest('.score-btns').querySelectorAll('.score-btn').forEach(b=>b.className='score-btn');return;}
  s5data[sName][key]=val;if(!s5data.__who__)s5data.__who__={};if(!s5data.__who__[sName])s5data.__who__[sName]={};s5data.__who__[sName][key]=currentUser;logAudit('score',sName,`${ws} [${ck}]`,val);
  btn.closest('.score-btns').querySelectorAll('.score-btn').forEach(b=>{
    b.className='score-btn';
    const opt=getChkOptions(ck).find(o=>o.val===val);
    if(b.dataset.val===val&&opt)b.classList.add(opt.cls);
  });
}

  assigningStudent=name;
  document.getElementById('assign-title').textContent=name;
  const stu=STUDENTS.find(s=>s.n===name);
  const cur=getGuides({n:name,l:stu?.l||''});
  document.getElementById('staff-grid').innerHTML=STAFF_SORTED.map(staff=>`
    <button class="staff-opt ${cur.includes(staff)?'selected':''}" onclick="toggleGuide('${staff}')">
      ${staff}<span class="staff-check">✓</span>
    </button>`).join('');
  document.getElementById('assign-overlay').classList.add('open');
}
function toggleGuide(staff){
  const stu=STUDENTS.find(s=>s.n===assigningStudent);
  if(!s5data.__guides__[assigningStudent])s5data.__guides__[assigningStudent]=[...(CFG.levelGuides[stu?.l]||[])];
  const arr=s5data.__guides__[assigningStudent];
  const idx=arr.indexOf(staff);if(idx===-1)arr.push(staff);else arr.splice(idx,1);
  document.querySelectorAll('.staff-opt').forEach(btn=>{
    const n=btn.textContent.replace('✓','').trim();
    btn.classList.toggle('selected',arr.includes(n));
  });
  const metaEl=document.getElementById(`guides-${slug(assigningStudent)}`);
  if(metaEl)metaEl.innerHTML=arr.map(g=>`<span class="guide-tag">${g}</span>`).join('');
  logAudit('guide',assigningStudent,'guides',arr.join(', '));
}
function closeAssign(){document.getElementById('assign-overlay').classList.remove('open');assigningStudent=null;}

// ── Photo ──────────────────────────────────────────────────────────
function handlePhotoUpload(sName,input){
  const file=input.files[0];if(!file)return;
  if(file.size>500*1024){showToast('⚠ Photo too large (max 500KB)');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    if(!s5data.__photos__)s5data.__photos__={};
    s5data.__photos__[sName]=e.target.result;
    refreshAvatar(sName,e.target.result);
    logAudit('profile',sName,'photo','updated');
  };
  reader.readAsDataURL(file);
}
function clearPhoto(sName,ev){ev.stopPropagation();if(s5data.__photos__)delete s5data.__photos__[sName];refreshAvatar(sName,null);}
function refreshAvatar(sName,src){
  ['.'+slug(sName)+'-avatar'].forEach(()=>{});
  document.querySelectorAll(`[data-avatar="${slug(sName)}"]`).forEach(el=>{
    if(src){el.innerHTML=`<img src="${src}" alt="${sName}">`;}
    else{el.textContent=initials(sName);}
  });
}

function nameFromSlug(sl){ return window.__slugToName?.[sl] || sl; }

// Slug-safe wrappers for all onclick handlers
function setScoreBySlug(btn){
  const sName=nameFromSlug(btn.dataset.sslug);
  const wsName=nameFromSlug(btn.dataset.wsslug)||btn.dataset.wsslug;
  // find real ws name from slug
  const s=STUDENTS.find(s=>slug(s.n)===btn.dataset.sslug);
  const ws=(S5_WORKSHOPS[s?.l]||[]).find(w=>slug(w.name)===btn.dataset.wsslug);
  const wsKey=ws?ws.name:btn.dataset.wsslug;
  setScore(sName,wsKey,btn.dataset.val,btn);
}
function setCheckpointBySlug(btn){
  const sName=nameFromSlug(btn.dataset.sslug);
  const s=STUDENTS.find(s=>slug(s.n)===btn.dataset.sslug);
  const ws=(S5_WORKSHOPS[s?.l]||[]).find(w=>slug(w.name)===btn.dataset.wsslug);
  const wsKey=ws?ws.name:btn.dataset.wsslug;
  setCheckpoint(sName,wsKey,btn.dataset.ck,btn.dataset.val,btn);
  if(btn.dataset.ck!=='w7'){
    const scoreLine=btn.closest('.score-line');
    const coachDiv=scoreLine?.nextElementSibling;
    if(coachDiv){
      const isNowBehind=s5data[sName]?.[chkKey(wsKey,btn.dataset.ck)]==='Behind';
      coachDiv.style.display=isNowBehind?'block':'none';
    }
  }
}

// ── Render tracker list ───────────────────────────────────────────
function renderList(){
  const af=document.getElementById('assigneeFilter').value;
  const lf=document.getElementById('levelFilter').value;

  if(af==='__mine__')students=students.filter(s=>isMine(s));
  document.getElementById('count-pill').textContent=`${students.length} students`;

  // Build a lookup so we can find name from slug safely
  window.__slugToName={};
  students.forEach(s=>{ window.__slugToName[slug(s.n)]=s.n; });

  document.getElementById('students-list').innerHTML=students.map(s=>{
    const guides=getGuides(s);const mine=guides.includes(currentUser);
    const photo=s5data.__photos__?.[s.n];
    const profile=s5data.__profiles__?.[s.n]||{};
    const scores=s5data[s.n]||{};
