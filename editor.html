    const avatarHtml=photo
      ?`<div class="student-avatar" data-avatar="${sl}"><img src="${photo}" alt="${s.n}"></div>`
      :`<div class="student-avatar-initials" data-avatar="${sl}">${initials(s.n)}</div>`;

    const guideTagsHtml=guides.length
      ?guides.map(g=>`<span class="guide-tag">${g}</span>`).join('')
      :'<span style="color:var(--muted);font-size:10px">No guides</span>';

    const photoAreaHtml=photo
      ?`<div class="photo-area has-photo" onclick="document.getElementById('phi-${sl}').click()"><img class="photo-preview" src="${photo}"><button class="photo-clear" onclick="clearPhotoBySlug('${sl}',event)">✕ Remove</button></div>`
      :`<div class="photo-area" onclick="document.getElementById('phi-${sl}').click()"><div class="photo-hint"><div style="font-size:18px;margin-bottom:4px">📷</div><div>Upload</div><div style="color:var(--muted);font-size:8px">max 500KB</div></div></div>`;

    const scoreLines=levelWs.map(ws=>{
      const wsKey=ws.name;const cur=scores[wsKey];
      const wsSlug=slug(wsKey);
      const due=getDueThisWeek();
      const wsSkipped=s5data.__skip__?.[wsKey]||false;
      const chkRows=CHECKPOINTS.map(chk=>{
        const kv=scores[chkKey(wsKey,chk.key)];
        const isDue=due&&due.type==='checkpoint'&&due.key===chk.key;
        // Only show if this checkpoint is due this week OR already has data
        if(!isDue&&!kv) return '';
        const opts=getChkOptions(chk.key);
        const btns=opts.map(opt=>`<button class="score-btn ${kv===opt.val?opt.cls:''}" data-val="${opt.val}" data-sslug="${sl}" data-wsslug="${wsSlug}" data-ck="${chk.key}" onclick="setCheckpointBySlug(this)">${opt.label}</button>`).join('');
        const dueBadge=isDue?`<span style="font-family:'DM Mono',monospace;font-size:8px;font-weight:600;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:.05em">DUE THIS WEEK</span>`:'';
        const coaching=s5data.__coaching__?.[s.n]?.[wsKey]?.[chk.key]||'';
        const coachPlaceholder=isDue?`${chk.label} is Behind — what's the coaching plan to get back on track? (Due this week)`:`Coaching / action plan to get back on track…`;
        const coachDiv=chk.key!=='w7'?`<div id="coach-${sl}-${wsSlug}-${chk.key}" style="display:${kv==='Behind'?'block':'none'};padding:2px 12px 6px 24px;"><textarea class="field-textarea" style="min-height:36px;font-size:11px;" placeholder="${coachPlaceholder}" onchange="saveCoaching('${sl}','${wsSlug}','${chk.key}',this.value)">${coaching}</textarea></div>`:'';
        return`<div class="score-line" style="padding-left:12px;opacity:.85;${isDue?'background:rgba(251,191,36,.04);':''}"><span class="score-ws-name" style="color:${isDue?'#fbbf24':'var(--muted)'};font-size:11px">↳ ${chk.label}${dueBadge}</span><div class="score-btns">${btns}</div></div>${coachDiv}`;
      }).join('');
      const finalOpts=[{val:'Passed',label:'✓ Passed',cls:'active-pass'},{val:'Not passed',label:'✗ Not yet',cls:'active-fail'},{val:'Absent',label:'– Absent',cls:'active-absent'}];
      const finalWho=isSuperAdmin&&cur&&s5data.__who__?.[s.n]?.[ws]?`<span class="by-tag">${initials(s5data.__who__[s.n][ws])}</span>`:'';
      const finalBtns=finalOpts.map(opt=>`<button class="score-btn ${cur===opt.val?opt.cls:''}" data-val="${opt.val}" data-sslug="${sl}" data-wsslug="${wsSlug}" onclick="setScoreBySlug(this)">${opt.label}</button>`).join('')+finalWho;
      return`<div style="border:1px solid ${wsSkipped?'rgba(251,191,36,.3)':'var(--border)'};border-radius:7px;overflow:hidden;margin-bottom:4px;${wsSkipped?'opacity:.6;':''}">
        <div class="score-line" style="background:var(--surface2);padding:7px 12px;">
          <div style="flex:1"><span style="font-weight:600;color:var(--text);font-size:12px">${ws.code} · ${ws.name}</span><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:8px">${ws.guide} · ${ws.day}</span></div>
          <label style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);cursor:pointer;display:flex;align-items:center;gap:4px;margin-right:10px;white-space:nowrap;" title="Mark this workshop as not collecting data this session"><input type="checkbox" ${wsSkipped?'checked':''} onchange="toggleSkipWs('${wsSlug}',this.checked)"> Skip data</label>
          <div class="score-btns">${finalBtns}</div>
        </div>
        <div style="padding:4px 0 2px">${chkRows||`<div style="padding:5px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);opacity:.6">${wsSkipped?'Data collection skipped for this workshop':'No data due yet — check back when this checkpoint week arrives'}</div>`}</div>
      </div>`;
    }).join('');

    return`<div class="student-row ${mine?'mine':''}">
      <div class="row-top" style="cursor:pointer" onclick="toggleRow('${sl}')">
        ${avatarHtml}
        <div class="row-info">
          <div class="row-name"><span class="row-level lv-${s.l}">${s.l}</span>${s.n}</div>
          <div class="row-meta"><span id="guides-${sl}">${guideTagsHtml}</span>${s.note?`<span style="color:var(--muted);font-style:italic">* ${s.note}</span>`:''}</div>
        </div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <a target="_blank" rel="noopener noreferrer" href="${s.patchUrl||'https://t2p-dashboard.vercel.app/tracker.html'}" class="patch-link">Previous T2P data ↗</a>
          <button class="row-btn" data-sslug="${sl}" onclick="openAssignBySlug(this.dataset.sslug)">Guides</button>
        </div>
      </div>
      <div class="row-body" id="body-${sl}">
        <div class="profile-section">
          <div>${photoAreaHtml}<input type="file" id="phi-${sl}" accept="image/*" style="display:none" data-sslug="${sl}" onchange="handlePhotoBySlug(this)"></div>
          <div class="profile-col">
            <div><div class="field-label">Motivational model</div><textarea class="field-textarea" id="mot-${sl}" data-sslug="${sl}" onchange="saveProfileBySlug(this)" placeholder="What drives them, how they work best…">${profile.motivation||''}</textarea></div>
          </div>
          <div class="profile-col">
            <div><div class="field-label">Guide notes</div><textarea class="field-textarea" id="note-${sl}" data-sslug="${sl}" onchange="saveProfileBySlug(this)" placeholder="This week's observations, action plan…">${profile.notes||''}</textarea></div>
          </div>
        </div>
        <div class="scores-section">${scoreLines}</div>
      </div>
    </div>`;
  }).join('');
}


function saveProfile(sName){
  const sl=slug(sName);
  if(!s5data.__profiles__[sName])s5data.__profiles__[sName]={};
  const mot=document.getElementById(`mot-${sl}`);const note=document.getElementById(`note-${sl}`);
  if(mot)s5data.__profiles__[sName].motivation=mot.value;
  if(note)s5data.__profiles__[sName].notes=note.value;
  logAudit('profile',sName,'notes','updated');
}

// ── Dashboard stats ───────────────────────────────────────────────
function renderDashboardStats(students){
  const container=document.getElementById('dash-stats');
  if(!container)return;
  const due=getDueThisWeek();
  const weekNum=getCurrentSessionWeek();
  const total=students.length;
  let html='';

  // Current-week stats card (checkpoint or 3Cs)
  if(weekNum>0&&weekNum<=7&&due){
    if(due.type==='checkpoint'){
      const ck=due.key;
      const ckLabel=CHECKPOINTS.find(c=>c.key===ck)?.label||ck;
      let behind=0,onTrack=0,ahead=0,withData=0;
      students.forEach(s=>{
        const sc=s5data[s.n]||{};
        const ws=S5_WORKSHOPS[s.l]||[];
        let hasBehind=false,hasTrack=false,hasAhead=false,hasAny=false;
        ws.forEach(w=>{
          if(s5data.__skip__?.[w.name])return;
          const v=sc[chkKey(w.name,ck)];
          if(v){hasAny=true;if(v==='Behind')hasBehind=true;else if(v==='On Track')hasTrack=true;else if(v==='Ahead')hasAhead=true;}
        });
        if(hasAny)withData++;
        if(hasBehind)behind++;else if(hasTrack)onTrack++;else if(hasAhead)ahead++;
      });
      const pct=total>0?Math.round(withData/total*100):0;
      html+=`<div class="dash-stats-card">
        <div class="dash-stats-hdr">
          <span class="dash-stats-week">Week ${weekNum}</span>
          <span class="dash-stats-due">Due this week · ${ckLabel}</span>
        </div>
        <div class="dash-stats-bar-row">
          <span class="dash-stats-bar-lbl">${withData} / ${total} students have data</span>
          <div class="dash-stats-bar"><div class="dash-stats-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stat-pills">
          <span class="stat-pill sp-behind"><span class="sp-n">${behind}</span>Behind</span>
          <span class="stat-pill sp-track"><span class="sp-n">${onTrack}</span>On Track</span>
          <span class="stat-pill sp-ahead"><span class="sp-n">${ahead}</span>Ahead</span>
          <span class="stat-pill sp-empty"><span class="sp-n">${total-withData}</span>No data yet</span>
        </div>
      </div>`;
    } else {
      const wk=due.key;
      let withData=0,lovesY=0,lovesN=0,l2xAll=0,l2xSome=0,l2xNone=0,t2pY=0,t2pN=0;
      students.forEach(s=>{
        const d=s5data.__3cs__?.[s.n]?.[wk]||{};
        if(d.lovesSchool||d.learning2x||d.onTrack)withData++;
        if(d.lovesSchool==='Yes')lovesY++;else if(d.lovesSchool==='No')lovesN++;
        if(d.learning2x==='All at 2x')l2xAll++;else if(d.learning2x==='Some at 2x')l2xSome++;else if(d.learning2x==='None at 2x')l2xNone++;
        if(d.onTrack==='Yes')t2pY++;else if(d.onTrack==='No')t2pN++;
      });
      const pct=total>0?Math.round(withData/total*100):0;
      html+=`<div class="dash-stats-card">
        <div class="dash-stats-hdr">
          <span class="dash-stats-week">Week ${weekNum}</span>
          <span class="dash-stats-due">Due this week · 3 Commitments</span>
        </div>
        <div class="dash-stats-bar-row">
          <span class="dash-stats-bar-lbl">${withData} / ${total} have data</span>
          <div class="dash-stats-bar"><div class="dash-stats-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stat-pills">
          <span class="sp-head">Love School</span>
          <span class="stat-pill sp-yes"><span class="sp-n">${lovesY}</span>Yes</span>
          <span class="stat-pill sp-no"><span class="sp-n">${lovesN}</span>No</span>
          <span class="sp-sep">|</span>
          <span class="sp-head">Learning 2x</span>
          <span class="stat-pill sp-track"><span class="sp-n">${l2xAll}</span>All at 2x</span>
          <span class="stat-pill sp-track" style="opacity:.65"><span class="sp-n">${l2xSome}</span>Some</span>
          <span class="stat-pill sp-no"><span class="sp-n">${l2xNone}</span>None</span>
          <span class="sp-sep">|</span>
          <span class="sp-head">T2P</span>
          <span class="stat-pill sp-yes"><span class="sp-n">${t2pY}</span>On track</span>
          <span class="stat-pill sp-no"><span class="sp-n">${t2pN}</span>Behind</span>
        </div>
      </div>`;
    }
  }

  // Always-visible 3Cs summary bars (most recent check-in per student)
  let lovesY=0,l2xGood=0,t2pY=0,withData3c=0;
  students.forEach(s=>{
    let latest=null;
    ['w6','w4','w2'].forEach(wk=>{
      if(!latest){const d=s5data.__3cs__?.[s.n]?.[wk];if(d&&(d.lovesSchool||d.learning2x||d.onTrack))latest=d;}
    });
    if(latest){
      withData3c++;
      if(latest.lovesSchool==='Yes')lovesY++;
      if(latest.learning2x==='All at 2x'||latest.learning2x==='Some at 2x')l2xGood++;
      if(latest.onTrack==='Yes')t2pY++;
    }
  });
  const n=withData3c||1;
  html+=`<div class="dash-stats-card" style="margin-top:8px;">
    <div class="dash-stats-hdr">
      <span class="dash-stats-week" style="background:rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.3)">3 Commitments</span>
      <span class="dash-stats-due">Most recent check-in · ${withData3c}/${total} entered</span>
    </div>
    <div class="dash-stats-bar-row">
      <span class="dash-stats-bar-lbl">Love School: ${lovesY} / ${withData3c||'—'}</span>
      <div class="dash-stats-bar"><div class="dash-stats-fill" style="width:${Math.round(lovesY/n*100)}%;background:var(--pass)"></div></div>
    </div>
    <div class="dash-stats-bar-row">
      <span class="dash-stats-bar-lbl">Learning 2×: ${l2xGood} / ${withData3c||'—'}</span>
      <div class="dash-stats-bar"><div class="dash-stats-fill" style="width:${Math.round(l2xGood/n*100)}%;background:var(--accent)"></div></div>
    </div>
    <div class="dash-stats-bar-row">
      <span class="dash-stats-bar-lbl">T2P On Track: ${t2pY} / ${withData3c||'—'}</span>
      <div class="dash-stats-bar"><div class="dash-stats-fill" style="width:${Math.round(t2pY/n*100)}%;background:var(--accent)"></div></div>
    </div>
  </div>`;

  container.innerHTML=html;
}

// ── Campus overview grid ──────────────────────────────────────────
function renderCampusOverview(){
  const container=document.getElementById('dash-campus-overview');
  if(!container)return;
  const due=getDueThisWeek();
  const weekNum=getCurrentSessionWeek();
  const allLevels=['LL','L1','L2','MS'];
  const lvlColors={LL:'#3b82f6',L1:'#a78bfa',L2:'#34d399',MS:'#fbbf24'};
  const lvlNames={LL:'Launch Level',L1:'Level 1',L2:'Level 2',MS:'Middle School'};

  const cards=allLevels.map(lvl=>{
    const sts=STUDENTS.filter(s=>s.l===lvl);
    const tot=sts.length;
    const color=lvlColors[lvl];
    let barPct=0,barLbl='',pillsHtml='';

    if(due&&weekNum>0&&weekNum<=7){
      if(due.type==='checkpoint'){
        const ck=due.key;
        const ckLabel=CHECKPOINTS.find(c=>c.key===ck)?.label||ck;
        let behind=0,onTrack=0,ahead=0,withData=0;
        sts.forEach(s=>{
          const sc=s5data[s.n]||{};
          const ws=S5_WORKSHOPS[s.l]||[];
          let hasBehind=false,hasTrack=false,hasAhead=false,hasAny=false;
          ws.forEach(w=>{
            const v=sc[chkKey(w.name,ck)];
            if(v){hasAny=true;if(v==='Behind')hasBehind=true;else if(v==='On Track')hasTrack=true;else if(v==='Ahead')hasAhead=true;}
          });
          if(hasAny)withData++;
          if(hasBehind)behind++;else if(hasTrack)onTrack++;else if(hasAhead)ahead++;
        });
        barPct=tot>0?Math.round(withData/tot*100):0;
        barLbl=`${withData}/${tot} in`;
        pillsHtml=(behind>0?`<span class="cov-pill" style="background:rgba(248,113,113,.12);color:#f87171;">${behind}B</span>`:'')+
          (onTrack>0?`<span class="cov-pill" style="background:rgba(96,165,250,.12);color:#60a5fa;">${onTrack}T</span>`:'')+
          (ahead>0?`<span class="cov-pill" style="background:rgba(167,139,250,.12);color:#a78bfa;">${ahead}A</span>`:'')+
          ((tot-withData)>0?`<span class="cov-pill" style="background:var(--surface3);color:var(--muted2);">${tot-withData} missing</span>`:'');
      } else {
        const wk=due.key;
        let entered=0,lovesY=0,l2xGood=0,t2pY=0;
        sts.forEach(s=>{
          const d=s5data.__3cs__?.[s.n]?.[wk]||{};
          if(d.lovesSchool||d.learning2x||d.onTrack){entered++;
            if(d.lovesSchool==='Yes')lovesY++;
            if(d.learning2x==='All at 2x'||d.learning2x==='Some at 2x')l2xGood++;
            if(d.onTrack==='Yes')t2pY++;
          }
        });
        barPct=tot>0?Math.round(entered/tot*100):0;
        barLbl=`${entered}/${tot} 3Cs`;
        pillsHtml=`<span class="cov-pill" style="background:rgba(52,211,153,.1);color:#34d399;">♥${lovesY}</span>`+
          `<span class="cov-pill" style="background:rgba(96,165,250,.1);color:#60a5fa;">2×${l2xGood}</span>`+
          `<span class="cov-pill" style="background:rgba(96,165,250,.1);color:#60a5fa;">T2P${t2pY}</span>`;
      }
    }

    const dueLabel=due?(due.type==='checkpoint'?(CHECKPOINTS.find(c=>c.key===due.key)?.label||due.key):'3 Commitments'):'—';
    return`<div class="cov-card" style="border-left-color:${color}">
      <div class="cov-lvl-row"><span class="cov-lvl" style="color:${color}">${lvl}</span><span class="cov-count">${tot} students</span></div>
      <div class="cov-sub">${lvlNames[lvl]}</div>
      <div class="cov-bar-row"><div class="cov-bar"><div class="cov-bar-fill" style="width:${barPct}%;background:${color}"></div></div><span class="cov-bar-lbl">${barLbl||`0/${tot}`}</span></div>
      <div class="cov-pills">${pillsHtml||`<span class="cov-pill" style="background:var(--surface3);color:var(--muted2);">No data yet</span>`}</div>
    </div>`;
  }).join('');

  const wkLabel=weekNum>0&&weekNum<=7?`Week ${weekNum}`:(weekNum>7?'Session Complete':'Pre-Session');
  const dueLabel=due?(due.type==='checkpoint'?(CHECKPOINTS.find(c=>c.key===due.key)?.label||due.key):'3 Commitments'):'';
  container.innerHTML=`<div class="cov-section">
    <div class="cov-hdr">
      <span>Campus Overview · All Levels</span>
      <span style="color:var(--accent2);font-size:9px;">${wkLabel}${dueLabel?' · '+dueLabel:''}</span>
    </div>
    <div class="cov-grid">${cards}</div>
  </div>`;
}

// ── Dashboard ─────────────────────────────────────────────────────
function renderDashboard(){
  const lf=document.getElementById('dash-level').value;
  let students=[...STUDENTS].sort((a,b)=>{const d=LEVEL_ORDER.indexOf(a.l)-LEVEL_ORDER.indexOf(b.l);return d||a.n.localeCompare(b.n);});
  if(lf)students=students.filter(s=>s.l===lf);
  document.getElementById('dash-count').textContent=`${students.length} students`;
  renderDashboardStats(students);
  renderCampusOverview();

  document.getElementById('dash-grid').innerHTML=students.map(s=>{
    const photo=s5data.__photos__?.[s.n];
    const profile=s5data.__profiles__?.[s.n]||{};
    const scores=s5data[s.n]||{};
    const levelWs=S5_WORKSHOPS[s.l]||[];
    const safeN=s.n.replace(/'/g,"\\'");
    const guides=getGuides(s);

    const avatarHtml=photo
      ?`<div class="dash-avatar" data-avatar="${slug(s.n)}"><img src="${photo}" alt="${s.n}"></div>`
      :`<div class="dash-avatar-ini" data-avatar="${slug(s.n)}">${initials(s.n)}</div>`;

    const dots=levelWs.map(ws=>{
      // Show latest checkpoint or final status
      const final=scores[ws.name];
      let bestVal=final;
      if(!bestVal){
        // Show latest checkpoint that has data
        for(let i=CHECKPOINTS.length-1;i>=0;i--){const v=scores[chkKey(ws.name,CHECKPOINTS[i].key)];if(v){bestVal=v;break;}}
      }
      return`<div class="dash-ws-dot ${dotClass(bestVal)}" title="${ws.code}: ${ws.name} — ${bestVal||'No data'}">${dotLabel(bestVal)}</div>`;
    }).join('');

    const notesPreview=profile.notes?`<div class="dash-notes-preview">${profile.notes.substring(0,80)}${profile.notes.length>80?'…':''}</div>`:'';

    // Week status row
    const due=getDueThisWeek();const weekNum=getCurrentSessionWeek();
    let weekHtml='';
    if(due&&weekNum>0&&weekNum<=7){
      if(due.type==='checkpoint'){
        const ck=due.key;let beh=0,ot=0,ah=0,filled=0;
        levelWs.forEach(ws=>{const v=scores[chkKey(ws.name,ck)];if(v){filled++;if(v==='Behind')beh++;else if(v==='On Track')ot++;else if(v==='Ahead')ah++;}});
        const tot=levelWs.length;
        if(filled>0){
          weekHtml=`<div class="dash-week-row">${beh>0?`<span class="card-wk-pill pill-beh">${beh} Behind</span>`:''}${ot>0?`<span class="card-wk-pill pill-ot">${ot} On Track</span>`:''}${ah>0?`<span class="card-wk-pill pill-ah">${ah} Ahead</span>`:''}${filled<tot?`<span class="card-wk-pill pill-mt">${tot-filled} missing</span>`:''}</div>`;
        } else {
          weekHtml=`<div class="dash-week-row"><span class="card-wk-pill pill-mt">W${weekNum} not entered</span></div>`;
        }
      } else {
        const d=s5data.__3cs__?.[s.n]?.[due.key]||{};
        if(d.lovesSchool||d.learning2x||d.onTrack){
          weekHtml=`<div class="dash-week-row">${d.lovesSchool?`<span class="card-wk-pill ${d.lovesSchool==='Yes'?'pill-ot':'pill-beh'}">School: ${d.lovesSchool}</span>`:''} ${d.onTrack?`<span class="card-wk-pill ${d.onTrack==='Yes'?'pill-ot':'pill-beh'}">T2P: ${d.onTrack}</span>`:''} ${d.learning2x?`<span class="card-wk-pill pill-ot">2x: ${d.learning2x.split(' ')[0]}</span>`:''}</div>`;
        } else {
          weekHtml=`<div class="dash-week-row"><span class="card-wk-pill pill-mt">W${weekNum} 3C not entered</span></div>`;
        }
      }
    }

    return`<div class="dash-card" onclick="openDetail('${safeN}')">
      <div class="dash-card-hdr">
        ${avatarHtml}
        <div class="dash-info">
          <div class="dash-name">${s.n}</div>
          <div class="dash-meta"><span class="row-level lv-${s.l}">${s.l}</span> ${guides.length?'· '+guides.join(', '):''}</div>
        </div>
      </div>
      <div class="dash-s5-bar">
        <div class="dash-s5-label">S5 Workshops</div>
        <div class="dash-progress">${dots}</div>
      </div>
      ${weekHtml}
      ${notesPreview}
    </div>`;
  }).join('');
}

// ── Student detail modal ──────────────────────────────────────────
function openDetail(name){
  currentDetailStudent=name;
  currentDmTab='progress';
  const s=STUDENTS.find(s=>s.n===name);if(!s)return;
  const photo=s5data.__photos__?.[name];
  document.getElementById('dm-photo').innerHTML=photo
    ?`<div class="dm-photo"><img src="${photo}" alt="${name}"></div>`
    :`<div class="dm-photo-ini">${initials(name)}</div>`;
  document.getElementById('dm-name').textContent=name;
  document.getElementById('dm-sub').innerHTML=`<span class="row-level lv-${s.l}">${s.l}</span>${s.note?`<span>* ${s.note}</span>`:''}`;
  // Show workshop tab for superadmins
  document.getElementById('ws-tab').style.display=isSuperAdmin?'inline-block':'none';
  document.querySelectorAll('.dm-tab').forEach((t,i)=>{t.classList.toggle('active',i===0);});
  renderDmBody();
  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');document.body.style.overflow='';}

function switchDmTab(tab,btn){
  currentDmTab=tab;
  document.querySelectorAll('.dm-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderDmBody();
}

function renderDmBody(){
  const name=currentDetailStudent;if(!name)return;
  const s=STUDENTS.find(s=>s.n===name);
  const scores=s5data[name]||{};
  const profile=s5data.__profiles__?.[name]||{};
  const threeCs=s5data.__3cs__?.[name]||{};
  const meetings=s5data.__meetings__?.[name]||[];
  const levelWs=S5_WORKSHOPS[s?.l]||[];
  const safeN=name.replace(/'/g,"\\'");
  const sl=slug(name);
  let html='';

  if(currentDmTab==='progress'){
    const due=getDueThisWeek();
    const weekNum=getCurrentSessionWeek();
    let weekBanner='';
    if(weekNum>0&&weekNum<=7){
      const dueLabel=due?due.type==='checkpoint'?CHECKPOINTS.find(c=>c.key===due.key)?.label:'3 Commitments check-in':'—';
      weekBanner=`<div style="font-family:'DM Mono',monospace;font-size:10px;padding:7px 12px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:6px;color:#fbbf24;margin-bottom:12px;letter-spacing:.04em">Week ${weekNum} · Due this week: ${dueLabel}</div>`;
    }
    // S5 workshops with checkpoint dots
    html=weekBanner+`<div style="display:flex;flex-direction:column;gap:6px">`;
    levelWs.forEach(ws=>{
      const final=scores[ws.name];
      const finalCls=final==='Passed'?'st-pass':final==='Not passed'?'st-fail':final==='Absent'?'st-absent':'st-na';
      const finalLbl=final||'Pending';
      const chkMinis=CHECKPOINTS.map(chk=>{
        const v=scores[chkKey(ws.name,chk.key)];
        return`<span class="chk-mini ${chkMiniClass(v)}" title="${chk.label}: ${v||'—'}">${v?v.slice(0,2):'·'}</span>`;
      }).join('');
      html+=`<div class="ws-progress-row">
        <span class="ws-code-badge">${ws.code}</span>
        <span class="ws-prog-name">${ws.name}</span>
        <div class="chk-pills">${chkMinis}</div>
        <span style="font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:${final?'rgba(52,211,153,.12)':'var(--surface2)'};color:${final==='Passed'?'var(--pass)':final?'var(--fail)':'var(--muted)'};">${finalLbl}</span>
      </div>`;
    });
    html+='</div>';

    // Motivation + notes preview
    if(profile.motivation||profile.notes){
      html+=`<div style="margin-top:14px;background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border);">`;
      if(profile.motivation)html+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">Motivation</div><div style="font-size:12px;color:var(--text);margin-bottom:10px">${profile.motivation}</div>`;
      if(profile.notes)html+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">Notes</div><div style="font-size:12px;color:var(--text)">${profile.notes}</div>`;
      html+='</div>';
    }
  }

  else if(currentDmTab==='3cs'){
    const wks = ['w2','w4','w6'];
    const wkLabels = {w2:'Week 2',w4:'Week 4',w6:'Week 6'};
    const threeCs=s5data.__3cs__?.[name]||{};

    const due=getDueThisWeek();
    const weekForms = wks.map(wk => {
      const d = threeCs[wk]||{};
      const isDue3c=due&&due.type==='3cs'&&due.key===wk;
      return `<div style="margin-bottom:20px;background:var(--surface2);border:1px solid ${isDue3c?'rgba(251,191,36,.35)':'var(--border)'};border-radius:10px;overflow:hidden;">
        <div style="padding:8px 14px;background:${isDue3c?'rgba(251,191,36,.08)':'var(--surface3)'};border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:${isDue3c?'#fbbf24':'var(--accent2)'};font-weight:600;letter-spacing:.07em;text-transform:uppercase;">${wkLabels[wk]}${isDue3c?`<span style="margin-left:8px;font-size:8px;background:rgba(251,191,36,.15);padding:2px 6px;border-radius:4px;border:1px solid rgba(251,191,36,.3)">DUE THIS WEEK</span>`:''}</div>
        <div style="padding:12px 14px;display:flex;flex-direction:column;gap:12px;">

          <div>
            <div class="field-label" style="margin-bottom:6px;">1 · Loves School?</div>
            <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
              ${['Yes','No','N/A'].map(v=>`<button
                class="score-btn ${d.lovesSchool===v ? (v==='Yes'?'active-pass':v==='No'?'active-fail':'active-absent') : ''}"
                onclick="set3C('${name}','${wk}','lovesSchool','${v}',this)"
                style="padding:5px 14px;border-radius:5px;font-size:11px;">${v}</button>`).join('')}
            </div>
            <textarea class="field-textarea" id="3c-${wk}-lovesnote-${sl}" placeholder="What are they loving or not liking about school?" style="min-height:48px;">${d.lovesNote||''}</textarea>
          </div>

          <div>
            <div class="field-label" style="margin-bottom:6px;">2 · Learning 2x?</div>
            <div style="display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;">
              ${['All at 2x','Some at 2x','None at 2x','N/A'].map(v=>`<button
                class="score-btn ${d.learning2x===v ? 'active-track' : ''}"
                onclick="set3C('${name}','${wk}','learning2x','${v}',this)"
                style="padding:5px 11px;border-radius:5px;font-size:10px;">${v}</button>`).join('')}
            </div>
            <textarea class="field-textarea" id="3c-${wk}-learnnote-${sl}" placeholder="Which subjects excelling / need support? Motivation or academics issue?" style="min-height:48px;">${d.learnNote||''}</textarea>
          </div>

          <div>
            <div class="field-label" style="margin-bottom:6px;">3 · Lifeskills — On track to T2P?</div>
            <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
              ${['Yes','No','N/A'].map(v=>`<button
                class="score-btn ${d.onTrack===v ? (v==='Yes'?'active-pass':v==='No'?'active-fail':'active-absent') : ''}"
                onclick="set3C('${name}','${wk}','onTrack','${v}',this)"
                style="padding:5px 14px;border-radius:5px;font-size:11px;">${v}</button>`).join('')}
            </div>
            <textarea class="field-textarea" id="3c-${wk}-tracknote-${sl}" placeholder="If No — what's the action plan?" style="min-height:48px;">${d.trackNote||''}</textarea>
          </div>

        </div>
      </div>`;
    }).join('');

    html = `<div class="ds-section">
      <div class="ds-title">Alpha's 3 Commitments</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-bottom:16px;line-height:1.5;">
        Loves School · Learning 2x · Lifeskills — tracked at Weeks 2, 4, and 6.
      </div>
      ${weekForms}
    </div>
    <button class="save-detail-btn" onclick="save3Cs('${safeN}')">Save commitments</button>`;
  }

  else if(currentDmTab==='meetings'){
    const meetingForms=meetings.map((m,i)=>`
      <div class="meeting-entry" id="meeting-${sl}-${i}">
        <button class="meeting-del" onclick="deleteMeeting('${safeN}',${i})">✕</button>
        <div class="ds-row">
          <div class="ds-field"><label>Date</label><input class="ds-input" type="date" id="mdate-${sl}-${i}" value="${m.date||''}"></div>
          <div class="ds-field"><label>Type</label>
            <select class="ds-input" id="mtype-${sl}-${i}">
              <option ${m.type==='1:1'?'selected':''}>1:1</option>
              <option ${m.type==='Group'?'selected':''}>Group</option>
              <option ${m.type==='Parent'?'selected':''}>Parent</option>
              <option ${m.type==='Other'?'selected':''}>Other</option>
            </select>
          </div>
        </div>
        <div class="ds-field"><label>Notes</label><textarea class="ds-textarea" id="mnotes-${sl}-${i}" style="min-height:50px">${m.notes||''}</textarea></div>
        <div class="ds-field"><label>Action items</label><textarea class="ds-textarea" id="mactions-${sl}-${i}" style="min-height:40px">${m.actions||''}</textarea></div>
      </div>`).join('');
    html=`<div>${meetingForms}</div>
      <button class="add-meeting-btn" onclick="addMeeting('${safeN}')">+ Add meeting</button>
      <button class="save-detail-btn" onclick="saveMeetings('${safeN}')">Save meetings</button>`;
  }

  else if(currentDmTab==='notes'){
    const weeklyNotes=s5data.__weeknotes__?.[name]||{};
    html=`<div class="ds-section">
      <div class="ds-title">Weekly notes</div>
      ${CHECKPOINTS.map(chk=>`
        <div class="ds-field"><label>${chk.label}</label>
          <textarea class="ds-textarea" id="wn-${slug(chk.key)}-${sl}" placeholder="Notes for ${chk.label}…">${weeklyNotes[chk.key]||''}</textarea>
        </div>`).join('')}
    </div>
    <div class="ds-section">
      <div class="ds-title">General notes</div>
      <div class="ds-field"><label>Loves School — Yes / No + notes</label>
        <textarea class="ds-textarea" id="loves-${sl}" placeholder="Does the student prefer school to vacation? What are they loving…">${profile.lovesSchool||''}</textarea></div>
      <div class="ds-field"><label>2XP — on track?</label>
        <textarea class="ds-textarea" id="xp-${sl}" placeholder="Hitting 120XP/day? Which subjects need support…">${profile.xp||''}</textarea></div>
    </div>
    <button class="save-detail-btn" onclick="saveNotes('${safeN}')">Save notes</button>`;
  }

  else if(currentDmTab==='wsdelivery'){
    const s2=STUDENTS.find(s=>s.n===name);
    const levelWs=S5_WORKSHOPS[s2?.l]||[];
    const sl=slug(name);

    // Town Halls section (global)
    const townhalls=s5data.__townhalls__||[];
    const thForms=townhalls.map((t,i)=>`
      <div class="meeting-entry" id="th-${i}">
        <button class="meeting-del" onclick="deleteTownhall(${i})">✕</button>
        <div class="ds-row">
          <div class="ds-field"><label>Date</label><input class="ds-input" type="date" id="thdate-${i}" value="${t.date||''}"></div>
          <div class="ds-field"><label>Topic</label><input class="ds-input" type="text" id="thtopic-${i}" value="${t.topic||''}" placeholder="Town hall topic…"></div>
        </div>
        <div class="ds-field"><label>Notes</label><textarea class="ds-textarea" id="thnotes-${i}" style="min-height:40px">${t.notes||''}</textarea></div>
      </div>`).join('');

    const wsForms=levelWs.map(ws=>{
      const deliverables=s5data.__deliverables__?.[ws.name]||[];
      const wsMeetings=s5data.__wsmeetings__?.[ws.name]||[];
      const safeWs=ws.name.replace(/'/g,"\\'");
      const delForms=deliverables.map((d,i)=>`
        <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;">
          <input class="ds-input" style="width:90px" type="text" id="delweek-${slug(ws.name)}-${i}" value="${d.week||''}" placeholder="Wk 1">
          <input class="ds-input" style="flex:1" type="text" id="deltext-${slug(ws.name)}-${i}" value="${d.text||''}" placeholder="Deliverable…">
          <button style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px" onclick="deleteDeliverable('${safeWs}',${i})">✕</button>
        </div>`).join('');
      const meetForms=wsMeetings.map((m,i)=>`
        <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;">
          <input class="ds-input" style="width:110px" type="date" id="wsmdate-${slug(ws.name)}-${i}" value="${m.date||''}">
          <input class="ds-input" style="flex:1" type="text" id="wsmnotes-${slug(ws.name)}-${i}" value="${m.notes||''}" placeholder="Meeting notes…">
          <button style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px" onclick="deleteWsMeeting('${safeWs}',${i})">✕</button>
        </div>`).join('');
      return`<div style="margin-bottom:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <div style="padding:8px 12px;background:var(--surface3);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);font-weight:600">${ws.code} · ${ws.name}</div>
        <div style="padding:10px 12px;">
          <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Weekly Deliverables</div>
          ${delForms}
          <button class="add-meeting-btn" style="margin-bottom:12px" onclick="addDeliverable('${safeWs}')">+ Add deliverable</button>
          <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Workshop Meetings</div>
          ${meetForms}
          <button class="add-meeting-btn" onclick="addWsMeeting('${safeWs}')">+ Add meeting</button>
        </div>
      </div>`;
    }).join('');

    html=`<div class="ds-section">
      <div class="ds-title">Town Halls</div>
      ${thForms}
      <button class="add-meeting-btn" onclick="addTownhall()">+ Add town hall</button>
      <button class="save-detail-btn" onclick="saveTownhalls()">Save town halls</button>
    </div>
    <div class="ds-section" style="margin-top:16px">
      <div class="ds-title">Workshop Deliverables + Meetings</div>
      ${wsForms}
      <button class="save-detail-btn" onclick="saveWsDeliveries('${safeN}')">Save deliverables & meetings</button>
    </div>`;
  }

  document.getElementById('dm-body').innerHTML=html;
}

function addTownhall(){if(!s5data.__townhalls__)s5data.__townhalls__=[];s5data.__townhalls__.push({date:'',topic:'',notes:''});renderDmBody();}
function deleteTownhall(i){s5data.__townhalls__?.splice(i,1);renderDmBody();}
function saveTownhalls(){
  const ths=s5data.__townhalls__||[];
  s5data.__townhalls__=ths.map((_,i)=>({date:document.getElementById(`thdate-${i}`)?.value||'',topic:document.getElementById(`thtopic-${i}`)?.value||'',notes:document.getElementById(`thnotes-${i}`)?.value||''}));
  saveAll();showToast('✓ Town halls saved');
}
function addDeliverable(wsName){if(!s5data.__deliverables__)s5data.__deliverables__={};if(!s5data.__deliverables__[wsName])s5data.__deliverables__[wsName]=[];s5data.__deliverables__[wsName].push({week:'',text:''});renderDmBody();}
function deleteDeliverable(wsName,i){s5data.__deliverables__?.[wsName]?.splice(i,1);renderDmBody();}
function addWsMeeting(wsName){if(!s5data.__wsmeetings__)s5data.__wsmeetings__={};if(!s5data.__wsmeetings__[wsName])s5data.__wsmeetings__[wsName]=[];s5data.__wsmeetings__[wsName].push({date:'',notes:''});renderDmBody();}
function deleteWsMeeting(wsName,i){s5data.__wsmeetings__?.[wsName]?.splice(i,1);renderDmBody();}
function saveWsDeliveries(name){
  const s2=STUDENTS.find(s=>s.n===name);
  const levelWs=S5_WORKSHOPS[s2?.l]||[];
  if(!s5data.__deliverables__)s5data.__deliverables__={};
  if(!s5data.__wsmeetings__)s5data.__wsmeetings__={};
  levelWs.forEach(ws=>{
    const dels=s5data.__deliverables__[ws.name]||[];
    s5data.__deliverables__[ws.name]=dels.map((_,i)=>({week:document.getElementById(`delweek-${slug(ws.name)}-${i}`)?.value||'',text:document.getElementById(`deltext-${slug(ws.name)}-${i}`)?.value||''}));
    const meets=s5data.__wsmeetings__[ws.name]||[];
    s5data.__wsmeetings__[ws.name]=meets.map((_,i)=>({date:document.getElementById(`wsmdate-${slug(ws.name)}-${i}`)?.value||'',notes:document.getElementById(`wsmnotes-${slug(ws.name)}-${i}`)?.value||''}));
  });
  logAudit('wsdata',name,'deliverables+meetings','updated');
  saveAll();showToast('✓ Saved');
}

function set3C(name, wk, field, val, btn) {
  if (!s5data.__3cs__) s5data.__3cs__ = {};
  if (!s5data.__3cs__[name]) s5data.__3cs__[name] = {};
  if (!s5data.__3cs__[name][wk]) s5data.__3cs__[name][wk] = {};
  s5data.__3cs__[name][wk][field] = val;
  // Update button styles
  const group = btn.parentElement;
  group.querySelectorAll('.score-btn').forEach(b => {
    b.className = 'score-btn';
    b.style.padding = '5px 14px';
    b.style.borderRadius = '5px';
    b.style.fontSize = field === 'learning2x' ? '10px' : '11px';
    if (field === 'learning2x') { b.style.padding = '5px 11px'; }
  });
  const cls = field === 'learning2x' ? 'active-track' : val === 'Yes' ? 'active-pass' : val === 'No' ? 'active-fail' : 'active-absent';
  btn.classList.add(cls);
}

function save3Cs(name) {
  const sl = slug(name);
  if (!s5data.__3cs__) s5data.__3cs__ = {};
  if (!s5data.__3cs__[name]) s5data.__3cs__[name] = {};
  ['w2','w4','w6'].forEach(wk => {
    if (!s5data.__3cs__[name][wk]) s5data.__3cs__[name][wk] = {};
    const d = s5data.__3cs__[name][wk];
    const lovesnote = document.getElementById(`3c-${wk}-lovesnote-${sl}`);
    const learnnote = document.getElementById(`3c-${wk}-learnnote-${sl}`);
    const tracknote = document.getElementById(`3c-${wk}-tracknote-${sl}`);
    if (lovesnote) d.lovesNote = lovesnote.value;
    if (learnnote) d.learnNote = learnnote.value;
    if (tracknote) d.trackNote = tracknote.value;
  });
  logAudit('profile', name, '3 Commitments', 'updated');
  saveAll(); showToast('✓ Commitments saved');
}

function saveMeetings(name){
  const sl=slug(name);
  const meetings=s5data.__meetings__?.[name]||[];
  if(!s5data.__meetings__)s5data.__meetings__={};
  s5data.__meetings__[name]=meetings.map((_,i)=>({
    date:document.getElementById(`mdate-${sl}-${i}`)?.value||'',
    type:document.getElementById(`mtype-${sl}-${i}`)?.value||'1:1',
    notes:document.getElementById(`mnotes-${sl}-${i}`)?.value||'',
    actions:document.getElementById(`mactions-${sl}-${i}`)?.value||'',
  }));
  logAudit('profile',name,'meetings','updated');
  saveAll();showToast('✓ Meetings saved');
}

function addMeeting(name){
  if(!s5data.__meetings__)s5data.__meetings__={};
  if(!s5data.__meetings__[name])s5data.__meetings__[name]=[];
  s5data.__meetings__[name].push({date:'',type:'1:1',notes:'',actions:''});
  renderDmBody();
}

function deleteMeeting(name,idx){
  if(!s5data.__meetings__?.[name])return;
  s5data.__meetings__[name].splice(idx,1);
  renderDmBody();
}

function saveNotes(name){
  const sl=slug(name);
  if(!s5data.__profiles__)s5data.__profiles__={};
  if(!s5data.__profiles__[name])s5data.__profiles__[name]={};
  if(!s5data.__weeknotes__)s5data.__weeknotes__={};
  if(!s5data.__weeknotes__[name])s5data.__weeknotes__[name]={};
  CHECKPOINTS.forEach(chk=>{
    const el=document.getElementById(`wn-${slug(chk.key)}-${sl}`);
    if(el)s5data.__weeknotes__[name][chk.key]=el.value;
  });
  const loves=document.getElementById(`loves-${sl}`);const xp=document.getElementById(`xp-${sl}`);
  if(loves)s5data.__profiles__[name].lovesSchool=loves.value;
  if(xp)s5data.__profiles__[name].xp=xp.value;
  logAudit('profile',name,'notes','updated');
  saveAll();showToast('✓ Notes saved');
}

// ── Workshop Data tab (Zara only) ─────────────────────────────────
function renderWsData(){
  const lv=document.getElementById('wd-level').value;
  const wsArr=S5_WORKSHOPS[lv]||[];
  // Populate workshop dropdown
  const wdSel=document.getElementById('wd-workshop');
  const prevWs=wdSel.value;
  wdSel.innerHTML=wsArr.map(ws=>`<option value="${ws.name}">${ws.code} — ${ws.name}</option>`).join('');
  if(prevWs&&wsArr.find(w=>w.name===prevWs))wdSel.value=prevWs;
  const wsName=wdSel.value;
  if(!wsName){document.getElementById('wd-content').innerHTML='<div style="color:var(--muted2);padding:20px;font-size:13px">Select a workshop</div>';return;}

  const students=[...STUDENTS].filter(s=>s.l===lv).sort((a,b)=>a.n.localeCompare(b.n));
  const rows=students.map(s=>{
    const scores=s5data[s.n]||{};
    const final=scores[wsName]||'';
    const chkCells=CHECKPOINTS.map(chk=>{
      const v=scores[chkKey(wsName,chk.key)]||'';
      const opts=getChkOptions(chk.key);
      const optHtml=opts.map(o=>`<option ${v===o.val?'selected':''}>${o.val}</option>`).join('');
      return`<td><select class="ws-edit-input" id="wdchk-${slug(s.n)}-${chk.key}"><option value=""></option>${optHtml}</select></td>`;
    }).join('');
    const finalOpts=['','Passed','Not passed','Absent'].map(o=>`<option ${final===o?'selected':''}>${o}</option>`).join('');
    return`<tr>
      <td style="font-weight:500;color:var(--text);white-space:nowrap">${s.n}</td>
      ${chkCells}
      <td><select class="ws-edit-input" id="wdfin-${slug(s.n)}"><option value=""></option>${finalOpts}</select></td>
    </tr>`;
  }).join('');

  document.getElementById('wd-content').innerHTML=`
    <table class="ws-data-table">
      <thead><tr>
        <th>Student</th>
        ${CHECKPOINTS.map(c=>`<th>${c.label}</th>`).join('')}
        <th>Final (T2P)</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function saveWsData(){
  const lv=document.getElementById('wd-level').value;
  const wsName=document.getElementById('wd-workshop').value;
  if(!wsName)return;
  const students=[...STUDENTS].filter(s=>s.l===lv);
  students.forEach(s=>{
    if(!s5data[s.n])s5data[s.n]={};
    CHECKPOINTS.forEach(chk=>{
      const v=document.getElementById(`wdchk-${slug(s.n)}-${chk.key}`)?.value;
      const key=chkKey(wsName,chk.key);
      if(v)s5data[s.n][key]=v;else delete s5data[s.n][key];
    });
    const fin=document.getElementById(`wdfin-${slug(s.n)}`)?.value;
    if(fin)s5data[s.n][wsName]=fin;else delete s5data[s.n][wsName];
  });
  logAudit('wsdata','(bulk)',wsName,'updated by '+currentUser);
  saveAll();
}

// ── Audit ──────────────────────────────────────────────────────────
function openAudit(){
  const entries=s5data.__audit__||[];
  document.getElementById('audit-body').innerHTML=entries.length
    ?entries.map(e=>{
        const d=new Date(e.ts);
        const time=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        const ec=e.value==='Passed'?'ep':e.value==='Not passed'||e.value==='Behind'?'ef':e.value==='Absent'?'ea':'eg';
        const sc=e.value==='Passed'?'as-p':e.value==='Not passed'||e.value==='Behind'?'as-f':e.value==='Absent'?'as-a':'as-g';
        return`<div class="audit-entry ${ec}"><span class="audit-who">${e.who}</span><div class="audit-detail"><div class="audit-action"><strong>${e.student}</strong> · ${e.detail}</div><div class="audit-time">${time}</div></div><span class="audit-st ${sc}">${e.value||'—'}</span></div>`;
      }).join('')
    :'<div style="color:var(--muted2);font-size:13px;padding:40px 0;text-align:center;font-style:italic">No edits yet.</div>';
  document.getElementById('audit-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeAudit(){document.getElementById('audit-overlay').classList.remove('open');document.body.style.overflow='';}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAssign();closeAudit();closeDetail();closeAdminPass();}
});
</script>
